// Reuse a fixed pool of Audio objects per src to avoid memory buildup
const _audioPool = {};
function getPooledAudio(src) {
  if (!_audioPool[src]) _audioPool[src] = [];
  const pool = _audioPool[src];
  let audio = pool.find(a => a.paused || a.ended);
  if (!audio) {
    audio = new Audio(src);
    pool.push(audio);
  }
  audio.currentTime = 0;
  return audio;
}
function playSound(key) {
  const src = SOUNDS[key];
  if (!src) return;
  getPooledAudio(src).play().catch(err => console.error('Sound error:', key, err));
}

// Preload all sounds as blobs so they play instantly
function playWeaponSound(weaponName, hitOrMiss) {
  if (!weaponName) return;
  const lower = weaponName.toLowerCase();
  for (const [keyword, sounds] of Object.entries(WEAPON_SOUNDS)) {
    if (lower.includes(keyword)) {
      const src = sounds[hitOrMiss];
      if (!src) return;
      getPooledAudio(src).play().catch(err => console.error('Weapon sound error:', err));
      return;
    }
  }
}

// ─── SHEET PARSERS ────────────────────────────────────────────────────────────
function parseBonus(text) {
  const bonuses = {};
  const escaped = SORTED_KEYS.map(k => k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|");
  const re = new RegExp("([+-]\\d+)%?\\s+("+escaped+")","gi");
  let m;
  while ((m = re.exec(text)) !== null) {
    const key = ALL_PARSEABLE.find(a => a.toLowerCase() === m[2].toLowerCase());
    if (key) bonuses[key] = (bonuses[key]||0) + parseInt(m[1]);
  }
  return bonuses;
}
function parsePctBonus(text) {
  // Matches +N% StatName or -N% StatName (percentage of base value)
  const bonuses = {};
  const escaped = SORTED_KEYS.map(k => k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|");
  const re = new RegExp("([+-]\\d+)%\\s+("+escaped+")","gi");
  let m;
  while ((m = re.exec(text)) !== null) {
    const key = ALL_PARSEABLE.find(a => a.toLowerCase() === m[2].toLowerCase());
    if (key) bonuses[key] = (bonuses[key]||0) + parseInt(m[1]);
  }
  return bonuses;
}

function computeBonuses(sheet) {

  const back      = sheet.back      || empty;
  const belt      = sheet.belt      || empty;

  const leftRing  = sheet.leftRing  || empty;
  const rightRing = sheet.rightRing || empty;
  const allBonuses = Object.fromEntries(ALL_PARSEABLE.map(k => [k,0]));
  const allPctBonuses = {};
  [head,body,legs,hands,feet,back].forEach(p => {
    if (!p) return;
    allBonuses["Blunt Resistance"]            = (allBonuses["Blunt Resistance"]||0)            + (parseInt(p.bluntRes)||0);
    allBonuses["Cleaving Resistance"]         = (allBonuses["Cleaving Resistance"]||0)         + (parseInt(p.cleavingRes)||0);

  });

  const allProcs  = {main:[],off:[]};
  const allHealProcs = {main:[],off:[]};
  const allGuardProcs = {main:[],off:[]};
  const allEnergyProcs = {main:[],off:[]};

  const allConditionImmunities = [];

function applyStanceDmg(dmg, stances, flankingDamage) {
  let mult = 1;
  const notes = [];
  if (stances.includes('flank')) {
    const fm = flankingDamage || 1;
    mult *= fm;
    notes.push(`↪ Flank x${fm.toFixed(2)}`);
  }
  if (stances.includes('sneak')) {
    mult *= 1.5;
    notes.push('★ Sneak x1.5');
  }
  return { finalDmg: Math.round(dmg * mult), note: notes.join(' + ') || null };
}

// ─── DAMAGE HELPER ────────────────────────────────────────────────────────────
function applyDamage(c, dmg, guardBonus=0) {
  const guardDmg = Math.min(c.guard||0, dmg);
  const hpDmg    = dmg - guardDmg;
  const extraGuardDmg = Math.min((c.guard||0) - guardDmg, guardBonus);
  return { guard: (c.guard||0) - guardDmg - extraGuardDmg, hp: Math.max(0, c.hp - hpDmg), guardDmg: guardDmg + extraGuardDmg, hpDmg };
}

// ─── RESOURCE BARS ────────────────────────────────────────────────────────────
function ResourceBar({ current, max, color, label }) {
  if (max <= 0) return null;
  const pct = Math.max(0, Math.min(100, (current / max) * 100));
  return (
    <div style={{marginBottom:4}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#6b7280',marginBottom:2}}>
        <span style={{color}}>{label}</span><span>{current}/{max}</span>
      </div>
      <div style={{background:'#374151',borderRadius:3,height:6,width:'100%'}}>
        <div style={{width:`${pct}%`,background:color,height:'100%',borderRadius:3,transition:'width 0.3s ease'}}/>
      </div>
    </div>
  );
}

  const toggle = id => setPicked(prev => { const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });

  const cat = activeCategory ? ABILITY_CATEGORIES[activeCategory] : null;
  return (

function loadPlayerDbTalents(skillPoints) {
  // Reads from hardcoded PLAYER_TALENT_TREES — no talent database needed
  const results = [];
  Object.entries(PLAYER_TALENT_TREES).forEach(([pid, treeData]) => {
    (treeData.talents || []).forEach(talent => {
      const pts = (skillPoints||{})[talent.id] || 0;
      if (pts > 0) results.push({talent, pts, treeColor: treeData.color, treeName: pid.charAt(0).toUpperCase()+pid.slice(1)});

  });
  return results;
}

    };
  }

  if (talent.type === 'Banish') {
    return {
      ...base,
      type: 'spell_banish',
      school: 'dark',
      color: '#7c3aed',
      banishCount: parseInt(talent.banishCount)||1,
      hitSound: talent.hitSound||null,
      autoHit: true,
      resistedBy: 'Defense',
    };
  }

  // Generic melee fallback
  return {...base, type:'spell_melee', school:'combat', color:'#f87171', damageMult:1.0};
}

function LifeTapModal({ caster, onConfirm, onCancel }) {

    const tier = (talent.tier||'').toLowerCase();
    if(tier !== 'novice' && tier !== 'journeyman') return false;
    const usesRemaining = (caster.talentUses||{})[talent.id];
    if(usesRemaining === undefined) return false; // never used, full
    return usesRemaining < pts;
  });
  const [selected, setSelected] = React.useState(null);
  const hpCost = Math.max(1, Math.round((caster.maxHp||100) * 0.10));

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>

          {eligible.length === 0 ? (
            <div style={{color:'#6b7280',fontStyle:'italic',fontSize:12,textAlign:'center',padding:20}}>No eligible talents have spent uses.</div>
          ) : (
            <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
              {eligible.map(({talent, pts, treeColor}) => {

                      <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:2}}>
                        <span style={{width:6,height:6,borderRadius:'50%',background:treeColor,display:'inline-block',flexShrink:0}}/>
                        <span style={{fontSize:11,fontWeight:700,color:'#f0c040',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{talent.name}</span>
                      </div>
                      <div style={{display:'flex',gap:4,alignItems:'center'}}>

                        <span style={{fontSize:9,color:'#f87171',background:'#1f2937',padding:'1px 4px',borderRadius:3,marginLeft:'auto'}}>{usesRemaining}/{pts} uses</span>
                      </div>
                    </div>

                      {talent.image
                        ? <img src={talent.image} alt={talent.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>

  );

function TalentsModal({ c, onUse, onClose, combatElapsed }) {
  const isMonster = c.type === 'monster';
  const skillPoints = c.skillPoints || {};
  const dbTalents = isMonster
    ? (c.talents||[]).map(t => ({ talent: t, pts: t._assignedPoints||t.maxPoints||1, treeColor: t._treeColor||'#c9a227', treeName: t._treeName||'Abilities' }))
    : loadPlayerDbTalents(skillPoints);

  const treeNames = [...new Set(dbTalents.map(e => e.treeName))];
  const [activeTree, setActiveTree] = useState(treeNames[0] || null);

  const typeColors = {Passive:'#9ca3af',Melee:'#f87171',Ranged:'#34d399','Spell Attack':'#a78bfa','Spell Heal':'#4ade80',Reaction:'#60a5fa',Buff:'#fb923c',Enchantment:'#c084fc',Summon:'#67e8f9','Raise Summon':'#c084fc',Resurrection:'#f9a8d4','Blood Sacrifice':'#dc2626',passive:'#9ca3af',reaction:'#60a5fa'};

  const visibleTalents = dbTalents.filter(e => !activeTree || e.treeName === activeTree);

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',display:'flex',alignItems:'flex-start',justifyContent:'center',zIndex:100,overflowY:'auto',padding:'30px 16px'}}>
      <div style={{background:'#1f2937',borderRadius:12,border:'1px solid #4b5563',width:'100%',maxWidth:900,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid #374151',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{margin:0,color:'#c9a227'}}>✦ Talents — {c.name}</h3>
          <button onClick={onClose} style={btn()}>Close</button>
        </div>

        {/* Tree tabs */}
        {treeNames.length > 1 && (
          <div style={{display:'flex',borderBottom:'1px solid #374151',flexWrap:'wrap'}}>
            {treeNames.map(tree => {
              const color = dbTalents.find(e=>e.treeName===tree)?.treeColor||'#c9a227';
              return (
                <button key={tree} onClick={()=>setActiveTree(tree)} style={{
                  flex:1, padding:'8px 0', background:activeTree===tree?'#111827':'transparent',
                  border:'none', borderBottom:activeTree===tree?`2px solid ${color}`:'2px solid transparent',
                  color:activeTree===tree?color:'#6b7280',
                  cursor:'pointer', fontSize:11, letterSpacing:1, textTransform:'uppercase',
                  fontFamily:'Georgia, serif',
                }}>{tree}</button>
              );
            })}
          </div>
        )}

        <div style={{flex:1,overflowY:'auto',padding:16}}>
          {dbTalents.length === 0 && (
            <div style={{fontSize:13,color:'#4b5563',fontStyle:'italic',textAlign:'center',padding:30}}>
              {isMonster ? 'No talents assigned to this creature.' : 'No talents learned. Add talents via the character sheet.'}
            </div>
          )}
          <div style={{display:'flex',flexWrap:'wrap',gap:12}}>
            {visibleTalents.map(({talent, pts, treeColor}) => {
              const spellObj = talentToSpellObj(talent, pts);
              const usesRemaining = (c.talentUses||{})[talent.id];
              const usesMax = pts||1;
              const hasUses = usesRemaining===undefined || usesRemaining > 0;
              const isPassive = spellObj.type === 'passive';
              const isReaction = spellObj.type === 'reaction';
              const isInterruptOnly = !!spellObj.interruptVs && !['spell_melee','spell_ranged','spell_damage','spell_heal','free_seize','buff','spell_debuff'].includes(spellObj.type);
              const isRangedTalent = spellObj.type === 'spell_ranged';
              const hasRangedWeapon = (c.weaponType||'Melee') === 'Ranged';
              const needsMelee = !!spellObj.requiresMeleeWeapon;
              const weaponBlocked = (isRangedTalent && !hasRangedWeapon) || (needsMelee && hasRangedWeapon);
              const cdEnd = (c.spellCooldowns||{})[talent.id]||0;
              const onCooldown = cdEnd > (combatElapsed||0);
              const canUse = !isPassive && !isReaction && !isInterruptOnly && !weaponBlocked && hasUses && !onCooldown;

              const btnLabel = isPassive ? '— Passive —'
                : isReaction ? `🛡 ${spellObj.reactionTrigger||'Reaction'}`
                : isInterruptOnly ? '🛡 Interrupt Only'
                : weaponBlocked ? (needsMelee && hasRangedWeapon ? '⚔ Needs Melee Weapon' : '🏹 Needs Ranged Weapon')
                : onCooldown ? `⏱ ${Math.max(0,cdEnd-(combatElapsed||0)).toFixed(1)}s`
                : !hasUses ? 'No uses left'
                : `Use ${talent.name}`;

              const borderColor = isPassive||isReaction ? '#1e3a5f' : canUse ? treeColor+'88' : '#7f1d1d';
              const bgColor = isPassive||isReaction ? '#0f172a' : canUse ? '#111827' : '#1a0a0a';

              return (
                <div key={talent.id} style={{
                  width:160, flexShrink:0, display:'flex', flexDirection:'column',
                  background:bgColor, border:`1px solid ${borderColor}`,
                  borderRadius:8, overflow:'hidden',
                  opacity: canUse||isPassive||isReaction ? 1 : 0.55,
                }}>
                  {/* Header */}
                  <div style={{background:'#0a0f1a',padding:'6px 8px',borderBottom:'1px solid #374151'}}>
                    <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:3}}>
                      <span style={{width:6,height:6,borderRadius:'50%',background:treeColor,display:'inline-block',flexShrink:0}}/>
                      <span style={{fontSize:11,fontWeight:700,color:'#f0c040',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{talent.name}</span>
                    </div>
                    <div style={{display:'flex',gap:4,flexWrap:'wrap',alignItems:'center'}}>
                      <span style={{fontSize:9,color:typeColors[talent.type]||'#9ca3af',background:'#1a1a2e',padding:'1px 5px',borderRadius:3}}>{talent.type}</span>
                      {talent.tier&&<span style={{fontSize:9,color:'#4b5563',background:'#111827',padding:'1px 5px',borderRadius:3}}>{talent.tier}</span>}
                      {usesRemaining!==undefined&&<span style={{fontSize:9,color:usesRemaining>0?treeColor:'#6b7280',background:'#1f2937',borderRadius:3,padding:'1px 5px',marginLeft:'auto'}}>{usesRemaining}/{usesMax}</span>}
                      {(()=>{const cdEnd=(c.spellCooldowns||{})[talent.id]||0; const rem=cdEnd-(combatElapsed||0); return rem>0?<span style={{fontSize:9,color:'#60a5fa',background:'#0f172a',borderRadius:3,padding:'1px 5px',marginLeft:'auto'}}>⏱ {rem.toFixed(1)}s</span>:null;})()}
                    </div>
                  </div>
                  {/* Image */}
                  <div style={{width:'100%',aspectRatio:'1/1',background:'#070b12',overflow:'hidden',flexShrink:0}}>
                    {talent.image
                      ? <img src={talent.image} alt={talent.name} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>e.target.style.display='none'}/>
                      : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'#1f2937',fontSize:10}}>No image</div>
                    }
                  </div>
                  {/* Description */}
                  <div style={{padding:'6px 8px',flex:1,fontSize:10,color:'#9ca3af',lineHeight:1.4}}>
                    {talent.description||<span style={{fontStyle:'italic',color:'#374151'}}>No description.</span>}
                  </div>
                  {/* Damage / heal range */}
                  {(()=>{
                    const isWeaponSpell=spellObj.type==='spell_melee'||spellObj.type==='spell_ranged';
                    const isSpellDmg=spellObj.type==='spell_damage';
                    const isHeal=spellObj.type==='spell_heal';
                    if(!isSpellDmg&&!isHeal&&!isWeaponSpell) return null;
                    const boosted=applyTalentItemBoosts(spellObj,c);
                    if(isWeaponSpell){
                      const baseMin=c.minDmg||0;
                      const baseMax=c.maxDmg||0;
                      const mult=boosted.damageMult||1.0;
                      const dispMin=Math.round(baseMin*mult);
                      const dispMax=Math.round(baseMax*mult);
                      const physType=spellObj.physDmgType||(c.weaponPhysDmgType||'Phys');
                      return (
                        <div style={{padding:'4px 8px 6px',borderTop:'1px solid #1f2937'}}>
                          <div style={{fontSize:11,fontWeight:700,color:'#f87171'}}>{dispMin}–{dispMax} <span style={{fontSize:9,fontWeight:400,color:'#6b7280'}}>{physType} ×{mult.toFixed(2)}</span></div>
                        </div>
                      );
                    }
                    const rangeColor=isSpellDmg?(DAMAGE_COLORS[spellObj.damageType]||'#f87171'):'#4ade80';
                    const rangeLabel=isSpellDmg?spellObj.damageType:'Heal';
                    const hasScale=(isSpellDmg&&spellObj.dmgLevelScale&&parseFloat(spellObj.dmgLevelScale)>0)||(!isSpellDmg&&spellObj.healLevelScale&&parseFloat(spellObj.healLevelScale)>0);
                    const baseMin=spellObj.minVal||0;
                    const baseMax=spellObj.maxVal||0;
                    const showBase=hasScale&&(boosted.minVal!==baseMin||boosted.maxVal!==baseMax);
                    return (
                      <div style={{padding:'4px 8px 6px',borderTop:'1px solid #1f2937'}}>
                        {showBase&&<div style={{fontSize:9,color:'#4b5563',textDecoration:'line-through'}}>{baseMin}–{baseMax}</div>}

// ─── COMBAT HELPERS ───────────────────────────────────────────────────────────
const rollInRange=(min,max)=>Math.floor(Math.random()*(max-min+1))+min;

// Build a map of { [talentName]: { flatMinDmg, flatMaxDmg, flatMinHeal, flatMaxHeal, pctMinDmg, pctMaxDmg, pctMinHeal, pctMaxHeal } }
// by scanning all equipped item slots from the player's character sheet and looking each up in cs_itemDatabase_all.
function buildTalentBoostMap(playerId) {
  try {
    const sheets = JSON.parse(localStorage.getItem('cs_sheets') || '{}');
    const sheet = sheets[playerId];
    if (!sheet) return {};
    const dbRaw = localStorage.getItem('cs_itemDatabase_all');
    if (!dbRaw) return {};
    const dbParsed = JSON.parse(dbRaw);
    const dbItems = Array.isArray(dbParsed) ? dbParsed : (dbParsed.items || []);
    const EQUIP_SLOTS = ['mainHand','offHand','head','body','legs','hands','feet','back','belt','amulet','leftRing','rightRing'];
    const map = {};
    const zero = () => ({
      minVal:0, maxVal:0, pctMinVal:0, pctMaxVal:0,
      minHeal:0, maxHeal:0, pctMinHeal:0, pctMaxHeal:0,
      condBoostMin:0, condBoostMax:0, damageMult:0,
      dmgLevelScale:0, healLevelScale:0,
      healOnHitPct:0, guardOnHitPct:0,
    });
    EQUIP_SLOTS.forEach(function(slot) {
      const slotItem = sheet[slot];
      if (!slotItem || !slotItem.id) return;
      const dbItem = dbItems.find(function(x) { return x.id === slotItem.id; });
      if (!dbItem || !Array.isArray(dbItem.talentBoosts)) return;
      dbItem.talentBoosts.forEach(function(b) {
        const name = (b.talentName || '').trim();
        if (!name) return;
        if (!map[name]) map[name] = zero();
        // New format: b.fields object
        if (b.fields && typeof b.fields === 'object') {
          Object.keys(b.fields).forEach(function(k) {
            if (map[name][k] !== undefined) map[name][k] += parseFloat(b.fields[k]) || 0;
          });
        }
        // Legacy flat fields
        map[name].minVal       += parseFloat(b.flatMinDmg)      || 0;
        map[name].maxVal       += parseFloat(b.flatMaxDmg)      || 0;
        map[name].pctMinVal    += parseFloat(b.pctMinDmg)       || 0;
        map[name].pctMaxVal    += parseFloat(b.pctMaxDmg)       || 0;
        map[name].minHeal      += parseFloat(b.flatMinHeal)     || 0;
        map[name].maxHeal      += parseFloat(b.flatMaxHeal)     || 0;
        map[name].pctMinHeal   += parseFloat(b.pctMinHeal)      || 0;
        map[name].pctMaxHeal   += parseFloat(b.pctMaxHeal)      || 0;
        map[name].condBoostMin += parseFloat(b.flatCondBoostMin)|| 0;
        map[name].condBoostMax += parseFloat(b.flatCondBoostMax)|| 0;
        map[name].damageMult   += parseFloat(b.flatDamageMult)  || 0;
      });
    });
    return map;
  } catch { return {}; }
}

// Apply item-based talent boosts to a spell's minVal/maxVal before rolling.
// Returns { minVal, maxVal, condBoostMin, condBoostMax, damageMult } with boosts applied.
function applyTalentItemBoosts(spell, caster) {
  const baseMin = spell.minVal || 0;
  const baseMax = spell.maxVal || 0;
  const isDmg = spell.type === 'spell_damage' || spell.type === 'spell_melee' || spell.type === 'spell_aoe';
  const isHeal = spell.type === 'spell_heal';
  let minVal = baseMin;
  let maxVal = baseMax;
  let condBoostMin = parseFloat(spell.condBoostMin) || 0;
  let condBoostMax = parseFloat(spell.condBoostMax) || 0;
  let damageMult = parseFloat(spell.damageMult) || 1.0;

  // Apply item talent boosts
  const boostMap = caster.talentBoostMap || {};
  const b = boostMap[spell.name];
  if (b) {
    if (isDmg) {
      minVal = Math.round(minVal * (1 + (b.pctMinVal || 0) / 100) + (b.minVal || 0));
      maxVal = Math.round(maxVal * (1 + (b.pctMaxVal || 0) / 100) + (b.maxVal || 0));
    } else if (isHeal) {
      minVal = Math.round(minVal * (1 + (b.pctMinHeal || 0) / 100) + (b.minHeal || 0));
      maxVal = Math.round(maxVal * (1 + (b.pctMaxHeal || 0) / 100) + (b.maxHeal || 0));
    }
    condBoostMin += (b.condBoostMin || 0);
    condBoostMax += (b.condBoostMax || 0);
    if (b.damageMult) damageMult = b.damageMult; // override: item sets the multiplier directly
  }

  // Apply level scaling (boosted by item dmgLevelScale/healLevelScale)
  const level = Math.max(1, parseInt(caster.playerLevel || 1) || 1);
  const dmgScale = (parseFloat(spell.dmgLevelScale) || 0) + (b ? (b.dmgLevelScale || 0) : 0);
  const healScale = (parseFloat(spell.healLevelScale) || 0) + (b ? (b.healLevelScale || 0) : 0);
  if (isDmg && dmgScale > 0) {
    const scalePct = dmgScale * level / 100;
    minVal = Math.round(minVal * (1 + scalePct));
    maxVal = Math.round(maxVal * (1 + scalePct));
  } else if (isHeal && healScale > 0) {
    const scalePct = healScale * level / 100;
    minVal = Math.round(minVal * (1 + scalePct));
    maxVal = Math.round(maxVal * (1 + scalePct));
  }

  return { minVal: Math.max(0, minVal), maxVal: Math.max(0, maxVal), condBoostMin, condBoostMax, damageMult };
}

  return '';

// ─── EFFECTIVE ACTION SPEED ───────────────────────────────────────────────────
// Returns attack interval in seconds after applying Haste / Slowed conditions.
// Haste:  ×0.5  (can go below the 1s floor)
// Slowed: ×1.5
function effectiveActionSpeed(c) {
  const base = parseFloat(parseFloat(c.actionSpeed||2.00).toFixed(2));
  const conds = (c.conditions||[]).map(cd=>cd.type);
  const hasHaste  = conds.includes('Haste');
  const hasSlowed = conds.includes('Slowed');
  let speed = base;
  if(hasHaste)  speed = parseFloat((speed * 0.5).toFixed(2));
  if(hasSlowed) speed = parseFloat((speed * 1.5).toFixed(2));
  return Math.max(0.10, speed); // absolute floor to prevent 0/negative
}

// ─── RESIST STAT HELPER ───────────────────────────────────────────────────────
// Returns the target's resistance value for the given stat name.
// Raw stats (Strength etc.) are only available on player-derived combatants;
// monsters fall back to their defense value.
function getResistStat(target, statName) {
  if(!statName || statName==='Defense') return target.defense||0;
  const map = {
    'Strength':     target.rawStr    ?? target.defense,
    'Agility':      target.rawAgi    ?? target.defense,
    'Intelligence': target.rawInt    ?? target.defense,
    'Willpower':    target.rawWil    ?? target.defense,
    'Cunning':      target.rawCun    ?? target.defense,
    'Vitality':     target.rawVit    ?? target.defense,
    'Defense':      target.defense||0,
  };
  return map[statName] ?? (target.defense||0);
}

// ─── BUFF HELPERS ─────────────────────────────────────────────────────────────
const buffLabel = (type) => type || 'Buff';

function applyStatBuff(combatant, statBonuses) {
  // Returns {updated, deltas} — deltas are exact amounts applied for lossless revert
  let updated = {...combatant};
  const deltas = {};
  statBonuses.forEach(b => {
    if(!b.amount || !b.stat) return;

    // Flat stat bonus (b.flat === true) — applies raw attribute-derived deltas
    if (b.flat) {
      const n = parseFloat(b.amount) * (b.sign === '-' ? -1 : 1);
      const key = b.stat;
      if (key === 'Strength') {
        const mPct = updated.meleeDmgPct || 0;
        const base = (v) => updated[v] ? Math.round(updated[v] * n / (100 + mPct)) : 0;
        const dd = {
          attack:     Math.round(n / 2),
          maxGuard:   n * 5,
          minDmg:     base('minDmg'),
          maxDmg:     base('maxDmg'),
          offMinDmg:  base('offMinDmg'),
          offMaxDmg:  base('offMaxDmg'),
          meleeDmgPct: n,
        };
        deltas[key] = dd;
        updated = {...updated,
          attack:     (updated.attack||0) + dd.attack,
          maxGuard:   Math.max(0, (updated.maxGuard||0) + dd.maxGuard),
          minDmg:     Math.max(0, (updated.minDmg||0) + dd.minDmg),
          maxDmg:     Math.max(0, (updated.maxDmg||0) + dd.maxDmg),
          offMinDmg:  Math.max(0, (updated.offMinDmg||0) + dd.offMinDmg),
          offMaxDmg:  Math.max(0, (updated.offMaxDmg||0) + dd.offMaxDmg),
          meleeDmgPct: (updated.meleeDmgPct||0) + dd.meleeDmgPct,
        };
      } else if (key === 'Agility') {
        const dd = { attack: Math.round(n/2), defense: Math.round(n/2), critDamage: n/200, flankingDamage: n/200, rangedDmgPct: n };
        deltas[key] = dd;
        updated = {...updated, attack:(updated.attack||0)+dd.attack, defense:(updated.defense||0)+dd.defense, critDamage:Math.max(1,(updated.critDamage||1)+dd.critDamage), flankingDamage:Math.max(1,(updated.flankingDamage||1)+dd.flankingDamage), rangedDmgPct:(updated.rangedDmgPct||0)+dd.rangedDmgPct};
      } else if (key === 'Vitality') {
        const dd = { maxHp: n };
        deltas[key] = dd;
        updated = {...updated, maxHp:(updated.maxHp||0)+dd.maxHp};
      } else if (key === 'Intelligence') {
        const dd = { magicAttack: Math.round(n/2) };
        deltas[key] = dd;
        updated = {...updated, magicAttack:(updated.magicAttack||0)+dd.magicAttack};
      } else if (key === 'Willpower') {
        const dd = { maxEnergy: n * 10, spellCritDamage: n/200, magicAttack: Math.round(n/2), spellDmgPct: n };
        deltas[key] = dd;
        updated = {...updated, maxEnergy:(updated.maxEnergy||0)+dd.maxEnergy, spellCritDamage:Math.max(1,(updated.spellCritDamage||1)+dd.spellCritDamage), magicAttack:(updated.magicAttack||0)+dd.magicAttack, spellDmgPct:(updated.spellDmgPct||0)+dd.spellDmgPct};
      } else if (key === 'Cunning') {
        const dd = { defense: Math.round(n/2), critChance: n/1000 };
        deltas[key] = dd;
        updated = {...updated, defense:(updated.defense||0)+dd.defense, critChance:Math.max(0,(updated.critChance||0)+dd.critChance)};
      } else if (key === 'Speed') {
        // Speed is a flat attribute — no derived combat stat mapping
        const dd = {};
        deltas[key] = dd;
      }
      return;
    }

    const pct = parseFloat(b.amount) * (b.sign==='-' ? -1 : 1);
    const key = b.stat;
    const d = (field) => Math.round((updated[field]||0) * pct / 100);
    if(key==='Strength') {
      const dd={attack:d('attack'),minDmg:d('minDmg'),maxDmg:d('maxDmg'),offMinDmg:d('offMinDmg'),offMaxDmg:d('offMaxDmg'),maxGuard:d('maxGuard')};
      deltas[key]=dd;
      updated={...updated,attack:(updated.attack||0)+dd.attack,minDmg:Math.max(0,(updated.minDmg||0)+dd.minDmg),maxDmg:Math.max(0,(updated.maxDmg||0)+dd.maxDmg),offMinDmg:Math.max(0,(updated.offMinDmg||0)+dd.offMinDmg),offMaxDmg:Math.max(0,(updated.offMaxDmg||0)+dd.offMaxDmg),maxGuard:Math.max(0,(updated.maxGuard||0)+dd.maxGuard)};
    } else if(key==='Agility') {
      const dd={attack:d('attack'),defense:d('defense'),critChance:pct/100*0.5*0.01,critDamage:pct/100*0.5,flankingDamage:pct/100*0.5};deltas[key]=dd;
      updated={...updated,attack:(updated.attack||0)+dd.attack,defense:(updated.defense||0)+dd.defense,critChance:Math.max(0,(updated.critChance||0)+dd.critChance),critDamage:Math.max(1,(updated.critDamage||1)+dd.critDamage),flankingDamage:Math.max(1,(updated.flankingDamage||1)+dd.flankingDamage)};
    } else if(key==='Vitality') {
      const dd={maxHp:d('maxHp')};deltas[key]=dd;updated={...updated,maxHp:(updated.maxHp||0)+dd.maxHp};
    } else if(key==='Intelligence') {
      const dd={magicAttack:d('magicAttack'),spellCritChance:pct/100*0.5*0.01};deltas[key]=dd;updated={...updated,magicAttack:(updated.magicAttack||0)+dd.magicAttack,spellCritChance:Math.max(0,(updated.spellCritChance||0)+dd.spellCritChance)};
    } else if(key==='Willpower') {
      const dd={maxEnergy:d('maxEnergy'),spellCritDamage:pct/100*0.5,spellDmgPct:d('spellDmgPct')};deltas[key]=dd;updated={...updated,maxEnergy:(updated.maxEnergy||0)+dd.maxEnergy,spellCritDamage:Math.max(1,(updated.spellCritDamage||1)+dd.spellCritDamage),spellDmgPct:(updated.spellDmgPct||0)+dd.spellDmgPct};
    } else if(key==='Cunning') {
      const dd={defense:d('defense'),critChance:pct/100*0.5*0.01};deltas[key]=dd;updated={...updated,defense:(updated.defense||0)+dd.defense,critChance:Math.max(0,(updated.critChance||0)+dd.critChance)};
    } else if(key==='Speed') {
      const dd={defense:d('defense')};deltas[key]=dd;updated={...updated,defense:(updated.defense||0)+dd.defense};
    } else if(key==='Health') {
      const dd={maxHp:d('maxHp')};deltas[key]=dd;updated={...updated,maxHp:(updated.maxHp||0)+dd.maxHp};
    } else if(key==='Guard') {
      const dd={maxGuard:d('maxGuard')};deltas[key]=dd;updated={...updated,maxGuard:(updated.maxGuard||0)+dd.maxGuard};
    } else if(key==='Energy') {
      const dd={maxEnergy:d('maxEnergy')};deltas[key]=dd;updated={...updated,maxEnergy:(updated.maxEnergy||0)+dd.maxEnergy};
    } else if(key==='Attack Rating') {
      const dd={attack:d('attack')};deltas[key]=dd;updated={...updated,attack:(updated.attack||0)+dd.attack};
    } else if(key==='Defense') {
      const dd={defense:d('defense')};deltas[key]=dd;updated={...updated,defense:(updated.defense||0)+dd.defense};
    } else if(key==='Magic Attack') {
      const dd={magicAttack:d('magicAttack')};deltas[key]=dd;updated={...updated,magicAttack:(updated.magicAttack||0)+dd.magicAttack};
    } else if(key==='Critical Hit Chance') {
      const dd={critChance:pct/100};deltas[key]=dd;updated={...updated,critChance:Math.max(0,(updated.critChance||0)+dd.critChance)};
    } else if(key==='Critical Hit Damage') {
      const dd={critDamage:pct/100};deltas[key]=dd;updated={...updated,critDamage:Math.max(1,(updated.critDamage||1)+dd.critDamage)};
    } else if(key==='Spell Critical Chance') {
      const dd={spellCritChance:pct/100};deltas[key]=dd;updated={...updated,spellCritChance:Math.max(0,(updated.spellCritChance||0)+dd.spellCritChance)};
    } else if(key==='Spell Critical Damage') {
      const dd={spellCritDamage:pct/100};deltas[key]=dd;updated={...updated,spellCritDamage:Math.max(1,(updated.spellCritDamage||1)+dd.spellCritDamage)};
    } else if(key==='Flanking Damage') {
      const dd={flankingDamage:pct/100};deltas[key]=dd;updated={...updated,flankingDamage:Math.max(1,(updated.flankingDamage||1)+dd.flankingDamage)};
    } else if(key==='Guard Damage') {
      const dd={guardDamage:d('guardDamage')};deltas[key]=dd;updated={...updated,guardDamage:(updated.guardDamage||0)+dd.guardDamage};
    } else if(key==='Armor Penetration') {
      const dd={armorPen:d('armorPen')};deltas[key]=dd;updated={...updated,armorPen:(updated.armorPen||0)+dd.armorPen};
    } else if(key.endsWith(' Resistance')) {
      const dmgT=key.replace(' Resistance','');
      const dd={[dmgT]:Math.round(pct)};deltas[key]=dd;
      const res=updated.resistances||{};
      updated={...updated,resistances:{...res,[dmgT]:(res[dmgT]||0)+dd[dmgT]}};
    }
  });
  return {updated, deltas};
}

function revertStatBuff(combatant, statBonuses, deltas) {
  // Use stored deltas for exact lossless revert
  if(!deltas) {
    // No deltas stored — fall back to re-applying with flipped sign (less accurate)
    const {updated} = applyStatBuff(combatant, statBonuses.map(b=>({...b, sign:b.sign==='-'?'+':'-'})));
    return updated;
  }
  let updated = {...combatant};
  statBonuses.forEach(b => {
    if(!b.amount || !b.stat) return;
    const key = b.stat;
    const dd = deltas[key];
    if(!dd) return;
    if(key==='Strength') updated={...updated,attack:(updated.attack||0)-dd.attack,minDmg:Math.max(0,(updated.minDmg||0)-dd.minDmg),maxDmg:Math.max(0,(updated.maxDmg||0)-dd.maxDmg),offMinDmg:Math.max(0,(updated.offMinDmg||0)-dd.offMinDmg),offMaxDmg:Math.max(0,(updated.offMaxDmg||0)-dd.offMaxDmg),maxGuard:Math.max(0,(updated.maxGuard||0)-dd.maxGuard),...(dd.meleeDmgPct!=null?{meleeDmgPct:(updated.meleeDmgPct||0)-dd.meleeDmgPct}:{})};
    else if(key==='Agility') updated={...updated,attack:(updated.attack||0)-dd.attack,defense:(updated.defense||0)-dd.defense,critDamage:Math.max(1,(updated.critDamage||1)-(dd.critDamage||0)),flankingDamage:Math.max(1,(updated.flankingDamage||1)-(dd.flankingDamage||0)),...(dd.rangedDmgPct!=null?{rangedDmgPct:(updated.rangedDmgPct||0)-dd.rangedDmgPct}:{})};
    else if(key==='Vitality') updated={...updated,maxHp:(updated.maxHp||0)-dd.maxHp};
    else if(key==='Intelligence') updated={...updated,magicAttack:(updated.magicAttack||0)-dd.magicAttack,...(dd.spellCritChance!=null?{spellCritChance:Math.max(0,(updated.spellCritChance||0)-dd.spellCritChance)}:{})};
    else if(key==='Willpower') updated={...updated,maxEnergy:(updated.maxEnergy||0)-dd.maxEnergy,spellCritDamage:Math.max(1,(updated.spellCritDamage||1)-(dd.spellCritDamage||0)),magicAttack:(updated.magicAttack||0)-(dd.magicAttack||0),spellDmgPct:(updated.spellDmgPct||0)-(dd.spellDmgPct||0)};
    else if(key==='Cunning') updated={...updated,defense:(updated.defense||0)-dd.defense,critChance:Math.max(0,(updated.critChance||0)-dd.critChance)};
    else if(key==='Speed') updated={...updated,defense:(updated.defense||0)-dd.defense};
    else if(key==='Health') updated={...updated,maxHp:(updated.maxHp||0)-dd.maxHp};
    else if(key==='Guard') updated={...updated,maxGuard:(updated.maxGuard||0)-dd.maxGuard};
    else if(key==='Energy') updated={...updated,maxEnergy:(updated.maxEnergy||0)-dd.maxEnergy};
    else if(key==='Attack Rating') updated={...updated,attack:(updated.attack||0)-dd.attack};
    else if(key==='Defense') updated={...updated,defense:(updated.defense||0)-dd.defense};
    else if(key==='Magic Attack') updated={...updated,magicAttack:(updated.magicAttack||0)-dd.magicAttack};
    else if(key==='Critical Hit Chance') updated={...updated,critChance:Math.max(0,(updated.critChance||0)-dd.critChance)};
    else if(key==='Critical Hit Damage') updated={...updated,critDamage:Math.max(1,(updated.critDamage||1)-dd.critDamage)};
    else if(key==='Spell Critical Chance') updated={...updated,spellCritChance:Math.max(0,(updated.spellCritChance||0)-dd.spellCritChance)};
    else if(key==='Spell Critical Damage') updated={...updated,spellCritDamage:Math.max(1,(updated.spellCritDamage||1)-dd.spellCritDamage)};
    else if(key==='Flanking Damage') updated={...updated,flankingDamage:Math.max(1,(updated.flankingDamage||1)-dd.flankingDamage)};
    else if(key==='Guard Damage') updated={...updated,guardDamage:(updated.guardDamage||0)-dd.guardDamage};
    else if(key==='Armor Penetration') updated={...updated,armorPen:(updated.armorPen||0)-dd.armorPen};
    else if(key.endsWith(' Resistance')) {
      const dmgT=key.replace(' Resistance','');
      const res=updated.resistances||{};
      updated={...updated,resistances:{...res,[dmgT]:(res[dmgT]||0)-dd[dmgT]}};
    }
  });
  return updated;
}

// ─── CARD ─────────────────────────────────────────────────────────────────────
function Card({ c, isCurrent, isHit, onManageEffects, onFullHeal, onDefeat }) {
  const dead = c.hp <= 0;
  const hasEffects=(c.conditions||[]).length>0||(c.buffs||[]).length>0;
  return (
    <div style={{background:dead?'#111827':'#1f2937',border:`2px solid ${isCurrent?'#fbbf24':'transparent'}`,borderRadius:8,padding:10,marginBottom:8,opacity:dead?0.5:1,animation:isHit?'hitShake 0.35s ease':'none'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <strong style={{color:c.type==='player'?'#93c5fd':'#fca5a5',fontSize:13}}>{c.name}</strong>
          {hasEffects&&onManageEffects&&<button onClick={()=>onManageEffects(c.id)} style={{background:'#374151',border:'1px solid #4b5563',borderRadius:4,color:'#9ca3af',fontSize:9,padding:'1px 5px',cursor:'pointer'}}>✎ effects</button>}
          {onFullHeal&&<button onClick={()=>onFullHeal(c.id)} style={{background:'#052e16',border:'1px solid #166534',borderRadius:4,color:'#4ade80',fontSize:9,padding:'1px 5px',cursor:'pointer'}}>✚ heal</button>}
          {onDefeat&&!dead&&<button onClick={()=>onDefeat(c.id)} style={{background:'#2d0a0a',border:'1px solid #7f1d1d',borderRadius:4,color:'#ef4444',fontSize:9,padding:'1px 5px',cursor:'pointer'}}>✕ defeat</button>}
        </div>
        <div style={{display:'flex',gap:3,flexWrap:'wrap',justifyContent:'flex-end'}}>
          {(c.conditions||[]).map(cd=>{const cc=CONDITION_COLORS[cd.type]||{bg:'#1e3a5f',text:'#93c5fd'};return(<span key={cd.type} style={{background:cc.bg,color:cc.text,borderRadius:4,fontSize:9,padding:'1px 4px'}}>{cd.type} {cd.permanent?'∞':cd.rounds+'s'}</span>);})}
          {(c.buffs||[]).map(b=><span key={b.type} style={{background:b.permanent?'#2e1065':'#431407',color:b.permanent?'#c084fc':'#fb923c',borderRadius:4,fontSize:9,padding:'1px 4px'}}>{buffLabel(b.type)} {b.permanent?'∞':b.endOfTurn?'ETT':b.rounds+'s'}</span>)}
        </div>
      </div>

      <ResourceBar current={c.hp} max={c.maxHp} color="#f87171" label="Health"/>
      <div style={{fontSize:11,color:'#6b7280',marginTop:4}}>{c.type==='monster'&&c.weaponType==='Ranged'?'🏹 ':c.type==='monster'?'⚔ ':''}{c.weapon||'Unarmed'} {c.minDmg||0}–{c.maxDmg||0}dmg{c.type==='monster'&&c.weaponType?' ('+c.weaponType+')':''}</div>
      {(c.talents||[]).length>0&&<div style={{fontSize:10,color:'#a78bfa',marginTop:2}}>{c.talents.map(t=>`${t.name}${t._assignedPoints&&t._assignedPoints>1?' ('+t._assignedPoints+')':''}`).join(' · ')}</div>}
      {(Object.keys(c.damageMultipliers||{}).length>0||(c.immuneConditions||[]).length>0||(c.damageImmunities||[]).length>0)&&(
        <div style={{display:'flex',gap:3,flexWrap:'wrap',marginTop:4}}>
          {Object.entries(c.damageMultipliers||{}).map(([type,mult])=>(
            mult>1
              ? <span key={type} style={{background:'#431407',color:'#fb923c',borderRadius:4,fontSize:9,padding:'1px 4px'}}>⚠ {type} ×{mult}</span>
              : <span key={type} style={{background:'#052e16',color:'#4ade80',borderRadius:4,fontSize:9,padding:'1px 4px'}}>🛡 {type} ×{mult}</span>
          ))}
          {(c.damageImmunities||[]).map(type=>(
            <span key={type} style={{background:'#052e16',color:'#4ade80',borderRadius:4,fontSize:9,padding:'1px 4px'}}>Immune: {type} dmg</span>
          ))}
          {(c.immuneConditions||[]).map(cond=>(
            <span key={cond} style={{background:'#1f2937',color:'#6b7280',borderRadius:4,fontSize:9,padding:'1px 4px',border:'1px solid #374151'}}>Immune: {cond}</span>
          ))}
        </div>
      )}
      {dead&&<div style={{color:'#ef4444',fontSize:11,marginTop:3}}>✕ DEFEATED</div>}
    </div>
  );
}

// ─── TALENT MOD MODAL ─────────────────────────────────────────────────────────
function TalentModModal({ spell, caster, target, onConfirm, onCancel }) {
  const action = spell.talentModAction||'restore';
  const isSyphon = action==='syphon';
  const isRestore = action==='restore';
  const isRemove  = action==='remove';
  const isSteal   = action==='steal';
  const isReveal  = action==='reveal';
  const tiers = (spell.talentModTiers||[]).map(t=>t.toLowerCase());
  const hpCost = spell.talentModHpCost||0;
  const isSelf = caster.id === target.id;

  // amounts
  const totalRemove  = isSyphon ? (spell.talentModSyphonRemoveAmount||1)  : (isRemove  ? (spell.talentModAmount||1) : 0);
  const totalRestore = isSyphon ? (spell.talentModSyphonRestoreAmount||1) : (isRestore ? (spell.talentModAmount||1) : 0);

  // eligible talents for remove side (from target)
  const targetDbTalents = loadPlayerDbTalents(target.skillPoints||{});
  const eligibleRemove = targetDbTalents.filter(({talent, pts}) => {
    if(!tiers.includes((talent.tier||'').toLowerCase())) return false;
    const uses = (target.talentUses||{})[talent.id] ?? pts;
    return uses > 0;
  });

  // eligible talents for restore side (from caster)
  const casterDbTalents = loadPlayerDbTalents(caster.skillPoints||{});
  const eligibleRestore = casterDbTalents.filter(({talent, pts}) => {
    if(!tiers.includes((talent.tier||'').toLowerCase())) return false;
    const uses = (caster.talentUses||{})[talent.id];
    if(uses === undefined) return false;
    return uses < pts;
  });

  const [removeAlloc, setRemoveAlloc] = React.useState({});
  const [restoreAlloc, setRestoreAlloc] = React.useState({});

  const totalRemovedSoFar  = Object.values(removeAlloc).reduce((s,v)=>s+v,0);
  const totalRestoredSoFar = Object.values(restoreAlloc).reduce((s,v)=>s+v,0);
  const remainingRemove  = totalRemove  - totalRemovedSoFar;
  const remainingRestore = totalRestore - totalRestoredSoFar;

  const adjustAlloc = (setFn, totalAllowed, currentAlloc, talentId, delta, maxForTalent) => {
    setFn(prev => {
      const cur = prev[talentId]||0;
      const curTotal = Object.values(prev).reduce((s,v)=>s+v,0);
      const next = Math.max(0, Math.min(cur+delta, maxForTalent));
      if(next > cur && curTotal >= totalAllowed) return prev;
      const updated = {...prev, [talentId]: next};
      if(updated[talentId]===0) delete updated[talentId];
      return updated;
    });
  };

  // Steal: single-select from target's eligible talents with uses remaining
  const [stealSelected, setStealSelected] = React.useState(null);

  const canConfirm = isSteal
    ? stealSelected !== null
    : (totalRemove===0 || totalRemovedSoFar>0) && (totalRestore===0 || totalRestoredSoFar>0 || (isSyphon && eligibleRestore.length===0));

  const accentRemove  = '#ef4444';
  const accentRestore = '#f59e0b';
  const borderColor   = isSyphon ? '#6b21a8' : isRestore ? '#92400e' : '#7f1d1d';
  const titleColor    = isSyphon ? '#c084fc' : isRestore ? '#f59e0b' : '#ef4444';

  const TalentGrid = ({eligible, alloc, totalAllowed, remaining, accentColor, label, isRestoreSide, sourceChar}) => (
    <div>
      <div style={{fontSize:11,color:'#6b7280',textTransform:'uppercase',letterSpacing:1,marginBottom:6,display:'flex',justifyContent:'space-between'}}>
        <span>{label}</span>
        <span style={{color:remaining===0?'#4ade80':accentColor}}>{totalAllowed-remaining}/{totalAllowed} assigned</span>
      </div>
      {eligible.length===0 ? (
        <div style={{color:'#6b7280',fontStyle:'italic',fontSize:12,padding:'8px 0'}}>No eligible talents.</div>
      ) : (
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {eligible.map(({talent, pts, treeColor}) => {
            const currentUses = (sourceChar.talentUses||{})[talent.id] ?? pts;
            const assigned = alloc[talent.id]||0;
            const maxAssignable = isRestoreSide ? Math.min(totalAllowed, pts - currentUses) : Math.min(totalAllowed, currentUses);
            const hasAlloc = assigned>0;
            return (
              <div key={talent.id}
                style={{width:132,background:hasAlloc?'#1a0a00':'#111827',border:`1px solid ${hasAlloc?accentColor:treeColor+'55'}`,borderRadius:8,overflow:'hidden',flexShrink:0}}>
                <div style={{background:'#0a0f1a',padding:'5px 7px',borderBottom:'1px solid #374151'}}>
                  <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:2}}>
                    <span style={{width:5,height:5,borderRadius:'50%',background:treeColor,display:'inline-block',flexShrink:0}}/>
                    <span style={{fontSize:10,fontWeight:700,color:'#f0c040',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{talent.name}</span>
                  </div>
                  <div style={{display:'flex',gap:3,alignItems:'center'}}>
                    <span style={{fontSize:8,color:'#9ca3af',background:'#1f2937',padding:'1px 3px',borderRadius:3}}>{talent.tier}</span>
                    <span style={{fontSize:8,color:isRestoreSide?'#4ade80':'#f87171',background:'#1f2937',padding:'1px 3px',borderRadius:3,marginLeft:'auto'}}>{currentUses}/{pts}</span>
                  </div>
                </div>
                <div style={{width:'100%',aspectRatio:'1/1',background:'#070b12',overflow:'hidden'}}>
                  {talent.image
                    ? <img src={talent.image} alt={talent.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                    : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'#1f2937',fontSize:9}}>No image</div>
                  }
                </div>
                <div style={{padding:'5px 7px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <button onClick={()=>adjustAlloc(isRestoreSide?setRestoreAlloc:setRemoveAlloc, totalAllowed, alloc, talent.id,-1,maxAssignable)}
                    disabled={assigned===0}
                    style={{background:'#374151',border:'none',borderRadius:4,color:'#f9fafb',width:22,height:22,cursor:assigned===0?'default':'pointer',fontSize:13,opacity:assigned===0?0.3:1,lineHeight:1}}>−</button>
                  <span style={{color:hasAlloc?accentColor:'#6b7280',fontWeight:'bold',fontSize:13,minWidth:18,textAlign:'center'}}>{assigned}</span>
                  <button onClick={()=>adjustAlloc(isRestoreSide?setRestoreAlloc:setRemoveAlloc, totalAllowed, alloc, talent.id,1,maxAssignable)}
                    disabled={remaining===0||assigned>=maxAssignable}
                    style={{background:'#374151',border:'none',borderRadius:4,color:'#f9fafb',width:22,height:22,cursor:(remaining===0||assigned>=maxAssignable)?'default':'pointer',fontSize:13,opacity:(remaining===0||assigned>=maxAssignable)?0.3:1,lineHeight:1}}>+</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
      <div style={{background:'#1f2937',borderRadius:12,border:`1px solid ${borderColor}`,width:isSyphon?600:520,maxHeight:'85vh',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid #374151'}}>
          <div style={{fontSize:15,fontWeight:'bold',color:titleColor,marginBottom:4}}>
            {isSyphon?'⟳':isRestore?'✦':'✕'} {spell.name}
          </div>
          <div style={{fontSize:12,color:'#9ca3af'}}>
            {hpCost>0 && <span>Costs <span style={{color:'#f87171',fontWeight:'bold'}}>{hpCost} HP</span>. </span>}
            {isSyphon
              ? <>Take <span style={{color:accentRemove,fontWeight:'bold'}}>{totalRemove}</span> use{totalRemove>1?'s':''} from <span style={{color:'#fca5a5'}}>{target.name}</span> — restore <span style={{color:accentRestore,fontWeight:'bold'}}>{totalRestore}</span> use{totalRestore>1?'s':''} to <span style={{color:'#93c5fd'}}>{caster.name}</span>.</>
              : <>{isRestore?'Restore':'Remove'} <span style={{color:titleColor,fontWeight:'bold'}}>{spell.talentModAmount||1}</span> use{(spell.talentModAmount||1)>1?'s':''} {isRestore?'to':'from'} <span style={{color:isRestore?'#93c5fd':'#fca5a5'}}>{isRestore?caster.name:target.name}</span>{!isSelf&&<span> on <span style={{color:'#93c5fd'}}>{target.name}</span></span>}.</>
            }
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:14,display:'flex',flexDirection:'column',gap:16}}>
          {isSteal && (
            <div>
              <div style={{fontSize:11,color:'#a78bfa',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>
                Select 1 talent to steal from {target.name}
              </div>
              {eligibleRemove.length===0 ? (
                <div style={{color:'#6b7280',fontStyle:'italic',fontSize:12}}>No eligible talents with remaining uses.</div>
              ) : (
                <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
                  {eligibleRemove.map(({talent, pts, treeColor})=>{
                    const currentUses=(target.talentUses||{})[talent.id]??pts;
                    const isSel=stealSelected===talent.id;
                    return (
                      <div key={talent.id} onClick={()=>setStealSelected(talent.id)}
                        style={{width:140,background:isSel?'#150a2a':'#111827',border:`1px solid ${isSel?'#a78bfa':treeColor+'55'}`,borderRadius:8,overflow:'hidden',cursor:'pointer',flexShrink:0}}>
                        <div style={{background:'#0a0f1a',padding:'6px 8px',borderBottom:'1px solid #374151'}}>
                          <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:2}}>
                            <span style={{width:6,height:6,borderRadius:'50%',background:treeColor,display:'inline-block',flexShrink:0}}/>
                            <span style={{fontSize:11,fontWeight:700,color:'#f0c040',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{talent.name}</span>
                          </div>
                          <div style={{display:'flex',gap:4}}>
                            <span style={{fontSize:9,color:'#9ca3af',background:'#1f2937',padding:'1px 4px',borderRadius:3}}>{talent.tier}</span>
                            <span style={{fontSize:9,color:'#f87171',background:'#1f2937',padding:'1px 4px',borderRadius:3,marginLeft:'auto'}}>{currentUses}/{pts}</span>
                          </div>
                        </div>
                        <div style={{width:'100%',aspectRatio:'1/1',background:'#070b12',overflow:'hidden'}}>
                          {talent.image ? <img src={talent.image} alt={talent.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/> : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'#1f2937',fontSize:10}}>No image</div>}
                        </div>
                        <div style={{padding:'4px 8px',fontSize:10,color:'#9ca3af'}}>{talent.description||''}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
          {!isSteal && (isRemove||isSyphon) && (
            <TalentGrid
              eligible={eligibleRemove}
              alloc={removeAlloc}
              totalAllowed={totalRemove}
              remaining={remainingRemove}
              accentColor={accentRemove}
              label={isSyphon?`Take from ${target.name}`:'Remove uses'}
              isRestoreSide={false}
              sourceChar={target}
            />
          )}
          {!isSteal && isSyphon && <div style={{borderTop:'1px solid #374151'}}/>}
          {!isSteal && (isRestore||isSyphon) && (
            <div>
              <TalentGrid
                eligible={eligibleRestore}
                alloc={restoreAlloc}
                totalAllowed={totalRestore}
                remaining={remainingRestore}
                accentColor={accentRestore}
                label={isSyphon?`Restore to ${caster.name}`:'Restore uses'}
                isRestoreSide={true}
                sourceChar={caster}
              />
              {isSyphon && eligibleRestore.length===0 && (
                <div style={{fontSize:11,color:'#6b7280',fontStyle:'italic',marginTop:4}}>
                  {caster.name} has no spent talent uses to restore — syphon will only remove from {target.name}.
                </div>
              )}
            </div>
          )}
        </div>
        <div style={{padding:'10px 14px',borderTop:'1px solid #374151',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onCancel} style={{background:'#374151',color:'#f9fafb',border:'none',borderRadius:5,padding:'7px 18px',cursor:'pointer',fontSize:13}}>Cancel</button>
          <button onClick={()=>canConfirm&&onConfirm(isSteal?{removeAlloc:{[stealSelected]:1},restoreAlloc:{}}:{removeAlloc,restoreAlloc})} disabled={!canConfirm}
            style={{background:canConfirm?(isSyphon?'#4a1d96':isRestore?'#78350f':'#7f1d1d'):'#374151',color:'#f9fafb',border:'none',borderRadius:5,padding:'7px 18px',cursor:canConfirm?'pointer':'default',fontSize:13,fontWeight:'bold',opacity:canConfirm?1:0.5}}>
            {isSteal?'⟳ Steal':isSyphon?'⟳ Syphon':isRestore?'✦ Restore':'✕ Remove'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── REVEAL TALENTS MODAL ────────────────────────────────────────────────────
function RevealTalentsModal({ target, onClose }) {
  const isMonster = target.type === 'monster';
  const dbTalents = isMonster
    ? (target.talents||[]).map(t => ({ talent: t, pts: t._assignedPoints||t.maxPoints||1, treeColor: t._treeColor||'#c9a227', treeName: t._treeName||'Abilities' }))
    : loadPlayerDbTalents(target.skillPoints||{});

  const typeColors = {Passive:'#9ca3af',Melee:'#f87171',Ranged:'#34d399','Spell Attack':'#a78bfa','Spell Heal':'#4ade80',Reaction:'#60a5fa',Buff:'#fb923c',Enchantment:'#c084fc',Summon:'#67e8f9','Raise Summon':'#c084fc',Resurrection:'#f9a8d4','Blood Sacrifice':'#dc2626','Talent Manipulation':'#f59e0b','Banish':'#7c3aed'};

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
      <div style={{background:'#1f2937',borderRadius:12,border:'1px solid #4b5563',width:560,maxHeight:'85vh',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid #374151',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:15,fontWeight:'bold',color:'#f59e0b',marginBottom:2}}>👁 {target.name}'s Talents</div>
            <div style={{fontSize:11,color:'#6b7280'}}>{dbTalents.length} talent{dbTalents.length!==1?'s':''} revealed</div>
          </div>
          <button onClick={onClose} style={{background:'#374151',border:'none',borderRadius:5,color:'#f9fafb',padding:'6px 14px',cursor:'pointer',fontSize:12}}>Close</button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:14}}>
          {dbTalents.length === 0 ? (
            <div style={{color:'#6b7280',fontStyle:'italic',fontSize:13,textAlign:'center',padding:30}}>No talents found.</div>
          ) : (
            <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
              {dbTalents.map(({talent, pts, treeColor}) => {
                const uses = (target.talentUses||{})[talent.id] ?? pts;
                return (

function BanishModal({ spell, caster, allCombatants, onConfirm, onCancel }) {
  const max = spell.banishCount||1;
  const dead = allCombatants.filter(c => (c.hp||0) <= 0);
  const [selected, setSelected] = React.useState(new Set());

  const toggle = (id) => {
    setSelected(prev => {
      const next = new Set(prev);
      if(next.has(id)) { next.delete(id); return next; }
      if(next.size >= max) return prev; // cap
      next.add(id); return next;
    });
  };

  const canConfirm = selected.size > 0;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>

          <div style={{fontSize:15,fontWeight:'bold',color:'#a78bfa',marginBottom:4}}>✦ {spell.name}</div>
          <div style={{fontSize:12,color:'#9ca3af'}}>
            Select up to <span style={{color:'#a78bfa',fontWeight:'bold'}}>{max}</span> defeated combatant{max>1?'s':''} to permanently banish.
            <span style={{color:'#ef4444'}}> They cannot be resurrected.</span>
          </div>
          <div style={{marginTop:4,fontSize:12,color:selected.size===max?'#a78bfa':'#6b7280'}}>
            {selected.size}/{max} selected
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:12}}>
          {dead.length===0 ? (
            <div style={{color:'#6b7280',fontStyle:'italic',fontSize:12,textAlign:'center',padding:20}}>
              No defeated combatants on the battlefield.
            </div>
          ) : (
            <div style={{display:'flex',flexWrap:'wrap',gap:10}}>

                  <div key={c.id} onClick={()=>toggle(c.id)}

                    <div style={{background:'#0a0f1a',padding:'7px 9px',borderBottom:'1px solid #374151'}}>
                      <div style={{fontSize:11,fontWeight:700,color:'#f9fafb',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</div>
                      <div style={{display:'flex',gap:4,marginTop:2}}>
                        <span style={{fontSize:9,color:sideColor,background:'#1f2937',padding:'1px 4px',borderRadius:3}}>{isEnemy?'Enemy':'Ally'}</span>
                        <span style={{fontSize:9,color:'#ef4444',background:'#1f2937',padding:'1px 4px',borderRadius:3,marginLeft:'auto'}}>Defeated</span>
                      </div>
                    </div>
                    <div style={{width:'100%',aspectRatio:'1/1',background:'#070b12',overflow:'hidden',filter:'grayscale(100%) brightness(0.4)'}}>
                      {c.image
                        ? <img src={c.image} alt={c.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                        : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'#374151',fontSize:28}}>💀</div>
                      }
                    </div>
                    {isSel && (
                      <div style={{padding:'5px 8px',textAlign:'center',fontSize:11,color:'#a78bfa',fontWeight:'bold'}}>✦ Banished</div>

function InventoryModal({ playerId, playerName, combatantId, onClose, onHeal, onUseItem, onStatBuff, onThrow }) {
  const [items, setItems] = React.useState([]);

  React.useEffect(() => {
    try {
      const raw = localStorage.getItem('cs_inventory_' + playerId);
      if (raw) { const parsed = JSON.parse(raw); setItems(Array.isArray(parsed) ? parsed : []); }
    } catch {}
  }, [playerId]);

  const isConsumable = (item) => item && item.name && (item.category === 'Alchemy' || item.category === 'Food') && (item.effect || item.foodEffect);
  const isThrowable = (item) => item && item.name && (item.throwable || item.subcategory === 'Throwing Weapons') && (item.throwMinDmg || item.minDmg);

  function parseHeal(text) {
    if (!text) return null;
    const m = text.match(/restores?\s+(\d+)[-–](\d+)\s*hp/i);
    if (m) {
      const min = parseInt(m[1]), max = parseInt(m[2]);
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    const m2 = text.match(/restores?\s+(\d+)\s*hp/i);
    if (m2) return parseInt(m2[1]);
    return null;
  }

  function parseFlatStatBuff(text) {
    if (!text) return null;
    // Matches: "Increases Strength by 20 for 3 rounds"
    const m = text.match(/increases?\s+(\w+(?:\s+\w+)?)\s+by\s+(\d+)\s+for\s+(\d+)\s+(?:rounds?|seconds?)/i);
    if (m) return { stat: m[1].trim(), amount: parseInt(m[2]), rounds: parseInt(m[3]) };
    return null;
  }

  function removeItem(item) {
    const idx = items.indexOf(item);
    let newItems;
    if (item.qty && item.qty > 1) {
      newItems = items.map((it, i) => i === idx ? {...it, qty: it.qty - 1} : it);
    } else {
      newItems = items.filter((_, i) => i !== idx);
    }
    setItems(newItems);
    try { localStorage.setItem('cs_inventory_' + playerId, JSON.stringify(newItems)); } catch {}
  }

  function useItem(item) {
    const effectText = item.effect || item.foodEffect || '';
    const healAmt = parseHeal(effectText);
    const statBuff = parseFlatStatBuff(effectText);
    if (healAmt) onHeal(combatantId, healAmt, item.name);
    else if (statBuff && onStatBuff) onStatBuff(combatantId, statBuff, item.name);
    else onUseItem(combatantId, item.name, effectText);
    removeItem(item);
  }

  function throwItem(item) {
    const minDmg = parseInt(item.throwMinDmg || item.minDmg) || 0;
    const maxDmg = parseInt(item.throwMaxDmg || item.maxDmg) || 0;
    const dmgType = item.throwDmgType || 'Physical';
    onThrow(item, minDmg, maxDmg, dmgType, () => removeItem(item));
  }

  const throwables = items.filter(isThrowable);
  const usableItems = items.filter(item => isConsumable(item) && !isThrowable(item));
  const otherItems = items.filter(item => item && item.name && !isConsumable(item) && !isThrowable(item));

  const itemRow = (item, actionBtn) => (
    <div style={{background:'#111827',borderRadius:8,padding:'10px 12px',marginBottom:6,border:'1px solid #374151',display:'flex',alignItems:'center',gap:10}}>
      <div style={{flex:1}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{fontSize:13,color:'#f9fafb',fontWeight:600}}>{item.name}</div>
          {item.qty > 1 && <div style={{fontSize:11,color:'#fbbf24',fontWeight:700,background:'#451a03',borderRadius:4,padding:'1px 5px'}}>{'x'+item.qty}</div>}
        </div>
        <div style={{fontSize:11,color:'#9ca3af',marginTop:2}}>{item.effect||item.foodEffect||(item.throwDmgType||'Physical')+' '+((item.throwMinDmg||item.minDmg)||0)+'–'+((item.throwMaxDmg||item.maxDmg)||0)+' dmg'}</div>
      </div>
      {actionBtn}
    </div>
  );

  return (
    <div onClick={e => { if (e.target === e.currentTarget) onClose(); }}
      style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16}}>
      <div style={{background:'#1f2937',borderRadius:12,border:'1px solid #4b5563',width:'100%',maxWidth:480,maxHeight:'80vh',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'12px 18px',borderBottom:'1px solid #374151',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'#4ade80',fontSize:13,fontWeight:700,letterSpacing:1}}>{'🎒 Inventory — ' + playerName}</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#6b7280',cursor:'pointer',fontSize:18}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:12}}>
          {throwables.length > 0 && (
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,color:'#fb923c',letterSpacing:2,marginBottom:8}}>THROWABLE</div>
              {throwables.map((item,idx) => itemRow(item,
                <button key={idx} onClick={() => throwItem(item)}
                  style={{background:'#92400e',border:'1px solid #b45309',color:'#fcd34d',borderRadius:5,padding:'5px 12px',cursor:'pointer',fontSize:12,fontWeight:700,whiteSpace:'nowrap'}}>
                  🎯 Throw
                </button>
              ))}
            </div>
          )}
          {usableItems.length > 0 && (
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,color:'#4ade80',letterSpacing:2,marginBottom:8}}>CONSUMABLES</div>
              {usableItems.map((item,idx) => itemRow(item,
                <button key={idx} onClick={() => useItem(item)}
                  style={{background:'#166534',border:'1px solid #15803d',color:'#4ade80',borderRadius:5,padding:'5px 12px',cursor:'pointer',fontSize:12,fontWeight:700,whiteSpace:'nowrap'}}>
                  Use
                </button>
              ))}
            </div>
          )}
          {otherItems.length > 0 && (
            <div>
              <div style={{fontSize:10,color:'#9ca3af',letterSpacing:2,marginBottom:8}}>OTHER ITEMS</div>
              {otherItems.map((item,idx) => (
                <div key={idx} style={{background:'#111827',borderRadius:8,padding:'8px 12px',marginBottom:4,border:'1px solid #1f2937',opacity:0.6}}>
                  <div style={{fontSize:12,color:'#9ca3af'}}>{item.name}</div>
                </div>
              ))}
            </div>
          )}
          {throwables.length === 0 && usableItems.length === 0 && otherItems.length === 0 && (
            <div style={{fontSize:13,color:'#4b5563',fontStyle:'italic',textAlign:'center',padding:30}}>Inventory is empty.</div>
          )}
        </div>
        <div style={{padding:'10px 18px',borderTop:'1px solid #374151',textAlign:'right'}}>
          <button onClick={onClose} style={{background:'#374151',color:'#f9fafb',border:'none',borderRadius:6,padding:'6px 16px',cursor:'pointer',fontSize:13}}>Close</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const lsGet=(key,def)=>{try{const v=localStorage.getItem(key);return v!=null?JSON.parse(v):def;}catch{return def;}};

  const [phase,setPhase]=useState('setup');
  const [selectedEnvironment,setSelectedEnvironment]=useState(()=>lsGet('cs_selectedEnvironment',''));
  const [adamSkillPoints,setAdamSkillPoints]=useState(()=>lsGet('cs_adamSkillPoints',{}));
  const [craigSkillPoints,setCraigSkillPoints]=useState(()=>lsGet('cs_craigSkillPoints',{}));
  const [brianSkillPoints,setBrianSkillPoints]=useState(()=>lsGet('cs_brianSkillPoints',{}));
  const [sheets,setSheets]=useState(()=>lsGet('cs_sheets',{adam:createSheetState(),brian:createSheetState(),craig:createSheetState()}));
  const [playerAbilities,setPlayerAbilities]=useState(()=>lsGet('cs_playerAbilities',Object.fromEntries(PLAYER_DEFS.map(p=>[p.id,[]]))));
  const [abilityPickerFor,setAbilityPickerFor]=useState(null);
  const [playerSpecialAttacks,setPlayerSpecialAttacks]=useState(()=>lsGet('cs_playerSpecialAttacks',Object.fromEntries(PLAYER_DEFS.map(p=>[p.id,[]]))));
  const [attackPickerFor,setAttackPickerFor]=useState(null);
  const [selectedCategory,setSelectedCategory]=useState(null);
  const [counts,setCounts]=useState(()=>lsGet('cs_counts',{}));
  const [startHp,setStartHp]=useState(()=>lsGet('cs_startHp',Object.fromEntries(PLAYER_DEFS.map(p=>[p.id,100]))));
  const [startGuard,setStartGuard]=useState(()=>lsGet('cs_startGuard',Object.fromEntries(PLAYER_DEFS.map(p=>[p.id,0]))));
  const [monsterStats,setMonsterStats]=useState(()=>lsGet('cs_monsterStats',{}));

  useEffect(()=>{try{localStorage.setItem('cs_adamSkillPoints',JSON.stringify(adamSkillPoints));}catch{}},[adamSkillPoints]);
  useEffect(()=>{try{localStorage.setItem('cs_craigSkillPoints',JSON.stringify(craigSkillPoints));}catch{}},[craigSkillPoints]);
  useEffect(()=>{try{localStorage.setItem('cs_playerAbilities',JSON.stringify(playerAbilities));}catch{}},[playerAbilities]);
  useEffect(()=>{try{localStorage.setItem('cs_playerSpecialAttacks',JSON.stringify(playerSpecialAttacks));}catch{}},[playerSpecialAttacks]);
  useEffect(()=>{try{localStorage.setItem('cs_counts',JSON.stringify(counts));}catch{}},[counts]);
  useEffect(()=>{try{localStorage.setItem('cs_startHp',JSON.stringify(startHp));}catch{}},[startHp]);
  useEffect(()=>{try{localStorage.setItem('cs_startGuard',JSON.stringify(startGuard));}catch{}},[startGuard]);
  useEffect(()=>{try{localStorage.setItem('cs_monsterStats',JSON.stringify(monsterStats));}catch{}},[monsterStats]);
  useEffect(()=>{try{localStorage.setItem('cs_selectedEnvironment',JSON.stringify(selectedEnvironment));}catch{}},[selectedEnvironment]);

  // ── Firebase combat sync ──────────────────────────────────────────────────
  const _fbCombatTimers  = useRef({});
  const _fbCombatPending = useRef({}); // per-key write-pending flag

  function fbSanitize(val) {
    if (Array.isArray(val)) return val.map(fbSanitize);
    if (val && typeof val === 'object') {
      const out = {};
      for (const k in val) out[k.replace(/\//g, '|SLASH|')] = fbSanitize(val[k]);
      return out;
    }
    return val;
  }
  function fbRestore(val) {
    if (Array.isArray(val)) return val.map(fbRestore);
    if (val && typeof val === 'object') {
      const keys = Object.keys(val);
      // Firebase converts arrays to numeric-keyed objects — restore them
      const isArr = keys.length > 0 && keys.every(k => /^\d+$/.test(k));
      if (isArr) {
        const arr = [];
        keys.forEach(k => { arr[parseInt(k)] = fbRestore(val[k]); });
        return arr;
      }
      const out = {};
      for (const k in val) out[k.replace(/\|SLASH\|/g, '/')] = fbRestore(val[k]);
      return out;
    }
    return val;
  }

  function fbCombatWrite(key, value, debounce=300) {
    if (!window._fbDb) return;
    clearTimeout(_fbCombatTimers.current[key]);
    _fbCombatTimers.current[key] = setTimeout(() => {
      _fbCombatPending.current[key] = true;
      window._fbDb.ref('/combat/' + key).set(fbSanitize(value))
        .then(() => { setTimeout(() => { _fbCombatPending.current[key] = false; }, 300); })
        .catch(e => { _fbCombatPending.current[key] = false; console.warn('FB combat write', key, e); });
    }, debounce);
  }

  // Listen for remote combat state changes
  useEffect(() => {
    if (!window._fbDb) return;
    const refs = [];
    const listen = (key, apply, allowNull=false) => {
      const ref = window._fbDb.ref('/combat/' + key);
      ref.on('value', snap => {
        if (_fbCombatPending.current[key]) return; // skip our own echo
        const raw = snap.val();
        if (raw == null && !allowNull) return;
        apply(raw == null ? null : fbRestore(raw));
      });
      refs.push(ref);
    };
    listen('phase',        d => { if (d != null) setPhase(d); });
    listen('combatants',   d => { if (d != null) { setCombatants(d); combatantsRef.current = d; } });
    listen('order',        d => { if (d != null) setOrder(d); });
    listen('activeTurnId', d => { setActiveTurnId_(d); }, true);
    listen('turnQueue',    d => { if (d != null) setTurnQueue_(d); });
    listen('round',        d => { if (d != null) setRound(d); });
    listen('log',          d => { if (d != null) setLog(d); });
    listen('step',         d => { if (d != null) setStep(d); });
    listen('combatElapsed', d => { if (d != null) { combatElapsedRef.current = d; setCombatElapsed(d); } });
    return () => refs.forEach(r => r.off());
  }, []);

  // Debug: show Firebase sync status visibly
  const [fbDebug, setFbDebug] = React.useState('FB: init...');
  useEffect(() => {
    setTimeout(() => {
      setFbDebug(window._fbDb ? 'FB: connected' : 'FB: FAILED');
    }, 2000);
  }, []);
  useEffect(() => {
    if (phase === 'combat' || phase === 'combat_setup') setFbDebug('FB: phase=' + phase + ' c=' + combatants.length);
  }, [phase, combatants]);

  // Write combat state to Firebase on change
  useEffect(() => { fbCombatWrite('phase',        phase,        0);   }, [phase]);
  useEffect(() => { fbCombatWrite('combatants',   combatants,   300); }, [combatants]);
  useEffect(() => { fbCombatWrite('order',        order,        300); }, [order]);
  useEffect(() => { fbCombatWrite('activeTurnId', activeTurnId, 0);   }, [activeTurnId]);
  useEffect(() => { fbCombatWrite('turnQueue',    turnQueue,    300); }, [turnQueue]);
  useEffect(() => { fbCombatWrite('round',        round,        0);   }, [round]);
  useEffect(() => { fbCombatWrite('log',          log,          300); }, [log]);
  useEffect(() => { fbCombatWrite('step',         step,         0);   }, [step]);

                (rxn.reactorWeaknessProtections||[]).forEach(wp=>{const t=wp.dmgType||wp.damageType;const p=wp.pct||wp.percent;if(!t||!p)return;const mult=wp.type==='Weakness'?1+parseFloat(p)/100:1-parseFloat(p)/100;addedDM[t]=mult;dm2[t]=parseFloat(((dm2[t]||1)*mult).toFixed(4));});
                const reactBuff={type:rxn.name+' (defense)',spellId:buffKey,rounds:rxn.reactorEffectDuration||1,statBonuses:[],addedImmuneConds:addedIC,addedImmuneDmg:addedID,addedDmgMults:addedDM};

                  up={...up,buffs:[...(up.buffs||[]).filter(b=>b.spellId!==buffKey),reactBuff],damageMultipliers:dm2};

  const handleRangedAttack=()=>{

    const stanceLabels=[...getActiveSanceDefs()].filter(s=>s.id!=='front').map(s=>`${s.icon} ${s.label}`).join('+');

      });

  const handleCastBuff=(spell, targetId)=>{
