      const tgt=getC(effectiveTarget);
      console.log('[INTERRUPT CHECK] spell.type:', spell.type, 'tgt.id:', tgt?.id, 'tgt.type:', tgt?.type, 'skillPoints:', tgt?.skillPoints);
      if(tgt && tgt.type==='player'){
        const targetInterrupts = [];
        // Check for adam_backhand
        if(tgt.id==='adam'){
          const bkPts=(tgt.skillPoints||{})['adam_backhand']||0;
          const bkTree=PLAYER_TALENT_TREES.adam?.talents?.find(t=>t.id==='adam_backhand');
          const bkOnCD = (tgt.spellCooldowns?.['adam_backhand']||0) > combatElapsedRef.current;
          console.log('[INTERRUPT CHECK] adam_backhand pts:', bkPts, 'bkTree:', !!bkTree, 'onCD:', bkOnCD);
          if(bkPts>=1 && bkTree && !bkOnCD){
            targetInterrupts.push({...bkTree, useAttackRoll:true, hitSound:bkTree.hitSound});
          }
        }
        // Check for brian_warning_shot
        if(tgt.id==='brian'){
          const wsPts=(tgt.skillPoints||{})['brian_warning_shot']||0;
          const wsTree=PLAYER_TALENT_TREES.brian?.talents?.find(t=>t.id==='brian_warning_shot');
          const wsOnCD = (tgt.spellCooldowns?.['brian_warning_shot']||0) > combatElapsedRef.current;
          const hasGun = tgt.weaponSubcategory==='Guns';
          console.log('[INTERRUPT CHECK] brian_warning_shot pts:', wsPts, 'wsTree:', !!wsTree, 'onCD:', wsOnCD, 'hasGun:', hasGun);
          if(wsPts>=1 && wsTree && !wsOnCD && hasGun){
            targetInterrupts.push({...wsTree, useAttackRoll:true, useEquippedWeaponSound:true});
          }
        }
        const allyInterrupts = [];
        const availableInterrupts=[...targetInterrupts, ...allyInterrupts];
        console.log('[INTERRUPT CHECK] availableInterrupts:', availableInterrupts.length);
        if(availableInterrupts.length>0){
          setInterruptPending({spell,casterId:activeTurnId,targetId:effectiveTarget,availableInterrupts});
          return;
        }
      }
    }

    if(spell.type==='buff'){
      // Buff/debuff supports multi-target
      const buffCasterType = caster.type;
      const getBuffTargets = () => {
        const t = spell.target||'Self';
        if(t==='Self') return [activeTurnId];
        if(t==='Any Single') return effectiveTarget ? [effectiveTarget] : [activeTurnId];
        if(t==='All Enemies') return combatants.filter(c=>c.type!==buffCasterType&&c.hp>0).map(c=>c.id);
        if(t==='All Allies')  return combatants.filter(c=>c.type===buffCasterType&&c.hp>0).map(c=>c.id);
        if(t==='X Enemies'||t==='X Allies') return selectedTargets.length ? selectedTargets : combatants.filter(c=>(t==='X Enemies'?c.type!==buffCasterType:c.type===buffCasterType)&&c.hp>0).map(c=>c.id).slice(0,parseInt(spell.targetCount)||2);
        if(t==='X Any') return selectedTargets.length ? selectedTargets : combatants.filter(c=>c.hp>0).map(c=>c.id).slice(0,parseInt(spell.targetCount)||2);
        // Single target cases — use selectedTarget
        if(t==='Single Ally'||t==='X Allies'||t==='All Allies') return combatants.filter(c=>c.type===buffCasterType&&c.hp>0).map(c=>c.id);
        return effectiveTarget ? [effectiveTarget] : [activeTurnId];
      };
      const buffTargetIds = getBuffTargets();
      const cost = spell.energyCost||0;
      // Helper: build elemental/proc snapshots to store in buff for revert on expiry
      const buildElemSnapshot = (dmgMods) => {
        const main={}, off={};
        (dmgMods||[]).forEach(b=>{
          const t=b.dmgType||b.damageType; if(!t||!b.amount) return;
          const amt=parseInt(b.amount)||0;
          const hand=b.hand||'Equipped Hand';
          if(hand==='Main Hand'||hand==='Equipped Hand') main[t]=(main[t]||0)+amt;
          if(hand==='Off Hand'||hand==='Equipped Hand')  off[t]=(off[t]||0)+amt;
        });
        return {main,off};
      };
      const buildProcSnapshot = (procs) => {
        const main=[],off=[];
        (procs||[]).forEach(proc=>{
          const hand=proc.hand==='Off Hand'?'off':'main';
          const chance=parseFloat(proc.chance||100)/100;
          if(proc.type==='Cause Condition'&&proc.condition){
            const p={condition:proc.condition,rounds:parseInt(proc.rounds)||1,chance,_buffProc:true};
            if(hand==='main'||proc.hand==='Equipped Hand') main.push(p);
            if(hand==='off'||proc.hand==='Equipped Hand')  off.push(p);
          } else if(proc.type==='Heal % on hit'&&proc.pct){
            const p={healPct:parseFloat(proc.pct)/100,chance,_buffProc:true};
            if(hand==='main'||proc.hand==='Equipped Hand') main.push({...p,_healProc:true});
            if(hand==='off'||proc.hand==='Equipped Hand')  off.push({...p,_healProc:true});
          } else if(proc.type==='Restore % Guard on hit'&&proc.pct){
            const p={restorePct:parseFloat(proc.pct)/100,chance,_buffProc:true,_guardProc:true};
            if(hand==='main'||proc.hand==='Equipped Hand') main.push(p);
            if(hand==='off'||proc.hand==='Equipped Hand')  off.push(p);
          } else if(proc.type==='Restore % Energy on hit'&&proc.pct){
            const p={restorePct:parseFloat(proc.pct)/100,chance,_buffProc:true,_energyProc:true};
            if(hand==='main'||proc.hand==='Equipped Hand') main.push(p);
            if(hand==='off'||proc.hand==='Equipped Hand')  off.push(p);
          }
        });
        return {main,off};
      };
      const elemSnap = buildElemSnapshot(spell.buffDmgMods);
      const procSnap = buildProcSnapshot(spell.buffProcs);
      setCombatants(prev => {
        let list = [...prev];
        buffTargetIds.forEach(tid => {
          list = list.map(c => {
            if(c.id!==tid) return c;
            // Revert existing buff of same spell first
            const existing = (c.buffs||[]).find(b=>b.spellId===spell.id);
            let updated = {...c};
            if(existing) {
              if(existing.statBonuses?.length) updated=revertStatBuff(updated,existing.statBonuses,existing.deltas);
              // Revert elemental
              if(existing.elemSnap) {
                const wed={...updated.weaponElementalDamage||{}};
                const oed={...updated.offWeaponElementalDamage||{}};
                Object.entries(existing.elemSnap.main||{}).forEach(([t,a])=>{ wed[t]=(wed[t]||0)-a; if(!wed[t]) delete wed[t]; });
                Object.entries(existing.elemSnap.off||{}).forEach(([t,a])=>{ oed[t]=(oed[t]||0)-a; if(!oed[t]) delete oed[t]; });
                updated={...updated,weaponElementalDamage:wed,offWeaponElementalDamage:oed};
              }
              // Revert procs
              if(existing.procSnap) {
                updated={...updated,
                  weaponProcs:{main:(updated.weaponProcs?.main||[]).filter(p=>!p._buffProc),off:(updated.weaponProcs?.off||[]).filter(p=>!p._buffProc)},
                  healProcs:{main:(updated.healProcs?.main||[]).filter(p=>!p._buffProc),off:(updated.healProcs?.off||[]).filter(p=>!p._buffProc)},
                  guardProcs:{main:(updated.guardProcs?.main||[]).filter(p=>!p._buffProc),off:(updated.guardProcs?.off||[]).filter(p=>!p._buffProc)},
                  energyProcs:{main:(updated.energyProcs?.main||[]).filter(p=>!p._buffProc),off:(updated.energyProcs?.off||[]).filter(p=>!p._buffProc)},
                };
              }
              // Revert immunities
              if(existing.addedImmuneConds?.length) updated={...updated,immuneConditions:(updated.immuneConditions||[]).filter(v=>!existing.addedImmuneConds.includes(v))};
              if(existing.addedImmuneDmg?.length)   updated={...updated,damageImmunities:(updated.damageImmunities||[]).filter(v=>!existing.addedImmuneDmg.includes(v))};
              // Revert weakness/protection
              if(existing.addedDmgMults) {
                const dm={...updated.damageMultipliers||{}};
                Object.entries(existing.addedDmgMults).forEach(([t,m])=>{ if(m!==0) dm[t]=(dm[t]||1)/m; if(Math.abs((dm[t]||1)-1)<0.001) delete dm[t]; });
                updated={...updated,damageMultipliers:dm};
              }
              updated={...updated,buffs:(updated.buffs||[]).filter(b=>b.spellId!==spell.id)};
            }
            // Build new buff object with all snapshots for revert
            const addedImmuneConds=[];
            const addedImmuneDmg=[];
            (spell.buffImmunities||[]).forEach(im=>{
              if(im.type==='Condition'&&im.value&&!(updated.immuneConditions||[]).includes(im.value)) addedImmuneConds.push(im.value);
              if(im.type==='Damage Type'&&im.value&&!(updated.damageImmunities||[]).includes(im.value)) addedImmuneDmg.push(im.value);
            });
            const addedDmgMults={};
            const dm2={...updated.damageMultipliers||{}};
            (spell.buffWeaknessProtections||[]).forEach(wp=>{
              const t=wp.dmgType||wp.damageType; const p=wp.pct||wp.percent;
              if(!t||!p) return;
              const mult=wp.type==='Weakness'?1+parseFloat(p)/100:1-parseFloat(p)/100;
              addedDmgMults[t]=mult;
              dm2[t]=parseFloat(((dm2[t]||1)*mult).toFixed(4));
            });
            let newBuff={
              type:spell.name, spellId:spell.id, rounds:spell.permanent?9999:(spell.durationRounds||2),
              statBonuses:spell.statBonuses||[],
              elemSnap, procSnap,
              addedImmuneConds, addedImmuneDmg, addedDmgMults,
              endOfTurn:spell.endOfTurn||false,
              permanent:spell.permanent||false,
            };
            updated={...updated,damageMultipliers:dm2};
            // Apply stat bonuses
            if(newBuff.statBonuses?.length){
              const {updated:u2,deltas:d2}=applyStatBuff(updated,newBuff.statBonuses);
              const buffWithDeltas={...newBuff,deltas:d2};
              updated={...u2,buffs:[...(u2.buffs||[]),buffWithDeltas]};
            } else {
              updated={...updated,buffs:[...(updated.buffs||[]),newBuff]};
            }
            // Apply elemental weapon damage
            const wed2={...updated.weaponElementalDamage||{}};
            const oed2={...updated.offWeaponElementalDamage||{}};
            Object.entries(elemSnap.main).forEach(([t,a])=>{ wed2[t]=(wed2[t]||0)+a; });
            Object.entries(elemSnap.off).forEach(([t,a])=>{ oed2[t]=(oed2[t]||0)+a; });
            updated={...updated,weaponElementalDamage:wed2,offWeaponElementalDamage:oed2};
            // Apply procs
            const allProcs=procSnap.main.filter(p=>!p._healProc&&!p._guardProc&&!p._energyProc);
            const allHealProcs=procSnap.main.filter(p=>p._healProc);
            const allGuardProcs=procSnap.main.filter(p=>p._guardProc);
            const allEnergyProcs=procSnap.main.filter(p=>p._energyProc);
            const allProcsOff=procSnap.off.filter(p=>!p._healProc&&!p._guardProc&&!p._energyProc);
            const allHealProcsOff=procSnap.off.filter(p=>p._healProc);
            const allGuardProcsOff=procSnap.off.filter(p=>p._guardProc);
            const allEnergyProcsOff=procSnap.off.filter(p=>p._energyProc);
            updated={...updated,
              weaponProcs:{main:[...(updated.weaponProcs?.main||[]),...allProcs],off:[...(updated.weaponProcs?.off||[]),...allProcsOff]},
              healProcs:{main:[...(updated.healProcs?.main||[]),...allHealProcs],off:[...(updated.healProcs?.off||[]),...allHealProcsOff]},
              guardProcs:{main:[...(updated.guardProcs?.main||[]),...allGuardProcs],off:[...(updated.guardProcs?.off||[]),...allGuardProcsOff]},
              energyProcs:{main:[...(updated.energyProcs?.main||[]),...allEnergyProcs],off:[...(updated.energyProcs?.off||[]),...allEnergyProcsOff]},
            };
            // Apply immunities
            if(addedImmuneConds.length) updated={...updated,immuneConditions:[...(updated.immuneConditions||[]),...addedImmuneConds]};
            if(addedImmuneDmg.length)   updated={...updated,damageImmunities:[...(updated.damageImmunities||[]),...addedImmuneDmg]};
            return updated;
          });
          // Apply inflict conditions to target immediately
          (spell.buffInflicts||[]).forEach(ic=>{
            if(!ic.condition) return;
            const chance=ic.application==='Chance-based'?parseFloat(ic.chance||50)/100:1.0;
            if(Math.random()>chance) return;
            const tgtNow=list.find(c=>c.id===tid);
            if(!(tgtNow?.immuneConditions||[]).includes(ic.condition)&&!hasCondition(tgtNow,ic.condition)){
              list=applyCondition(tid,ic.condition,spell.permanent?9999:(parseInt(ic.rounds)||1),list);
              addLog(`✦ ${spell.name} — ${tgtNow?.name} inflicted with ${ic.condition} ${spell.permanent?'permanently':ic.rounds+'s'}.`,'#a78bfa');
            }
          });
        });
        // Deduct caster cost
        list=list.map(c=>c.id===caster.id?{...c,
          talentUses:{...(c.talentUses||{}),[spell.id]:Math.max(0,((c.talentUses||{})[spell.id]??4)-1)},
          spellCooldowns:{...(c.spellCooldowns||{}), ...((spell.cooldown||0)>0 ? {[spell.id]: combatElapsedRef.current+(spell.cooldown||0)} : {})}
        }:c);
        return list;
      });
      const isDebuff=(spell.target||'Self').includes('Enem');
      const buffEffects=[];
      (spell.statBonuses||[]).forEach(b=>{if(b.amount&&b.stat)buffEffects.push(`${b.sign}${b.amount}% ${b.stat}`);});
      (spell.buffDmgMods||[]).forEach(m=>{if(m.dmgType&&m.amount)buffEffects.push(`+${m.amount} ${m.dmgType} dmg`);});
      (spell.buffInflicts||[]).forEach(ic=>{if(ic.condition)buffEffects.push(`${ic.condition}${spell.permanent?'':' '+ic.rounds+'r'}`);});
      (spell.buffImmunities||[]).forEach(im=>{if(im.value)buffEffects.push(`Immune: ${im.value}`);});
      (spell.buffProcs||[]).forEach(p=>{if(p.condition&&p.chance)buffEffects.push(`${p.chance}% on-hit: ${p.condition}`);});
      const effectStr=buffEffects.length?` (${buffEffects.join(', ')})`:'';
      const durationStr=spell.permanent?'permanent':spell.endOfTurn?'until end of turn':`${spell.durationRounds||2}r`;
      addLog(`${isDebuff?'🔻':spell.permanent?'💠':'✨'} ${caster.name} uses ${spell.name} on ${buffTargetIds.length} target${buffTargetIds.length>1?'s':''} — ${durationStr}${effectStr}`,isDebuff?'#f87171':spell.permanent?'#c084fc':'#f97316');
      if(spell.hitSound) getPooledAudio(spell.hitSound).play().catch(()=>{});
      else if(SOUNDS[spell.id]) playSound(spell.id);
      setSelectedTarget(null);setActiveSpell(null);setStep('done');return;
    }

    if(spell.type==='free_seize'){
      // Uses attack rating vs defense, no damage, applies Seized, does NOT end turn
      const _resistStat=getResistStat(target,spell.resistedBy);
      const hitChance=Math.min(1, caster.attack/(caster.attack+_resistStat) + combinedHitBonus() + effectiveHitMod/100);
      const roll=Math.random();
      const rollPct=Math.round(roll*100), hitPct=Math.round(hitChance*100);
      addLog(`${caster.name} attempts to Seize ${target.name} — hit ${hitPct}%, rolled ${rollPct}`,'#a5b4fc');
      if(roll<hitChance){
        const isImmune=(target.immuneConditions||[]).includes('Seized');
        if(isImmune){
          addLog(`${target.name} is immune to Seized.`,'#6b7280');
        } else {
          const newList=applyCondition(target.id,'Seized',1,combatants);
          setCombatants(newList);
          triggerHit(target.id);
          playSound('seize');
          addLog(`✦ ${target.name} has been Seized!`,'#a5b4fc');
        }
      } else {
        playSound('melee_miss');
        addLog(`MISS — ${caster.name} fails to Seize ${target.name}.`,'#9ca3af');
      }
      setSelectedTarget(null);setActiveSpell(null);setStep('action');return;
    }

    // ── Remove conditions helper ──────────────────────────────────────────
    const applyRemoveConditions = (targetId, removeSpec, list) => {
      if(!removeSpec) return list;
      return list.map(c => {
        if(c.id !== targetId) return c;
        if(removeSpec.mode==='all') {
          addLog(`✦ ${spell.name} cleanses all conditions from ${c.name}!`,'#4ade80');
          return {...c, conditions:[]};
        }
        if(removeSpec.mode==='select') {
          const removed = (c.conditions||[]).filter(cd=>removeSpec.conditions.includes(cd.type));
          if(removed.length) {
            addLog(`✦ ${spell.name} removes ${removed.map(r=>r.type).join(', ')} from ${c.name}!`,'#4ade80');
          }
          return {...c, conditions:(c.conditions||[]).filter(cd=>!removeSpec.conditions.includes(cd.type))};
        }
        return c;
      });
    };

    // ── Multi-target expansion ──────────────────────────────────────────────
    const getMultiTargets = () => {
      const t = spell.target || 'Single Enemy';
      const casterType = caster.type;
      const enemies = combatants.filter(c => c.type !== casterType && c.hp > 0).map(c => c.id);
      const allies  = combatants.filter(c => c.type === casterType && c.id !== caster.id && c.hp > 0).map(c => c.id);
      if(t === 'All Enemies') return enemies;
      if(t === 'All Allies')  return allies;
      if(t === 'X Enemies')   return selectedTargets.length ? selectedTargets : enemies.slice(0, parseInt(spell.targetCount)||2);
      if(t === 'X Allies')    return selectedTargets.length ? selectedTargets : allies.slice(0, parseInt(spell.targetCount)||2);
      if(t === 'X Any')      return selectedTargets.length ? selectedTargets : combatants.filter(c=>c.hp>0).map(c=>c.id).slice(0, parseInt(spell.targetCount)||2);
      return null; // single target — handled normally
    };
    const multiTargets = getMultiTargets();
    if(multiTargets && multiTargets.length > 1){
      let list = [...combatants];
      multiTargets.forEach(tid => {
        const tgt = list.find(c=>c.id===tid);
        if(!tgt || tgt.hp<=0) return;
        if(spell.type==='spell_damage'){
          const _hasBoostAoe=spell.condBoostCondition&&(tgt.conditions||[]).some(cd=>cd.type===spell.condBoostCondition);
          const _ibAoe=applyTalentItemBoosts(spell,caster);
          const raw = _hasBoostAoe?rollInRange(_ibAoe.condBoostMin,_ibAoe.condBoostMax):rollInRange(_ibAoe.minVal,_ibAoe.maxVal);
          const boosted = Math.round(raw*_ibAoe.damageMult*(1+(caster.spellDmgPct||0)/100));
          const resist = getResistance(tgt, spell.damageType);
          const isDmgImmune=(tgt.damageImmunities||[]).includes(spell.damageType);
          if(isDmgImmune){ addLog(`${spell.name} → ${tgt.name}: immune to ${spell.damageType}.`,spell.color||'#a78bfa'); }
          else {
            const dmgMult=(tgt.damageMultipliers||{})[spell.damageType]||1;
            let afterResist = Math.max(0,Math.round(boosted*dmgMult*(1-Math.min(95,resist)/100)));
            // Extra elemental from dmgMods
            (spell.spellElemDmg||[]).forEach(b=>{
              const et=b.dmgType||b.damageType; if(!et||!b.amount) return;
              if((tgt.damageImmunities||[]).includes(et)) return;
              const eMult=(tgt.damageMultipliers||{})[et]||1;
              const eRes=getResistance(tgt,et);
              afterResist+=Math.max(0,Math.round(parseInt(b.amount)*eMult*(1-Math.min(95,eRes)/100)));
            });
            const afterDmg = applyDamage(tgt, afterResist);
            list = list.map(c=>c.id===tid?{...c,guard:afterDmg.guard,hp:afterDmg.hp}:c);
            addLog(`${spell.name} → ${tgt.name}: ${afterResist} ${spell.damageType} dmg. HP: ${afterDmg.hp}/${tgt.maxHp}`,spell.color||'#a78bfa');
            if(afterDmg.hp<=0) addLog(`✕ ${tgt.name} is defeated!`,'#ef4444');
            (spell.allInflicts||[]).concat(spell.inflicts?[spell.inflicts]:[]).forEach(ic=>{
              if(!ic.condition) return;
              const icChance = ic.chance !== undefined ? ic.chance : 1.0;
              if(Math.random() > icChance) return;
              const tgtNow = list.find(c=>c.id===tid);
              if(!(tgtNow?.immuneConditions||[]).includes(ic.condition)&&!hasCondition(tgtNow,ic.condition))
                list=applyCondition(tid,ic.condition,ic.rounds,list);
            });
            if(spell.removeConditions) list = applyRemoveConditions(tid, spell.removeConditions, list);
            if(spell.dotEffect) list = applyDotEffect(spell, tid, afterResist, list, caster.weaponPhysDmgType);
            if(spell.debuffStatBonuses?.length && spell.debuffDuration>0){
              list = list.map(c => {
                if(c.id!==tid) return c;
                const debuffKey = spell.id+'_debuff';
                const ex = (c.buffs||[]).find(b=>b.spellId===debuffKey);
                let up = ex?.statBonuses?.length ? revertStatBuff({...c},ex.statBonuses,ex.deltas) : {...c};
                const db = {type:spell.name+' (debuff)',spellId:debuffKey,rounds:spell.debuffDuration,statBonuses:spell.debuffStatBonuses,endOfTurn:spell.endOfTurn||false};
                up = {...up, buffs:[...(up.buffs||[]).filter(b=>b.spellId!==debuffKey),db]};
                const {updated:upD4,deltas:dD4}=applyStatBuff(up,spell.debuffStatBonuses);return {...upD4,buffs:(upD4.buffs||[]).map(b=>b.spellId===spell.id+'_debuff'?{...b,deltas:dD4}:b)};
              });
              addLog(`🔻 ${list.find(c=>c.id===tid)?.name} debuffed — ${spell.debuffStatBonuses.map(b=>`${b.sign}${b.amount}% ${b.stat}`).join(', ')} ${spell.debuffDuration}r.`,'#f97316');
            }
            // Talent-specific procs
            (spell.spellProcs||[]).forEach(proc=>{
              if(Math.random()>parseFloat(proc.chance||100)/100) return;
              if(proc.type==='Cause Condition'&&proc.condition){const tgtNow=list.find(c=>c.id===tid);if(!(tgtNow?.immuneConditions||[]).includes(proc.condition)&&!hasCondition(tgtNow,proc.condition)){list=applyCondition(tid,proc.condition,parseInt(proc.rounds)||1,list);}}
              else if(proc.type==='Heal % on hit'&&proc.pct){const amt=Math.round(afterResist*parseFloat(proc.pct)/100);const cur=list.find(c=>c.id===caster.id);if(cur){const newHp=Math.min((cur.hp||0)+amt,cur.maxHp);list=list.map(c=>c.id===caster.id?{...c,hp:newHp}:c);}}
              else if(proc.type==='Restore % Guard on hit'&&proc.pct){const amt=Math.round(afterResist*parseFloat(proc.pct)/100);const cur=list.find(c=>c.id===caster.id);if(cur){const newG=Math.min((cur.guard||0)+amt,cur.maxGuard||0);list=list.map(c=>c.id===caster.id?{...c,guard:newG}:c);}}
              else if(proc.type==='Restore % Energy on hit'&&proc.pct){const amt=Math.round(afterResist*parseFloat(proc.pct)/100);const cur=list.find(c=>c.id===caster.id);if(cur){const newE=Math.min((cur.energy||0)+amt,cur.maxEnergy||0);list=list.map(c=>c.id===caster.id?{...c,energy:newE}:c);}}
            });
            // Immunities/weakness-protection applied to target
            if((spell.spellSelfImmunities||[]).length||(spell.spellSelfWeaknessProtections||[]).length){
              const buffKey=spell.id+'_targetbuff';

                        projColor='#4ade80'; projLabel='heal';
                      } else if(activeSpell && activeSpell.type==='spell_damage'){
                        const spellDmgPct=current.spellDmgPct||0;
                        const resist=getResistance(c,activeSpell.damageType);
                        const dmgTypeMult=(c.damageMultipliers||{})[activeSpell.damageType]||1;
                        const shockedMult=c.incomingDamageMult||1;
                        const hasCondBoost=activeSpell.condBoostCondition&&(c.conditions||[]).some(cd=>cd.type===activeSpell.condBoostCondition);
                        const _ibProjDmg=applyTalentItemBoosts(activeSpell,current);
                        const srcMin=hasCondBoost?_ibProjDmg.condBoostMin:_ibProjDmg.minVal;
                        const srcMax=hasCondBoost?_ibProjDmg.condBoostMax:_ibProjDmg.maxVal;
                        const baseMin=Math.round(srcMin*(1+spellDmgPct/100));
                        const baseMax=Math.round(srcMax*(1+spellDmgPct/100));
                        const isDmgImmuneProj=(c.damageImmunities||[]).includes(activeSpell.damageType);
                        projMin=isDmgImmuneProj?0:Math.max(0,Math.round(baseMin*dmgTypeMult*shockedMult*(1-Math.min(95,resist)/100)*(1+dmgMod/100)));
                        projMax=isDmgImmuneProj?0:Math.max(0,Math.round(baseMax*dmgTypeMult*shockedMult*(1-Math.min(95,resist)/100)*(1+dmgMod/100)));
                        projColor=isDmgImmuneProj?'#6b7280':hasCondBoost?'#fde047':(DAMAGE_COLORS[activeSpell.damageType]||'#f9fafb'); projLabel=isDmgImmuneProj?'immune':hasCondBoost?`dmg (${activeSpell.condBoostCondition})`:'dmg';
                      } else if(activeSpell && (activeSpell.type==='spell_melee'||activeSpell.type==='spell_ranged')){
                        const physType3=current.weaponPhysDmgType||'Blunt';
                        const rawPhysRes3=(c.resistances||{})[physType3]||0;
                        const effectiveArmor=Math.max(0,Math.min(95,rawPhysRes3-(current.armorPen||0)));
                        const shockedMult=c.incomingDamageMult||1;
                        const stanceMult=activeStances.includes('sneak')?1.5:activeStances.includes('flank')?(current.flankingDamage||1):1;
                        const physMult3a=(c.damageMultipliers||{})[physType3]||1;
                        const _ibProj3=applyTalentItemBoosts(activeSpell,current);
                        const physMin=Math.max(0,Math.round((current.minDmg||0)*_ibProj3.damageMult*stanceMult*shockedMult*physMult3a*(1-effectiveArmor/100)));
                        const physMax=Math.max(0,Math.round((current.maxDmg||0)*_ibProj3.damageMult*stanceMult*shockedMult*physMult3a*(1-effectiveArmor/100)));
                        let elemMin=0,elemMax=0;
                        Object.entries(current.weaponElementalDamage||{}).forEach(([type,flat])=>{
                          if((c.damageImmunities||[]).includes(type)) return;
                          const mult=(c.damageMultipliers||{})[type]||1;
                          const resist=getResistance(c,type);
                          const net=Math.max(0,Math.round(flat*shockedMult*mult*(1-Math.min(95,resist)/100)));
                          elemMin+=net; elemMax+=net;
                        });
                        const _markedProj=(c.conditions||[]).some(cd=>cd.type==='Marked')&&activeSpell.type==='spell_ranged';
                        const _markedMult=_markedProj?1.1:1;
                        projMin=Math.max(0,Math.round((physMin+elemMin)*(1+dmgMod/100)*_markedMult));
                        projMax=Math.max(0,Math.round((physMax+elemMax)*(1+dmgMod/100)*_markedMult));
                        projColor=_markedProj?'#f97316':'#f87171'; projLabel=_markedProj?'dmg (Marked)':'dmg';
                      } else if(!activeSpell){
                        const hand=selectedHand==='off'?{min:current.offMinDmg||0,max:current.offMaxDmg||0}:{min:current.minDmg||0,max:current.maxDmg||0};
                        const elemDmg=selectedHand==='off'?(current.offWeaponElementalDamage||{}):(current.weaponElementalDamage||{});
                        const physType3b=selectedHand==='off'?(current.offWeaponPhysDmgType||'Blunt'):(current.weaponPhysDmgType||'Blunt');
                        const rawPhysRes3b=(c.resistances||{})[physType3b]||0;
                        const effectiveArmor=Math.max(0,Math.min(95,rawPhysRes3b-(current.armorPen||0)));
                        const shockedMult=c.incomingDamageMult||1;
                        const stanceMult=activeStances.includes('sneak')?1.5:activeStances.includes('flank')?(current.flankingDamage||1):1;
                        const physMult3b=(c.damageMultipliers||{})[physType3b]||1;
                        const physMin=Math.max(0,Math.round(hand.min*stanceMult*shockedMult*physMult3b*(1-effectiveArmor/100)));
                        const physMax=Math.max(0,Math.round(hand.max*stanceMult*shockedMult*physMult3b*(1-effectiveArmor/100)));
                        let elemMin=0, elemMax=0;
                        Object.entries(elemDmg).forEach(([type,flat])=>{
                          if((c.damageImmunities||[]).includes(type)) return;
                          const mult=(c.damageMultipliers||{})[type]||1;
                          const resist=getResistance(c,type);
                          const net=Math.max(0,Math.round(flat*shockedMult*mult*(1-Math.min(95,resist)/100)));
                          elemMin+=net; elemMax+=net;
                        });
                        const _markedBasic=(c.conditions||[]).some(cd=>cd.type==='Marked')&&current.weaponSubcategory==='Guns';
                        const _markedBasicMult=_markedBasic?1.1:1;
                        projMin=Math.max(0,Math.round((physMin+elemMin)*(1+dmgMod/100)*_markedBasicMult));
                        projMax=Math.max(0,Math.round((physMax+elemMax)*(1+dmgMod/100)*_markedBasicMult));
                        projColor=_markedBasic?'#f97316':'#ffffff'; projLabel=_markedBasic?'dmg (Marked)':'dmg';
                      }

                      return(
                        <button key={c.id} onClick={()=>{
                          if(isMultiPickSpell||isBuffMultiPick){
                            if(isSel) setSelectedTargets(prev=>prev.filter(id=>id!==c.id));
                            else if(selectedTargets.length<multiPickMax) setSelectedTargets(prev=>[...prev,c.id]);
                          } else { setSelectedTarget(c.id); }
                        }} disabled={canToggle} style={btn({background:isSel?(activeSpell?'#1e1e3f':'#7c3aed'):'#374151',border:`1px solid ${isSel?(activeSpell?spellColor:currentStanceDef.color):'transparent'}`,display:'flex',flexDirection:'column',alignItems:'center',gap:1,padding:'6px 12px',opacity:canToggle?0.4:1})}>
                          <span>{c.name} ({c.hp}hp)</span>
                          {!isHeal&&<span style={{fontSize:11,color:hitColor,fontWeight:'bold'}}>{isAutoHit?'AUTO hit':`${hitPct}% hit`}</span>}
                          {isHeal&&<span style={{fontSize:11,color:'#4ade80',fontWeight:'bold'}}>auto-hit</span>}
                          {(projMin>0||projMax>0)&&<span style={{fontSize:11,color:projColor}}>{projMin}–{projMax} {projLabel}</span>}
                        </button>
                      );
                    })}
                  </div>

                  {/* ── Action extras: elemental dmg, procs, inflicts ── */}
                  {(()=>{
                    const extras=[];
                    if(!activeSpell){
                      const elemDmg=selectedHand==='off'?(current.offWeaponElementalDamage||{}):(current.weaponElementalDamage||{});
                      Object.entries(elemDmg).forEach(([type,flat])=>{
                        extras.push({color:DAMAGE_COLORS[type]||'#aaa',text:`+${flat} ${type} damage`});
                      });
                      const procs=(selectedHand==='off'?current.weaponProcs?.off:current.weaponProcs?.main)||[];
                      procs.forEach(p=>extras.push({color:'#a78bfa',text:`${Math.round(p.chance*100)}% chance to inflict ${p.condition} for ${p.rounds}r`}));
                      const healProcs=(selectedHand==='off'?current.healProcs?.off:current.healProcs?.main)||[];
                      healProcs.forEach(p=>extras.push({color:'#4ade80',text:`${Math.round(p.chance*100)}% chance to heal ${Math.round(p.healPct*100)}% of damage dealt`}));
                      const guardProcs=(selectedHand==='off'?current.guardProcs?.off:current.guardProcs?.main)||[];
                      guardProcs.forEach(p=>extras.push({color:'#38bdf8',text:`${Math.round(p.chance*100)}% chance to restore ${Math.round(p.restorePct*100)}% Guard on hit`}));
                      const energyProcs=(selectedHand==='off'?current.energyProcs?.off:current.energyProcs?.main)||[];
                      energyProcs.forEach(p=>extras.push({color:'#fbbf24',text:`${Math.round(p.chance*100)}% chance to restore ${Math.round(p.restorePct*100)}% Energy on hit`}));
                    } else if(activeSpell?.type==='spell_melee'||activeSpell?.type==='spell_ranged'){
                      // Elemental weapon damage carries through
                      Object.entries(current.weaponElementalDamage||{}).forEach(([type,flat])=>{
                        extras.push({color:DAMAGE_COLORS[type]||'#aaa',text:`+${flat} ${type} damage`});
                      });
                      // Generic dazeChance display
                      if(activeSpell.dazeChance>0){
                        extras.push({color:'#d8b4fe',text:`${Math.round(activeSpell.dazeChance*100)}% chance to inflict Dazed for 1 round ${conditionDesc('Dazed')}`});
                      }
                    } else if(activeSpell?.inflicts){
                      const inf=activeSpell.inflicts;
                      if(inf.valuePct) extras.push({color:DAMAGE_COLORS[activeSpell.damageType]||'#aaa',text:`Inflicts ${inf.condition} for ${inf.rounds}r (${Math.round(inf.valuePct*100)}% of damage dealt/r)`});
                      else if(inf.incomingDamageMult) extras.push({color:'#fde047',text:`Inflicts ${inf.condition} for ${inf.rounds}r (+${Math.round((inf.incomingDamageMult-1)*100)}% incoming dmg)`});
                    }
                    if(extras.length===0) return null;
                    return (
                      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
                        {extras.map((e,i)=>(
                          <span key={i} style={{fontSize:11,color:e.color,background:'#111827',borderRadius:4,padding:'2px 7px',border:`1px solid ${e.color}33`}}>{e.text}</span>
                        ))}
                      </div>
                    );
                  })()}
                  <div style={{display:'flex',gap:16,alignItems:'center',marginBottom:8}}>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <span style={{fontSize:11,color:'#9ca3af'}}>Hit modifier</span>
                      <input type="number" id="hitMod" name="hitMod" value={hitMod} onChange={e=>setHitMod(Number(e.target.value))}
                        style={{width:60,background:'#374151',border:'1px solid #4b5563',borderRadius:4,color:'#f9fafb',padding:'3px 6px',fontSize:13,textAlign:'center'}}/>
                      <span style={{fontSize:11,color:'#6b7280'}}>%</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <span style={{fontSize:11,color:'#9ca3af'}}>Dmg modifier</span>
                      <input type="number" id="dmgMod" name="dmgMod" value={dmgMod} onChange={e=>setDmgMod(Number(e.target.value))}
                        style={{width:60,background:'#374151',border:'1px solid #4b5563',borderRadius:4,color:'#f9fafb',padding:'3px 6px',fontSize:13,textAlign:'center'}}/>
                      <span style={{fontSize:11,color:'#6b7280'}}>%</span>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    {(isMultiPickSpell||isBuffMultiPick) && selectedTargets.length>0 && (
                      <button onClick={()=>handleCastSpellMultiPick()} style={btn({background:'#1e1e3f',border:`1px solid ${spellColor}`})}>
                        ✦ Cast {activeSpell.name} on {selectedTargets.length} target{selectedTargets.length>1?'s':''}
                      </button>
                    )}
                    {!isMultiPickSpell && !isBuffMultiPick && selectedTarget&&(
                      <button onClick={activeSpell?()=>handleCastSpell():handleAttack} style={btn({background:activeSpell?'#1e1e3f':'#b91c1c',border:`1px solid ${activeSpell?spellColor:currentStanceDef.color}`})}>
                        {activeSpell?`✦ Cast ${activeSpell.name}`:`⚔ Attack ${getC(selectedTarget)?.name}`}
                      </button>
                    )}
                    <button onClick={()=>{setStep('action');setSelectedTarget(null);setSelectedTargets([]);setActiveSpell(null);}} style={btn()}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ── Battlefield ── */}
          {(()=>{
            const BattlefieldNode = ({c}) => {
              const isCur = c.id === currentId;
              const isDead = c.hp <= 0;
              const isPlayer = c.type === 'player';
              const hpPct    = Math.max(0, Math.min(100, Math.round((c.hp    / (c.maxHp||c.hp||1))    * 100)));
              const guardPct = Math.max(0, Math.min(100, Math.round(((c.guard||0) / (c.maxGuard||c.guard||1)) * 100)));
              const hpColor  = hpPct > 60 ? '#4ade80' : hpPct > 30 ? '#fbbf24' : '#ef4444';
              const isSelectable = step === 'selectTarget' && targets.some(t => t.id === c.id);
              const isSel = selectedTarget === c.id;
              const conditions = (c.conditions||[]).filter(cd=>cd.type);
              const borderColor = isSel ? '#fbbf24' : isCur ? '#a78bfa' : isPlayer ? '#38bdf8' : '#f87171';
              const W = 64;
              return (
                <div
                  onClick={isSelectable ? () => setSelectedTarget(c.id) : undefined}
                  style={{
                    display:'flex', flexDirection:'column', alignItems:'center', gap:3,
                    opacity: isDead ? 0.35 : 1,
                    cursor: isSelectable ? 'pointer' : 'default',
                    filter: isSelectable && !isSel ? 'brightness(1.3)' : 'none',
                    width: W,
                  }}
                >
                  {/* Name */}
                  <div style={{fontSize:10, color:'#d1d5db', fontWeight:'bold', textAlign:'center', width:'100%', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', textShadow:'0 0 4px #000, 1px 1px 3px #000, -1px -1px 3px #000'}}>{c.name}</div>
                  {/* Floating damage numbers */}
                  <div style={{position:'relative',width:56,height:0}}>
                    {floatingNumbers.filter(f=>f.targetId===c.id).map(f=>(
                      f.numbers.map((n,ni)=>(
                        <div key={`${f.key}-${ni}`} style={{
                          position:'absolute',
                          left: '50%',
                          top: -8,
                          transform: `translateX(calc(-50% + ${(ni - (f.numbers.length-1)/2) * 22}px))`,
                          fontSize: 13,
                          fontWeight: 'bold',
                          color: n.color,
                          textShadow: '0 1px 3px #000, 0 0 6px #000',
                          pointerEvents: 'none',
                          animation: `floatUp 1.1s ease-out ${ni * 0.18}s forwards`,
                          opacity: 0,
                          whiteSpace: 'nowrap',
                          zIndex: 50,
                        }}>{n.amount}</div>
                      ))
                    ))}
                  </div>
                  {/* Circle */}
                  <div style={{
                    width: 56, height: 56, borderRadius: '50%',
                    background: isDead ? '#1f2937' : isPlayer ? '#1e3a5f' : '#3b1515',
                    border: `2px solid ${borderColor}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 11, fontWeight: 'bold', color: '#f9fafb',
                    textAlign: 'center', padding: 0, lineHeight: 1.2,
                    overflow: 'hidden',
                    boxShadow: isCur ? `0 0 10px ${borderColor}88` : isSel ? `0 0 12px #fbbf2488` : 'none',
                    animation: c.id === hitId ? 'hitShake 0.35s ease' : 'none',
                    transition: 'border-color 0.15s',
                    flexShrink: 0,
                    position: 'relative',
                  }}>
                    {(COMBATANT_IMAGES[c.id]||COMBATANT_IMAGES[c.templateId]||c.image)
                      ? <img src={COMBATANT_IMAGES[c.id]||COMBATANT_IMAGES[c.templateId]||c.image} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'50%',display:'block'}} />
                      : c.name.split(' ')[0]
                    }
                    {hitEffect&&hitEffect.targetId===c.id&&(
                      <img src={hitEffect.gif} style={{position:'absolute',width:'120%',height:'120%',top:'-10%',left:'-10%',borderRadius:'50%',pointerEvents:'none',mixBlendMode:'screen',objectFit:'cover'}} />
                    )}
                  </div>
                  {/* Bars: Guard → HP → Energy */}
                  <div style={{width:W, display:'flex', flexDirection:'column', gap:2, background:'rgba(0,0,0,0.6)', borderRadius:4, padding:'3px 4px'}}>
                    {/* HP bar */}
                    <div style={{display:'flex', justifyContent:'space-between', fontSize:9, marginTop:0}}>
                      <span style={{color:'#f87171'}}>HP</span>
                      <span style={{color:'#9ca3af'}}>{c.hp}/{c.maxHp||c.hp}</span>
                    </div>
                    <div style={{width:'100%', height:4, background:'#374151', borderRadius:2, overflow:'hidden'}}>
                      <div style={{width:`${hpPct}%`, height:'100%', background:'#f87171', borderRadius:2, transition:'width 0.3s'}}/>
                    </div>
                  </div>
                </div>
              );
            };

            const monstersRow = combatants.filter(c=>c.type!=='player');
            const playersRow  = combatants.filter(c=>c.type==='player');
            const env=ENVIRONMENTS[selectedEnvironment];
            const bgStyle=env&&env.bg?{backgroundImage:`url(${env.bg})`,backgroundSize:'cover',backgroundPosition:'center'}:{};
            return (
              <div style={{borderRadius:10, padding:'14px 16px', border:'1px solid #1e2d4a', background:'#0a0e1a', ...bgStyle}}>
                {/* Monsters row */}
                {monstersRow.length > 0 && (
                  <div style={{display:'flex', justifyContent:'center', gap:20, marginBottom:16, flexWrap:'wrap'}}>
                    {monstersRow.map(c => <BattlefieldNode key={c.id} c={c} />)}
                  </div>
                )}
                {/* Spacer row */}
                {monstersRow.length > 0 && playersRow.length > 0 && (
                  <div style={{height:32}} />
                )}
                {/* Players row */}
                {playersRow.length > 0 && (
                  <div style={{display:'flex', justifyContent:'center', gap:20, flexWrap:'wrap'}}>
                    {playersRow.map(c => <BattlefieldNode key={c.id} c={c} />)}
                  </div>
                )}
              </div>
            );
          })()}
          <div style={{background:'#1f2937',borderRadius:10,padding:14,flex:1}}>
            <div style={{fontSize:11,color:'#6b7280',marginBottom:8,textTransform:'uppercase',letterSpacing:1}}>Combat Log</div>
            <div style={{maxHeight:340,overflowY:'auto',display:'flex',flexDirection:'column',gap:2}}>
              {log.map(e=><div key={e.key} style={{fontSize:12,color:e.color,padding:'2px 0',borderBottom:'1px solid #374151'}}>{e.msg}</div>)}
            </div>
          </div>
        </div>

        <div style={{background:'#0f172a',padding:12,borderLeft:'1px solid #374151',overflowY:'auto'}}>
          <div style={{fontSize:11,color:'#93c5fd',marginBottom:6,textTransform:'uppercase',letterSpacing:1}}>Players</div>
          {players.map(p=><Card key={p.id} c={p} isCurrent={p.id===currentId} isHit={p.id===hitId} onManageEffects={id=>setShowManageEffects(id)} onFullHeal={handleFullHeal} onDefeat={handleDefeat}/>)}
          {monsters.length>0&&<>
            <div style={{fontSize:11,color:'#fca5a5',margin:'12px 0 6px',textTransform:'uppercase',letterSpacing:1}}>Monsters</div>
            {monsters.map(m=><Card key={m.id} c={m} isCurrent={m.id===currentId} isHit={m.id===hitId} onManageEffects={id=>setShowManageEffects(id)} onFullHeal={handleFullHeal} onDefeat={handleDefeat}/>)}
          </>}
        </div>
      </div>


      {showInventory&&(() => {
        const p = PLAYER_DEFS.find(p=>p.id===showInventory);
        const c = getC(showInventory);
        return <InventoryModal
          playerId={showInventory}
          playerName={p?.name||showInventory}
          combatantId={showInventory}
          onClose={()=>setShowInventory(null)}
          onHeal={handleInventoryHeal}
          onUseItem={handleInventoryUse}
          onStatBuff={handleInventoryStatBuff}
          onThrow={handleInventoryThrow}
        />;
      })()}
      {showTalents&&<TalentsModal c={getC(showTalents)} combatElapsed={combatElapsed}
        onUse={skill=>{
          if(skill.type==='spell_summon'){
            setSummonPending({spell:skill, casterId:showTalents});
            setShowTalents(null);
            return;
          }
          if(skill.type==='spell_raise'){
            const casterId=showTalents;
            const deadSummons=combatants.filter(c=>c.summonedBy===casterId&&c.hp<=0);
            if(!deadSummons.length){
              addLog(`✦ ${getC(casterId)?.name}: no dead summons to raise.`,'#c084fc');
              setShowTalents(null);
              return; // no use spent
            }
            setRaisePending({spell:skill, casterId, deadSummons});
            setShowTalents(null);
            return;
          }
          if(skill.type==='spell_sacrifice'){
            const casterId=showTalents;
            const summons=combatants.filter(c=>c.summonedBy===casterId&&c.hp>0);
            if(!summons.length){
              addLog(`✦ ${getC(casterId)?.name}: no living summons to sacrifice.`,'#dc2626');
              setShowTalents(null);
              return; // no use spent
            }
            setSacrificePending({spell:skill, casterId, summons});
            setShowTalents(null);
            return;
          }
          if(skill.type==='spell_lifetap'){
            const casterId=showTalents;
            setLifeTapPending({spell:skill, casterId});
            setShowTalents(null);
            return;
          }
          if(skill._stolenId){
            // Decrement stolen talent uses before firing
            const _sid=skill._stolenId;
            const _cid=showTalents;
            setCombatants(prev=>prev.map(c=>{
              if(c.id!==_cid) return c;
              const st={...(c.stolenTalentUses||{})};
              if(st[_sid]){
                const newUses=(st[_sid].uses||1)-1;
                if(newUses<=0) { delete st[_sid]; }
                else st[_sid]={...st[_sid],uses:newUses};
              }
              return {...c,stolenTalentUses:st};
            }));
            // Do NOT return — let the spell fire normally below
          }
          if(skill.type==='spell_banish'){
            setBanishPending({spell:skill, casterId:showTalents});
            setShowTalents(null);
            return;
          }
          if(skill.type==='spell_talentmod'){
            const casterId=showTalents;
            const caster=getC(casterId);
            const isRevealAction = (skill.talentModAction||'restore')==='reveal';
            // Self-targeting: go straight to modal
            const tgt=skill.target==='Self'?caster:null;
            if(tgt){
              if(isRevealAction){
                setRevealTalentsPending({spell:skill, casterId, targetId:casterId});
              } else {
                setTalentModPending({spell:skill, casterId, targetId:casterId});
              }
              setShowTalents(null);
              return;
            }
            // Otherwise need target selection first
            setActiveSpell(skill); setStep('selectTarget'); setShowTalents(null); setSelectedTarget(null);
            return;
          }
          if(skill.type==='spell_resurrect'){
            const casterId=showTalents;
            const targets=combatants.filter(c=>!c.summonedBy&&c.hp<=0);
            if(!targets.length){
              addLog(`✦ ${getC(casterId)?.name}: no valid targets to resurrect.`,'#f9a8d4');
              setShowTalents(null);
              return; // no use spent
            }
            setResurrectPending({spell:skill, casterId, targets});
            setShowTalents(null);
            return;
          }
          setActiveSpell(skill); const skipPick=skill.type==='buff'&&(skill.target==='Self'||skill.target==='All Enemies'||skill.target==='All Allies'); setStep(skipPick?'castBuff':'selectTarget'); setShowTalents(null); setSelectedTarget(null); }}
        onClose={()=>setShowTalents(null)}/>}

      {showAbilities&&<SpecialAbilitiesModal c={getC(showAbilities)}
        onUse={ability=>{ addLog(`${getC(showAbilities)?.name} uses ${ability.name}!`,'#38bdf8'); setShowAbilities(null); }}
        onClose={()=>setShowAbilities(null)}/>}

      {sacrificePending&&<BloodSacrificeModal
        spell={sacrificePending.spell}
        casterId={sacrificePending.casterId}
        summons={sacrificePending.summons}
        onCancel={()=>setSacrificePending(null)}
        onConfirm={(target)=>{
          const spell=sacrificePending.spell;
          const casterId=sacrificePending.casterId;
          const healAmt=target.hp;
          setCombatants(prev=>prev.map(c=>{
            if(c.id===target.id) return{...c,hp:0};
            if(c.id===casterId){
              const newHp=Math.min((c.hp||0)+healAmt,c.maxHp);
              const uses={...(c.talentUses||{}),[spell.id]:Math.max(0,((c.talentUses||{})[spell.id]??2)-1)};
              return{...c,hp:newHp,talentUses:uses};
            }
            return c;
          }));
          addLog(`🩸 ${getC(casterId)?.name} sacrifices ${target.name} — heals ${healAmt} HP!`,'#dc2626');
          addLog(`✕ ${target.name} is destroyed.`,'#ef4444');
          getPooledAudio('https://www.dropbox.com/scl/fi/i7kcpu5r1n3ric234vpiw/Blood.mp3?rlkey=v1gim7crbnxfoouy1fidtrguw&st=eip2kirw&dl=1').play().catch(()=>{});
          setSacrificePending(null);
        }}
      />}

      {banishPending&&(()=>{
        const spell=banishPending.spell;
        const caster=getC(banishPending.casterId);
        if(!caster) return null;
        return <BanishModal
          spell={spell}
          caster={caster}
          allCombatants={combatants}
          onCancel={()=>setBanishPending(null)}
          onConfirm={(ids)=>{
            // Spend one talent use
            setCombatants(prev=>prev.map(c=>{
              if(c.id===caster.id) return {...c, talentUses:{...(c.talentUses||{}),[spell.id]:Math.max(0,((c.talentUses||{})[spell.id]??4)-1)}};
              return c;
            }));
            // Remove banished combatants entirely
            setCombatants(prev=>{
              const names=ids.map(id=>prev.find(c=>c.id===id)?.name||id);
              addLog(`✦ ${caster.name} banishes ${names.join(', ')} — gone forever.`,'#a78bfa');
              if(spell.hitSound) getPooledAudio(spell.hitSound).play().catch(()=>{});
              return prev.filter(c=>!ids.includes(c.id));
            });
            // Also remove from turn queue
            setTurnQueue_(prev=>prev.filter(e=>!ids.includes(e.id)));
            setBanishPending(null);
          }}
        />;
      })()}

      {revealTalentsPending&&(()=>{
        const spell=revealTalentsPending.spell;
        const caster=getC(revealTalentsPending.casterId);
        const target=getC(revealTalentsPending.targetId);
        if(!caster||!target) return null;
        return <RevealTalentsModal
          target={target}
          onClose={()=>{
            // Spend one use of the reveal talent
            setCombatants(prev=>prev.map(c=>{
              if(c.id!==caster.id) return c;
              return {...c, talentUses:{...(c.talentUses||{}),[spell.id]:Math.max(0,((c.talentUses||{})[spell.id]??4)-1)}};
            }));
            addLog(`👁 ${caster.name} reveals ${target.name}'s talents.`,'#f59e0b');
            setRevealTalentsPending(null);
          }}
        />;
      })()}

      {talentModPending&&(()=>{
        const spell=talentModPending.spell;
        const caster=getC(talentModPending.casterId);
        const target=getC(talentModPending.targetId);
        if(!caster||!target) return null;
        return <TalentModModal
          spell={spell}
          caster={caster}
          target={target}
          onCancel={()=>setTalentModPending(null)}
          onConfirm={({removeAlloc, restoreAlloc})=>{
            const action = spell.talentModAction||'restore';
            const isSyphon  = action==='syphon';
            const isRestore = action==='restore';
            const isSteal   = action==='steal';
            const hpCost = spell.talentModHpCost||0;
            const casterId = talentModPending.casterId;
            const targetId = talentModPending.targetId;
            if(spell.talentModRequiresCondition){
              const tgt=getC(targetId);
              if(!(tgt?.conditions||[]).some(cd=>cd.type===spell.talentModRequiresCondition)){
                addLog(`✘ ${spell.name} requires ${target.name} to have ${spell.talentModRequiresCondition}!`,'#f87171');
                setTalentModPending(null); return;
              }
            }
            if(hpCost>0 && (caster.hp||0)<=hpCost){
              addLog(`✘ ${caster.name} doesn't have enough HP for ${spell.name}!`,'#f87171');
              setTalentModPending(null); return;
            }
            const targetDbSnap = loadPlayerDbTalents((getC(targetId)?.skillPoints||{}));
            const casterDbSnap = loadPlayerDbTalents((getC(casterId)?.skillPoints||{}));

            // ── STEAL ──────────────────────────────────────────────────────────
            if(isSteal){
              const stolenTalentId = removeAlloc && Object.keys(removeAlloc)[0];
              if(!stolenTalentId){ setTalentModPending(null); return; }
              const tEntry = targetDbSnap.find(e=>e.talent.id===stolenTalentId);
              const stolenTalent = tEntry?.talent;
              if(!stolenTalent){ setTalentModPending(null); return; }
              const tMaxPts = tEntry?.pts||1;
              setCombatants(prev=>prev.map(c=>{
                if(c.id===casterId){
                  const newHp = hpCost>0 ? Math.max(0,(c.hp||0)-hpCost) : c.hp;
                  const spellUses={...(c.talentUses||{}),[spell.id]:Math.max(0,((c.talentUses||{})[spell.id]??4)-1)};
                  // Add stolen talent to caster
                  const st={...(c.stolenTalentUses||{})};
                  if(st[stolenTalentId]) st[stolenTalentId]={...st[stolenTalentId],uses:st[stolenTalentId].uses+1};
                  else st[stolenTalentId]={talent:stolenTalent,uses:1};
                  return {...c,hp:newHp,talentUses:spellUses,stolenTalentUses:st};
                }
                if(c.id===targetId){
                  // Remove 1 use from target
                  const oldUses=(c.talentUses||{})[stolenTalentId]??tMaxPts;
                  return {...c,talentUses:{...(c.talentUses||{}),[stolenTalentId]:Math.max(0,oldUses-1)}};
                }
                return c;
              }));
              const hpMsg=hpCost>0?` (costs ${hpCost} HP)`:'';
              addLog(`⟳ ${caster.name} uses ${spell.name}${hpMsg} — steals 1 use of ${stolenTalent.name} from ${target.name}.`,'#a78bfa');
              if(spell.hitSound) getPooledAudio(spell.hitSound).play().catch(()=>{});
              setTalentModPending(null);
              return;
            }
            // ── END STEAL ──────────────────────────────────────────────────────

            setCombatants(prev=>prev.map(c=>{
              const isCasterC = c.id===casterId;
              const isTargetC = c.id===targetId;
              if(!isCasterC && !isTargetC) return c;
              let updated = {...c};
              if(isCasterC){
                const newHp = hpCost>0 ? Math.max(0,(updated.hp||0)-hpCost) : updated.hp;
                const spellUses = {...(updated.talentUses||{}),[spell.id]:Math.max(0,((updated.talentUses||{})[spell.id]??4)-1)};
                updated = {...updated, hp:newHp, talentUses:spellUses};
                // restore to caster (syphon or restore mode)
                if(isSyphon||isRestore){
                  let newTU = {...(updated.talentUses||{})};
                  Object.entries(restoreAlloc||{}).forEach(([talentId, amt])=>{
                    const entry=casterDbSnap.find(e=>e.talent.id===talentId);
                    const maxPts=entry?entry.pts:1;
                    const oldUses=newTU[talentId]??maxPts;
                    newTU[talentId]=Math.min(oldUses+amt,maxPts);
                  });
                  updated={...updated, talentUses:newTU};
                }
              }
              if(isTargetC){
                // remove from target (syphon or remove mode)
                if(isSyphon||!isRestore){
                  let newTU = {...(updated.talentUses||{})};
                  Object.entries(removeAlloc||{}).forEach(([talentId, amt])=>{
                    const entry=targetDbSnap.find(e=>e.talent.id===talentId);
                    const maxPts=entry?entry.pts:1;
                    const oldUses=newTU[talentId]??maxPts;
                    newTU[talentId]=Math.max(0,oldUses-amt);
                  });
                  updated={...updated, talentUses:newTU};
                }
                // restore to target (restore mode, non-self)
                if(isRestore && targetId!==casterId){
                  let newTU = {...(updated.talentUses||{})};
                  Object.entries(restoreAlloc||{}).forEach(([talentId, amt])=>{
                    const entry=targetDbSnap.find(e=>e.talent.id===talentId);
                    const maxPts=entry?entry.pts:1;
                    const oldUses=newTU[talentId]??maxPts;
                    newTU[talentId]=Math.min(oldUses+amt,maxPts);
                  });
                  updated={...updated, talentUses:newTU};
                }
              }
              return updated;
            }));
            const hpMsg=hpCost>0?` (costs ${hpCost} HP)`:'';
            if(isSyphon){
              const takeParts=Object.entries(removeAlloc||{}).map(([tid,amt])=>{const e=targetDbSnap.find(e=>e.talent.id===tid);return `${amt}× ${e?.talent?.name||tid}`;}).join(', ');
              const restoreParts=Object.entries(restoreAlloc||{}).map(([tid,amt])=>{const e=casterDbSnap.find(e=>e.talent.id===tid);return `${amt}× ${e?.talent?.name||tid}`;}).join(', ');
              addLog(`⟳ ${caster.name} uses ${spell.name}${hpMsg} — takes [${takeParts}] from ${target.name}, restores [${restoreParts}] to self.`,'#c084fc');
            } else {
              const dbSnap = isRestore ? casterDbSnap : targetDbSnap;
              const alloc  = isRestore ? restoreAlloc : removeAlloc;
              const parts  = Object.entries(alloc||{}).map(([tid,amt])=>{const e=dbSnap.find(e=>e.talent.id===tid);return `${amt}× ${e?.talent?.name||tid}`;}).join(', ');
              addLog(`${isRestore?'✦':'✕'} ${caster.name} uses ${spell.name}${hpMsg} — ${isRestore?'restores':'removes'} ${parts} on ${target.name}.`,'#f59e0b');
            }
            if(hpCost>0 && (caster.hp||0)-hpCost<=0) addLog(`✕ ${caster.name} is defeated!`,'#ef4444');
            if(spell.hitSound) getPooledAudio(spell.hitSound).play().catch(()=>{});
            setTalentModPending(null);
          }}
        />;
      })()}

      {lifeTapPending&&<LifeTapModal
        caster={getC(lifeTapPending.casterId)}
        onCancel={()=>setLifeTapPending(null)}
        onConfirm={(talentId)=>{
          const spell=lifeTapPending.spell;
          const casterId=lifeTapPending.casterId;
          const caster=getC(casterId);
          const hpCost=Math.max(1,Math.round((caster.maxHp||100)*0.10));
          setCombatants(prev=>prev.map(c=>{
            if(c.id!==casterId) return c;
            const newHp=Math.max(0,(c.hp||0)-hpCost);
            const oldUses=(c.talentUses||{})[talentId]??0;
            // find max pts for the chosen talent
            const dbTalents=loadPlayerDbTalents(c.skillPoints||{});
            const entry=dbTalents.find(e=>e.talent.id===talentId);
            const maxPts=entry?entry.pts:1;
            const newTalentUses=Math.min(oldUses+1, maxPts);
            const uses={
              ...(c.talentUses||{}),
              [spell.id]:Math.max(0,((c.talentUses||{})[spell.id]??4)-1),
              [talentId]:newTalentUses,
            };
            return{...c,hp:newHp,talentUses:uses};
          }));
          const entry=loadPlayerDbTalents((getC(casterId)?.skillPoints||{})).find(e=>e.talent.id===talentId);
          const tName=entry?.talent?.name||talentId;
          addLog(`🩸 ${caster?.name} uses Life Tap — loses ${hpCost} HP and restores 1 use of ${tName}.`,'#dc2626');
          if(hpCost>=(getC(casterId)?.hp||0)) addLog(`✕ ${caster?.name} is defeated!`,'#ef4444');
          getPooledAudio('https://www.dropbox.com/scl/fi/i7kcpu5r1n3ric234vpiw/Blood.mp3?rlkey=v1gim7crbnxfoouy1fidtrguw&st=ndq9p49s&dl=1').play().catch(()=>{});
          setLifeTapPending(null);
        }}
      />}

      {resurrectPending&&<ResurrectModal
        spell={resurrectPending.spell}
        casterId={resurrectPending.casterId}
        targets={resurrectPending.targets}
        onCancel={()=>setResurrectPending(null)}
        onConfirm={(target)=>{
          const spell=resurrectPending.spell;
          const casterId=resurrectPending.casterId;
          const resurrectHp=spell.resurrectMode==='full'
            ? target.maxHp
            : Math.max(1,Math.round(target.maxHp*(spell.resurrectPct/100)));
          setCombatants(prev=>prev.map(c=>{
            if(c.id===target.id) return{...c,hp:resurrectHp,guard:c.maxGuard||0,conditions:[],buffs:[]};
            if(c.id===casterId) return{...c,talentUses:{...(c.talentUses||{}),[spell.id]:Math.max(0,((c.talentUses||{})[spell.id]??4)-1)}};
            return c;
          }));
          addLog(`✦ ${getC(casterId)?.name} resurrects ${target.name} with ${resurrectHp} HP!`,'#f9a8d4');
          getPooledAudio('https://www.dropbox.com/scl/fi/gscrzi1to9c751nt1iwe6/Summon.mp3?rlkey=x1w1jievef1l3285mmyhfmayr&st=4x7280d8&dl=1').play().catch(()=>{});
          setResurrectPending(null);
        }}
      />}

      {raisePending&&<RaiseSummonModal
        spell={raisePending.spell}
        casterId={raisePending.casterId}
        deadSummons={raisePending.deadSummons}
        onCancel={()=>setRaisePending(null)}
        onConfirm={(target)=>{
          const spell=raisePending.spell;
          const casterId=raisePending.casterId;
          const raiseHp=spell.raiseSummonMode==='full'
            ? target.maxHp
            : Math.max(1,Math.round(target.maxHp*(spell.raiseSummonPct/100)));
          // Restore HP, guard, conditions, and talentUses for the raised summon
          const restoredTalentUses=Object.fromEntries((target.talents||[]).map(t=>[t.id, t._assignedPoints||t.maxPoints||1]));
          setCombatants(prev=>prev.map(c=>{
            if(c.id===target.id) return{...c, hp:raiseHp, guard:c.maxGuard||0, conditions:[], buffs:[], talentUses:restoredTalentUses};
            if(c.id===casterId) return{...c, talentUses:{...(c.talentUses||{}),[spell.id]:Math.max(0,((c.talentUses||{})[spell.id]??4)-1)}};
            return c;
          }));
          addLog(`☽ ${getC(casterId)?.name} raises ${target.name} with ${raiseHp} HP!`,'#c084fc');
          getPooledAudio('https://www.dropbox.com/scl/fi/gscrzi1to9c751nt1iwe6/Summon.mp3?rlkey=x1w1jievef1l3285mmyhfmayr&st=4x7280d8&dl=1').play().catch(()=>{});
          setRaisePending(null);
        }}
      />}

      {summonPending&&<SummonConfirmModal
        spell={summonPending.spell}
        casterId={summonPending.casterId}
        order={order}
        turnIdx={order.indexOf(activeTurnId)}
        combatants={combatants}
        dbCreatures={dbCreatures}
        onCancel={()=>setSummonPending(null)}
        onConfirm={(creature)=>{
          const spell=summonPending.spell;
          const casterId=summonPending.casterId;
          const newId=`summon_${Date.now()}`;
          const existing=combatants.filter(c=>c.templateId===creature.id||c.name===creature.name).length;
          const summonName=existing>0?`${creature.name} ${existing+1}`:creature.name;
          const entry={
            ...creature, id:newId, name:summonName, type:'player',
            hp:creature.maxHp||50, guard:0, maxGuard:0,
            energy:0, maxEnergy:0,
            summonedBy: casterId,
            // Restore talent uses from creature's assigned talents
            talentUses: Object.fromEntries((creature.talents||[]).map(t=>[t.id, t._assignedPoints||t.maxPoints||1])),
            critChance:(creature.critChance||0)/100, critDamage:(creature.critDamage||100)/100,
            spellCritChance:(creature.spellCritChance||0)/100, spellCritDamage:(creature.spellCritDamage||100)/100,
            conditions:(creature.startingConditions||[]).map(sc=>({type:sc.condition,rounds:sc.rounds||999,permanent:(sc.rounds||999)>=999})), buffs:[], spellCooldowns:{},
            immuneConditions:[...(creature.immuneConditions||[])],
            damageMultipliers:{...(creature.damageMultipliers||{})},
            damageImmunities:[...(creature.damageImmunities||[])],
            resistances:{...(creature.resistances||{})},
            talents:[...(creature.talents||[])], inventory:[], quickSlots:[], equippedWeapon:null, equippedArmor:null,
          };
          // Insert into combatants on the player side
          setCombatants(prev=>{
            const arr=[...prev];
            const casterIdx=arr.findIndex(c=>c.id===casterId);
            arr.splice(casterIdx+1,0,entry);
            return arr;
          });
          // Insert into turn order right after caster
          setOrder(prev=>{
            const arr=[...prev];
            const casterOrderIdx=arr.indexOf(casterId);
            arr.splice(casterOrderIdx+1,0,newId);
            return arr;
          });
          // Add summon to turn queue
          const summonSpeed=Math.max(1.00,parseFloat(parseFloat(entry.attackSpeed||2.00).toFixed(2))); // base; Haste/Slowed applied at turn-end via effectiveActionSpeed
          setTurnQueue_(prev=>{
            const updated=[...prev,{id:newId,nextTurnTime:parseFloat((combatElapsed+summonSpeed).toFixed(2)),casting:null}];
            return updated.sort((a,b)=>a.nextTurnTime!==b.nextTurnTime?a.nextTurnTime-b.nextTurnTime:(Math.random()<0.5?-1:1));
          });
          // Decrement talent uses for caster
          setCombatants(prev=>prev.map(c=>c.id===casterId?{...c,talentUses:{...(c.talentUses||{}),[spell.id]:Math.max(0,((c.talentUses||{})[spell.id]??4)-1)}}:c));
          addLog(`✦ ${getC(casterId)?.name} summons ${summonName}!`,'#67e8f9');
          getPooledAudio('https://www.dropbox.com/scl/fi/gscrzi1to9c751nt1iwe6/Summon.mp3?rlkey=x1w1jievef1l3285mmyhfmayr&st=4x7280d8&dl=1').play().catch(()=>{});
          setSummonPending(null);
        }}
      />}

      {showSpecialAttacks&&<SpecialAttacksModal c={getC(showSpecialAttacks)}
        onUse={attack=>{ setActiveSpell(attack); setStep('selectTarget'); setShowSpecialAttacks(null); }}
        onClose={()=>setShowSpecialAttacks(null)}/>}

      {showManageEffects&&(()=>{const c=getC(showManageEffects);return c?<ManageEffectsModal c={c} onRemoveCondition={type=>handleRemoveCondition(showManageEffects,type)} onRemoveBuff={type=>handleRemoveBuff(showManageEffects,type)} onClose={()=>setShowManageEffects(null)}/>:null;})()}

      {showAddCombatant&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}>
          <div style={{background:'#1f2937',borderRadius:12,border:'1px solid #4b5563',width:440,maxHeight:'80vh',display:'flex',flexDirection:'column'}}>
            <div style={{padding:'14px 18px',borderBottom:'1px solid #374151'}}>
              <h3 style={{margin:0,color:'#4ade80'}}>+ Add Combatant</h3>
            </div>
            <div style={{padding:16,display:'flex',flexDirection:'column',gap:12,overflowY:'auto'}}>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {allCategories.filter(cat=>getTemplatesForCategory(cat).length>0).map(cat=>(
                  <button key={cat} onClick={()=>setNewCombatant(p=>({...p,selectedCategory:cat,selectedTemplate:null}))}
                    style={btn({background:newCombatant.selectedCategory===cat?'#7f1d1d':'#374151',border:`1px solid ${newCombatant.selectedCategory===cat?'#f87171':'transparent'}`,color:newCombatant.selectedCategory===cat?'#fca5a5':'#9ca3af'})}>
                    {cat}
                  </button>
                ))}
              </div>
              {newCombatant.selectedCategory&&(
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {getTemplatesForCategory(newCombatant.selectedCategory).map(t=>{
                    const isSel=newCombatant.selectedTemplate===t.templateId;
                    return(
                      <button key={t.templateId} onClick={()=>setNewCombatant(p=>({...p,selectedTemplate:t.templateId}))}
                        style={btn({background:isSel?'#1e3a5f':'#111827',border:`1px solid ${isSel?'#93c5fd':'#374151'}`,textAlign:'left',display:'flex',flexDirection:'column',gap:2,padding:'8px 12px'})}>
                        <span style={{color:isSel?'#93c5fd':'#f9fafb',fontWeight:'bold'}}>{t.name}</span>
                        <span style={{color:'#6b7280',fontSize:11}}>ATK {t.attack} · DEF {t.defense} · {t.minDmg}–{t.maxDmg} dmg · HP {t.maxHp}</span>
                        {(t.immuneConditions||[]).length>0&&<span style={{color:'#4b5563',fontSize:10}}>Immune: {t.immuneConditions.join(', ')}</span>}
                      </button>
                    );
                  })}
                </div>
              )}
              {/* Battlefield row */}
              <div>
                <div style={fLabel}>BATTLEFIELD ROW</div>
                <div style={{display:'flex',gap:6}}>
                  {['monster','player'].map(row=>(
                    <button key={row} onClick={()=>setNewCombatant(p=>({...p,battlefieldRow:row,battlefieldPos:''}))}
                      style={btn({background:newCombatant.battlefieldRow===row?(row==='monster'?'#7f1d1d':'#1e3a5f'):'#374151',border:`1px solid ${newCombatant.battlefieldRow===row?(row==='monster'?'#f87171':'#38bdf8'):'transparent'}`,color:newCombatant.battlefieldRow===row?(row==='monster'?'#fca5a5':'#93c5fd'):'#9ca3af',textTransform:'capitalize'})}>
                      {row==='monster'?'👹 Monster Row':'🧑 Player Row'}
                    </button>
                  ))}
                </div>
              </div>
              {/* Battlefield position */}
              <div>
                <div style={fLabel}>POSITION IN ROW</div>
                <select value={newCombatant.battlefieldPos} onChange={e=>setNewCombatant(p=>({...p,battlefieldPos:e.target.value}))} style={{...selBase}}>
                  <option value="">— End of row —</option>
                  {combatants.filter(c=>c.type===(newCombatant.battlefieldRow==='player'?'player':'monster')).map(c=>(
                    <option key={c.id} value={c.id}>After {c.name}</option>
                  ))}
                </select>
              </div>
              {/* Initiative order */}
              <div>
                <div style={fLabel}>INITIATIVE — INSERT AFTER</div>
                <select value={newCombatant.insertAfter} onChange={e=>setNewCombatant(p=>({...p,insertAfter:e.target.value}))} style={{...selBase}}>
                  <option value="">— End of order —</option>
                  {order.map(id=>{const c=getC(id);return(<option key={id} value={id}>{c.name}{id===currentId?' (current turn)':''}</option>);})}
                </select>
              </div>
            </div>
            <div style={{padding:'12px 16px',borderTop:'1px solid #374151',display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button onClick={confirmAddCombatant} disabled={!newCombatant.selectedTemplate} style={btn({background:'#065f46',opacity:newCombatant.selectedTemplate?1:0.4})}>Add to Combat</button>
              <button onClick={()=>setShowAddCombatant(false)} style={btn()}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
