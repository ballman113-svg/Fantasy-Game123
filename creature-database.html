window.fbSanitize=function(v){if(Array.isArray(v))return v.map(window.fbSanitize);if(v&&typeof v==='object'){var o={};for(var k in v)o[k.replace(/\//g,'|SLASH|')]=window.fbSanitize(v[k]);return o;}return v;};
window.fbRestore=function(v){if(Array.isArray(v))return v.map(window.fbRestore);if(v&&typeof v==='object'){var o={};for(var k in v)o[k.replace(/\|SLASH\|/g,'/')]=window.fbRestore(v[k]);return o;}return v;};

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const LS_KEY = 'cs_creatureDatabase';
const DB_VERSION = 1;

const CATEGORIES = ['Beasts','Constructs','Demons','Elementals','Humanoids','Plants','Undead','Other'];
const DAMAGE_TYPES = ['Blunt','Cleaving','Piercing/Slashing','Acid','Arcane','Fire','Frost','Light','Lightning','Nature','Poison','Shadow'];
const ALL_CONDITIONS = ['Burning','Melting','Frostbite','Radiated','Afflicted','Electrocuted','Infected','Hexed','Bleeding','Shocked','Dazed','Stunned','Asleep','Poisoned','Charmed','Seized','Taunted','Blind','Gut Punched','Feared','Enraged','Concealed','Confused','Deafened','Silenced','Fatigued','Immobilized','Paralyzed','Disarmed','Grappled','Flying','Sundered'];

const GOLD = '#c9a227';
const BG = '#111827';
const BG_CARD = '#1f2937';
const BG_DEEP = '#0f172a';
const BORDER = '#374151';
const TEXT_MUTE = '#9ca3af';

function makeId() { return 'cr_' + Math.random().toString(36).slice(2,10); }

function emptyCreature(category) {
  return {
    id: makeId(),
    name: '',
    category: category || 'Beasts',
    description: '',
    image: 'https://drive.google.com/thumbnail?id=',
    // Combat stats
    attackType: 'Melee',
    weapon: '',
    physDmgType: 'Blunt',
    minDmg: '',
    maxDmg: '',
    traits: '',
    weaponElementalDamage: {},
    attack: '',
    defense: '',
    armor: '',
    maxHp: '',
    maxGuard: '',
    critChance: '',
    critDamage: '',
    magicAttack: '',
    spellCritChance: '',
    spellCritDamage: '',
    spellDmgPct: '',
    // Flavour attributes (no mechanical effect)
    strength: '',
    agility: '',
    intelligence: '',
    vitality: '',
    willpower: '',
    cunning: '',
    speed: '',
    hitSound: '',
    missSound: '',
    attackSpeed: '2.00',
    // Damage interactions
    damageImmunities: [],
    damageMultipliers: {},
    resistances: {},
    immuneConditions: [],
    startingConditions: [],
    talents: [],
  };
}

const DEFAULT_CREATURES = [
  {
    id: 'cr_skeleton_default',
    name: 'Skeleton',
    category: 'Undead',
    description: '',
    image: 'https://drive.google.com/thumbnail?id=',
    attackType: 'Melee',
    weapon: 'Hands',
    physDmgType: 'Blunt',
    minDmg: 10,
    maxDmg: 60,
    traits: '',
    weaponElementalDamage: {},
    attack: 10,
    defense: 5,
    armor: 0,
    maxHp: 50,
    maxGuard: 0,
    critChance: 0,
    critDamage: 100,
    magicAttack: 0,
    spellCritChance: 0,
    spellCritDamage: 100,
    spellDmgPct: 0,
    strength: 10,
    agility: 10,
    intelligence: 0,
    vitality: 0,
    willpower: 0,
    cunning: 0,
    speed: 20,
    hitSound: '',
    missSound: '',
    attackSpeed: 2.00,
    damageImmunities: ['Poison'],
    damageMultipliers: { 'Blunt': 1.2, 'Fire': 1.5, 'Light': 1.5 },
    resistances: { 'Piercing/Slashing': 50 },
    immuneConditions: ['Bleeding','Shocked','Dazed','Stunned','Asleep','Poisoned','Charmed','Blind','Gut Punched','Feared','Enraged','Confused','Deafened','Fatigued'],
    talents: [],
  }
];

function loadDB() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) {
      return DEFAULT_CREATURES.map(c => ({...c}));
    }
    const parsed = JSON.parse(raw);
    const existing = Array.isArray(parsed) ? parsed : (parsed.creatures || []);
    // Inject any default creatures not already present (by id)
    const ids = new Set(existing.map(c => c.id));
    const missing = DEFAULT_CREATURES.filter(c => !ids.has(c.id));
    return [...existing, ...missing.map(c => ({...c}))];
  } catch { return DEFAULT_CREATURES.map(c => ({...c})); }
}

function saveDB(creatures) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({ version: DB_VERSION, creatures }));
  } catch {}
  if (window._fbDb) {
    window._fbDb.ref('/creatureDatabase').set(window.fbSanitize(creatures)).catch(e => console.warn('FB creature write', e));
  }
}

// ─── CREATURE CARD ────────────────────────────────────────────────────────────
function CreatureCard({ creature, onEdit, onDelete }) {
  const [hov, setHov] = useState(false);
  return (
    <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ background: BG_CARD, border: '1px solid ' + (hov ? '#6b7280' : BORDER), borderRadius: 10,
        padding: 12, display: 'flex', gap: 12, alignItems: 'flex-start', transition: 'border-color 0.15s', cursor: 'default' }}>
      <div style={{ width: 72, height: 72, flexShrink: 0, background: BG_DEEP, border: '2px solid #374151',
        borderRadius: 8, overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {creature.image && creature.image !== 'https://drive.google.com/thumbnail?id='
          ? <img src={creature.image} style={{ width: '100%', height: '100%', objectFit: 'cover' }} onError={e => e.target.style.display = 'none'} />
          : <span style={{ fontSize: 26, opacity: 0.2 }}>👾</span>}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
          <span style={{ fontSize: 14, fontWeight: 700, color: '#f9fafb' }}>{creature.name || 'Unnamed'}</span>
          <span style={{ fontSize: 10, color: TEXT_MUTE, background: '#374151', borderRadius: 3, padding: '1px 6px', letterSpacing: 1 }}>{creature.category}</span>
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, fontSize: 11, color: TEXT_MUTE }}>
          {creature.maxHp && <span>❤ {creature.maxHp} HP</span>}
          {creature.weapon && <span>{creature.attackType === 'Ranged' ? '🏹' : '⚔'} {creature.weapon} {creature.minDmg && creature.maxDmg ? `(${creature.minDmg}–${creature.maxDmg} ${creature.physDmgType||'Blunt'})` : ''} <span style={{ fontSize: 9, color: '#6b7280' }}>{creature.attackType||'Melee'}</span></span>}
          {creature.armor > 0 && <span>🛡 {creature.armor} Armor</span>}
          {creature.talents && creature.talents.length > 0 && <span style={{ color: '#a78bfa' }}>✦ {creature.talents.length} talent{creature.talents.length !== 1 ? 's' : ''}</span>}
        </div>
        {creature.description && (
          <div style={{ fontSize: 11, color: '#6b7280', marginTop: 4, fontStyle: 'italic',
            whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
            {creature.description}
          </div>
        )}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 4, flexShrink: 0 }}>
        <button onClick={() => onEdit(creature)} style={{ background: '#1e3a5f', border: '1px solid #1d4ed8',
          color: '#93c5fd', borderRadius: 5, padding: '4px 10px', cursor: 'pointer', fontSize: 11 }}>Edit</button>
        <button onClick={() => onDelete(creature.id)} style={{ background: '#450a0a', border: '1px solid #7f1d1d',
          color: '#fca5a5', borderRadius: 5, padding: '4px 10px', cursor: 'pointer', fontSize: 11 }}>Delete</button>
      </div>
    </div>
  );
}


// ─── EDIT MODAL ───────────────────────────────────────────────────────────────
function EditModal({ creature: init, onSave, onClose }) {
  const [c, setC] = useState(() => ({ ...emptyCreature(), ...init }));
  const set = (field, val) => setC(prev => ({ ...prev, [field]: val }));

  const iBase = { background: BG_DEEP, border: '1px solid #2a2a3e', borderRadius: 6,
    color: '#fff', padding: '7px 8px', fontSize: 13, width: '100%', outline: 'none', fontFamily: 'Georgia, serif' };
  const label = { fontSize: 10, color: '#666', letterSpacing: 1, marginBottom: 4, display: 'block' };
  const section = { marginBottom: 20 };
  const sTitle = { fontSize: 11, color: GOLD, letterSpacing: 2, marginBottom: 10, textTransform: 'uppercase' };

  // Elemental damage helpers
  const setElem = (type, val) => {
    const next = { ...c.weaponElementalDamage };
    if (!val) delete next[type]; else next[type] = parseInt(val) || 0;
    set('weaponElementalDamage', next);
  };
  const setMult = (type, val) => {
    const next = { ...c.damageMultipliers };
    if (!val) delete next[type]; else next[type] = parseFloat(val) || 1;
    set('damageMultipliers', next);
  };
  const toggleImmuneCondition = (cond) => {
    const curr = c.immuneConditions || [];
    set('immuneConditions', curr.includes(cond) ? curr.filter(x => x !== cond) : [...curr, cond]);
  };
  const toggleDmgImmunity = (type) => {
    const curr = c.damageImmunities || [];
    set('damageImmunities', curr.includes(type) ? curr.filter(x => x !== type) : [...curr, type]);
  };

  return (
    <div onClick={e => { if (e.target === e.currentTarget) onClose(); }}
      style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', display: 'flex',
        alignItems: 'center', justifyContent: 'center', zIndex: 200, padding: 16 }}>
      <div style={{ background: '#16213e', borderRadius: 12, border: '1px solid #2a2a4a',
        width: '100%', maxWidth: 680, maxHeight: '90vh', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>

        {/* Header */}
        <div style={{ padding: '12px 18px', borderBottom: '1px solid #2a2a4a', background: BG_DEEP,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontSize: 13, color: GOLD, fontWeight: 700, letterSpacing: 1 }}>
            {init.id ? 'EDIT CREATURE' : 'NEW CREATURE'}
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#6b7280', cursor: 'pointer', fontSize: 18 }}>✕</button>
        </div>

        <div style={{ overflowY: 'auto', padding: 18, flex: 1 }}>

          {/* Basic Info */}
          <div style={section}>
            <div style={sTitle}>Basic Info</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 10 }}>
              <div>
                <label style={label}>NAME</label>
                <input value={c.name} onChange={e => set('name', e.target.value)} placeholder="Creature name" style={iBase} id="cr-name" name="cr-name" />
              </div>
              <div>
                <label style={label}>CATEGORY</label>
                <select value={c.category} onChange={e => set('category', e.target.value)}
                  style={{ ...iBase, padding: '7px 8px' }}>
                  {CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                </select>
              </div>
            </div>
            <div style={{ marginBottom: 10 }}>
              <label style={label}>DESCRIPTION</label>
              <textarea value={c.description} onChange={e => set('description', e.target.value)}
                placeholder="Creature description..."
                style={{ ...iBase, minHeight: 70, resize: 'vertical', lineHeight: 1.5 }} />
            </div>
            <div>
              <label style={label}>IMAGE URL</label>
              <input value={c.image} onChange={e => set('image', e.target.value)} placeholder="https://drive.google.com/thumbnail?id=..." style={iBase} id="cr-image" name="cr-image" />
              {c.image && c.image !== 'https://drive.google.com/thumbnail?id=' && (
                <img src={c.image} style={{ width: 64, height: 64, objectFit: 'cover', borderRadius: 6, marginTop: 6, border: '1px solid #374151' }}
                  onError={e => e.target.style.display = 'none'} />
              )}
            </div>
          </div>

          {/* Combat Stats */}
          <div style={section}>
            <div style={sTitle}>Combat Stats</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 10 }}>
              {[['maxHp','Max HP'],['maxGuard','Max Guard'],['armor','Armor'],
                ['attack','Attack'],['defense','Defense'],
                ['critChance','Crit Chance %'],['critDamage','Crit Damage %'],
                ['magicAttack','Magic Attack'],['spellCritChance','Spell Crit Chance %'],['spellCritDamage','Spell Crit Damage %'],['spellDmgPct','Spell Dmg Bonus %']].map(([field, lbl]) => (
                <div key={field}>
                  <label style={label}>{lbl.toUpperCase()}</label>
                  <input type="number" value={c[field]} onChange={e => set(field, e.target.value)} placeholder="0" style={iBase} id={`cr-${field}`} name={`cr-${field}`} />
                </div>
              ))}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr 1fr', gap: 10 }}>
              <div>
                <label style={label}>ATTACK TYPE</label>
                <select value={c.attackType||'Melee'} onChange={e => set('attackType', e.target.value)} style={iBase}>
                  <option>Melee</option>
                  <option>Ranged</option>
                </select>
              </div>
              <div>
                <label style={label}>WEAPON NAME</label>
                <input value={c.weapon} onChange={e => set('weapon', e.target.value)} placeholder="e.g. Claws" style={iBase} id="cr-weapon" name="cr-weapon" />
              </div>
              <div>
                <label style={label}>PHYS DMG TYPE</label>
                <select value={c.physDmgType||'Blunt'} onChange={e => set('physDmgType', e.target.value)} style={iBase}>
                  <option>Blunt</option>
                  <option>Cleaving</option>
                  <option>Piercing/Slashing</option>
                </select>
              </div>
              <div>
                <label style={label}>MIN DAMAGE</label>
                <input type="number" value={c.minDmg} onChange={e => set('minDmg', e.target.value)} placeholder="0" style={iBase} id="cr-minDmg" name="cr-minDmg" />
              </div>
              <div>
                <label style={label}>MAX DAMAGE</label>
                <input type="number" value={c.maxDmg} onChange={e => set('maxDmg', e.target.value)} placeholder="0" style={iBase} id="cr-maxDmg" name="cr-maxDmg" />
              </div>
            </div>
          </div>

          {/* Sounds */}
          <div style={section}>
            <div style={sTitle}>Sounds</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              <div>
                <label style={label}>HIT SOUND URL</label>
                <input value={c.hitSound||''} onChange={e => set('hitSound', e.target.value)}
                  placeholder="https://...&dl=1" style={iBase} id="cr-hitSound" name="cr-hitSound" />
              </div>
              <div>
                <label style={label}>MISS SOUND URL</label>
                <input value={c.missSound||''} onChange={e => set('missSound', e.target.value)}
                  placeholder="https://...&dl=1" style={iBase} id="cr-missSound" name="cr-missSound" />
              </div>
            </div>
            <div style={{marginTop:10}}>
              <label style={label}>ATTACK SPEED (seconds)</label>
              <input type="number" step="0.01" min="1.00" value={c.attackSpeed||'2.00'} onChange={e => set('attackSpeed', e.target.value)}
                placeholder="2.00" style={{...iBase, width:120}} id="cr-attackSpeed" name="cr-attackSpeed" />
            </div>
          </div>

          {/* Elemental Weapon Damage */}
          <div style={section}>
            <div style={sTitle}>Elemental Weapon Damage</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
              {DAMAGE_TYPES.filter(t => !['Blunt','Cleaving','Piercing/Slashing'].includes(t)).map(type => (
                <div key={type}>
                  <label style={label}>{type.toUpperCase()}</label>
                  <input type="number" id={`cr-elem-${type}`} name={`cr-elem-${type}`}
                    value={c.weaponElementalDamage?.[type] || ''}
                    onChange={e => setElem(type, e.target.value)}
                    placeholder="0" style={iBase} />
                </div>
              ))}
            </div>
          </div>

          {/* Damage Multipliers */}
          <div style={section}>
            <div style={sTitle}>Damage Multipliers (e.g. 1.5 = +50% taken, 0.5 = -50% taken)</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
              {DAMAGE_TYPES.map(type => (
                <div key={type}>
                  <label style={label}>{type.toUpperCase()}</label>
                  <input type="number" step="0.1" id={`cr-mult-${type}`} name={`cr-mult-${type}`}
                    value={c.damageMultipliers?.[type] || ''}
                    onChange={e => setMult(type, e.target.value)}
                    placeholder="1.0" style={iBase} />
                </div>
              ))}
            </div>
          </div>

          {/* Traits */}
          <div style={section}>
            <div style={sTitle}>Traits / Modifiers</div>
            <input value={c.traits||''} onChange={e => set('traits', e.target.value)}
              placeholder="+5 Fire damage main hand, 20% chance to cause Burning 3s main hand..."
              style={{...iBase, width:'100%'}} id="cr-traits" name="cr-traits" />
            <div style={{fontSize:10,color:'#6b7280',marginTop:4}}>Uses same syntax as item traits — parsed by simulator</div>
          </div>

          {/* Resistances */}
          <div style={section}>
            <div style={sTitle}>Resistances % (e.g. 20 = 20% damage reduction)</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
              {DAMAGE_TYPES.map(type => (
                <div key={type}>
                  <label style={label}>{type.toUpperCase()}</label>
                  <input type="number" id={`cr-res-${type}`} name={`cr-res-${type}`}
                    value={c.resistances?.[type] || ''}
                    onChange={e => {
                      const next = { ...(c.resistances||{}) };
                      if (!e.target.value) delete next[type]; else next[type] = parseInt(e.target.value) || 0;
                      set('resistances', next);
                    }}
                    placeholder="0" style={iBase} />
                </div>
              ))}
            </div>
          </div>

          {/* Damage Immunities */}
          <div style={section}>
            <div style={sTitle}>Damage Immunities</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {DAMAGE_TYPES.map(type => {
                const active = (c.damageImmunities || []).includes(type);
                return (
                  <button key={type} onClick={() => toggleDmgImmunity(type)}
                    style={{ padding: '4px 10px', borderRadius: 4, fontSize: 11, cursor: 'pointer', border: '1px solid',
                      background: active ? '#166534' : '#1f2937', color: active ? '#4ade80' : '#6b7280',
                      borderColor: active ? '#166534' : '#374151' }}>
                    {type}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Condition Immunities */}
          <div style={section}>
            <div style={sTitle}>Condition Immunities</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {ALL_CONDITIONS.map(cond => {
                const active = (c.immuneConditions || []).includes(cond);
                return (
                  <button key={cond} onClick={() => toggleImmuneCondition(cond)}
                    style={{ padding: '4px 10px', borderRadius: 4, fontSize: 11, cursor: 'pointer', border: '1px solid',
                      background: active ? '#1e3a5f' : '#1f2937', color: active ? '#93c5fd' : '#6b7280',
                      borderColor: active ? '#1d4ed8' : '#374151' }}>
                    {cond}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Starting Conditions */}
          <div style={section}>
            <div style={sTitle}>Starting Conditions</div>
            <div style={{ fontSize: 11, color: '#6b7280', marginBottom: 8 }}>Conditions this creature enters combat with. Use 999 for permanent.</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 10 }}>
              {ALL_CONDITIONS.map(cond => {
                const existing = (c.startingConditions || []).find(sc => sc.condition === cond);
                const active = !!existing;
                return (
                  <button key={cond} onClick={() => {
                    const curr = c.startingConditions || [];
                    if (active) {
                      set('startingConditions', curr.filter(sc => sc.condition !== cond));
                    } else {
                      set('startingConditions', [...curr, { condition: cond, rounds: 999 }]);
                    }
                  }} style={{ padding: '4px 10px', borderRadius: 4, fontSize: 11, cursor: 'pointer', border: '1px solid',
                    background: active ? '#1a2e1a' : '#1f2937', color: active ? '#4ade80' : '#6b7280',
                    borderColor: active ? '#16a34a' : '#374151' }}>
                    {cond}
                  </button>
                );
              })}
            </div>
            {(c.startingConditions || []).length > 0 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                {(c.startingConditions || []).map((sc, i) => (
                  <div key={sc.condition} style={{ display: 'flex', alignItems: 'center', gap: 10, background: '#111827', borderRadius: 6, padding: '6px 10px' }}>
                    <span style={{ color: '#4ade80', fontSize: 12, flex: 1 }}>{sc.condition}</span>
                    <label style={{ fontSize: 11, color: '#6b7280' }}>Rounds:</label>
                    <input type="number" value={sc.rounds} min={1}
                      onChange={e => {
                        const updated = [...(c.startingConditions || [])];
                        updated[i] = { ...updated[i], rounds: parseInt(e.target.value) || 1 };
                        set('startingConditions', updated);
                      }}
                      style={{ ...iBase, width: 70, padding: '4px 8px' }} />
                    <button onClick={() => set('startingConditions', (c.startingConditions||[]).filter((_,j)=>j!==i))}
                      style={{ background: '#7f1d1d', border: 'none', color: '#fca5a5', borderRadius: 4, padding: '3px 8px', cursor: 'pointer', fontSize: 11 }}>✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Talents */}

          {/* Flavour Attributes */}
          <div style={section}>
            <div style={sTitle}>Attributes (flavour only — no mechanical effect)</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
              {[['strength','Strength'],['agility','Agility'],['intelligence','Intelligence'],['vitality','Vitality'],
                ['willpower','Willpower'],['cunning','Cunning'],['speed','Speed']].map(([field, lbl]) => (
                <div key={field}>
                  <label style={label}>{lbl.toUpperCase()}</label>
                  <input type="number" id={`cr-attr-${field}`} name={`cr-attr-${field}`}
                    value={c[field]} onChange={e => set(field, e.target.value)} placeholder="0" style={iBase} />
                </div>
              ))}
            </div>
          </div>

        </div>

        {/* Footer */}
        <div style={{ padding: '12px 18px', borderTop: '1px solid #2a2a4a', background: BG_DEEP,
          display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button onClick={onClose}
            style={{ background: '#374151', color: '#f9fafb', border: 'none', borderRadius: 6, padding: '8px 18px', cursor: 'pointer', fontSize: 13 }}>
            Cancel
          </button>
          <button onClick={() => { if (!c.name.trim()) { alert('Creature needs a name.'); return; } onSave(c); }}
            style={{ background: '#1e3a5f', color: '#93c5fd', border: '1px solid #1d4ed8', borderRadius: 6, padding: '8px 18px', cursor: 'pointer', fontSize: 13, fontWeight: 700 }}>
            Save Creature
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [creatures, setCreatures] = useState(() => loadDB());
  const _fbCreatureSyncing = useRef(false);
  // Load from Firebase on mount
  useEffect(() => {
    if (!window._fbDb) return;
    window._fbDb.ref('/creatureDatabase').once('value').then(snap => {
      const d = snap.val();
      if (!d || !Array.isArray(d) || !d.length) return;
      try {
        const restored = window.fbRestore(d);
        _fbCreatureSyncing.current = true;
        setCreatures(restored);
        localStorage.setItem(LS_KEY, JSON.stringify({ version: DB_VERSION, creatures: restored }));
        setTimeout(() => { _fbCreatureSyncing.current = false; }, 600);
      } catch(e) { console.warn('FB creature load', e); }
    });
    // Real-time listener
    const ref = window._fbDb.ref('/creatureDatabase');
    ref.on('value', snap => {
      if (_fbCreatureSyncing.current) return;
      const d = snap.val();
      if (!d || !Array.isArray(d)) return;
      _fbCreatureSyncing.current = true;
      const restored = window.fbRestore(d);
      setCreatures(restored);
      setTimeout(() => { _fbCreatureSyncing.current = false; }, 600);
    });
    return () => ref.off();
  }, []);
  const [modal, setModal] = useState(null); // null | creature object (new or edit)
  const [activeCategory, setActiveCategory] = useState('All');
  const [search, setSearch] = useState('');
  const [saved, setSaved] = useState(false);
  const firstRun = useRef(true);

  useEffect(() => {
    if (firstRun.current) { firstRun.current = false; saveDB(creatures); return; }
    saveDB(creatures);
    setSaved(true);
    const t = setTimeout(() => setSaved(false), 1500);
    return () => clearTimeout(t);
  }, [creatures]);

  function saveCreature(c) {
    setCreatures(prev => {
      const idx = prev.findIndex(x => x.id === c.id);
      if (idx >= 0) { const n = prev.slice(); n[idx] = c; return n; }
      return prev.concat([c]);
    });
    setModal(null);
  }

  function deleteCreature(id) {
    if (!confirm('Delete this creature?')) return;
    setCreatures(prev => prev.filter(x => x.id !== id));
  }

  const filtered = creatures.filter(c => {
    const matchCat = activeCategory === 'All' || c.category === activeCategory;
    const matchSearch = !search || c.name.toLowerCase().includes(search.toLowerCase()) ||
      (c.description || '').toLowerCase().includes(search.toLowerCase());
    return matchCat && matchSearch;
  });

  const countFor = cat => creatures.filter(c => c.category === cat).length;

  function handleExport() {
    const data = { version: DB_VERSION, exported: new Date().toISOString(), creatures };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rmsw-creatures-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const parsed = JSON.parse(ev.target.result);
        const imported = Array.isArray(parsed) ? parsed : (parsed.creatures || []);
        if (!imported.length) { alert('No creatures found in file.'); return; }
        if (!confirm('Import ' + imported.length + ' creatures? This will REPLACE your current database.')) return;
        setCreatures(imported);
        alert('Imported ' + imported.length + ' creatures successfully.');
      } catch { alert('Invalid JSON file.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  return (
    <div style={{ minHeight: '100vh', background: BG }}>
      {/* Header */}
      <div style={{ borderBottom: '1px solid ' + BORDER, padding: '14px 24px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: BG_DEEP }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontSize: 20 }}>👾</span>
          <span style={{ fontSize: 16, fontWeight: 700, color: GOLD, letterSpacing: 2 }}>CREATURE DATABASE</span>
          <span style={{ fontSize: 11, color: TEXT_MUTE, background: '#374151', borderRadius: 3, padding: '2px 8px' }}>
            {saved ? '✓ SAVED' : creatures.length + ' creatures'}
          </span>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={handleExport} style={{ background: '#166534', border: '1px solid #15803d', color: '#4ade80',
            borderRadius: 6, padding: '6px 12px', cursor: 'pointer', fontSize: 11 }}>
            ⬇ Export
          </button>
          <label style={{ background: '#1e3a5f', border: '1px solid #1d4ed8', color: '#93c5fd',
            borderRadius: 6, padding: '6px 12px', cursor: 'pointer', fontSize: 11 }}>
            ⬆ Import
            <input type="file" accept=".json" onChange={handleImport} style={{ display: 'none' }} />
          </label>
          <button onClick={() => setModal(emptyCreature(activeCategory === 'All' ? 'Beasts' : activeCategory))}
            style={{ background: '#166534', border: '1px solid #15803d', color: '#4ade80',
              borderRadius: 6, padding: '6px 16px', cursor: 'pointer', fontSize: 13, fontWeight: 700 }}>
            + New Creature
          </button>
        </div>
      </div>

      {/* Category tabs */}
      <div style={{ borderBottom: '1px solid ' + BORDER, padding: '0 24px', display: 'flex', gap: 0, background: '#16213e' }}>
        {['All', ...CATEGORIES].map(cat => (
          <button key={cat} onClick={() => setActiveCategory(cat)}
            style={{ padding: '10px 14px', background: 'none', border: 'none',
              borderBottom: activeCategory === cat ? '2px solid ' + GOLD : '2px solid transparent',
              color: activeCategory === cat ? GOLD : TEXT_MUTE, cursor: 'pointer', fontSize: 12,
              letterSpacing: 1, fontFamily: 'Georgia, serif' }}>
            {cat}
            {cat !== 'All' && countFor(cat) > 0 && (
              <span style={{ marginLeft: 4, fontSize: 9, color: activeCategory === cat ? GOLD : '#4b5563' }}>
                ({countFor(cat)})
              </span>
            )}
          </button>
        ))}
      </div>

      {/* Search + list */}
      <div style={{ maxWidth: 860, margin: '0 auto', padding: 24 }}>
        <input value={search} onChange={e => setSearch(e.target.value)}
          placeholder="Search creatures..." id="cr-search" name="cr-search"
          style={{ background: BG_DEEP, border: '1px solid ' + BORDER, borderRadius: 6,
            color: '#fff', padding: '8px 12px', fontSize: 13, width: '100%', outline: 'none',
            fontFamily: 'Georgia, serif', marginBottom: 16 }} />

        {filtered.length === 0 ? (
          <div style={{ textAlign: 'center', color: '#4b5563', fontSize: 14, padding: 40, fontStyle: 'italic' }}>
            {creatures.length === 0 ? 'No creatures yet. Click "+ New Creature" to add one.' : 'No creatures match your search.'}
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {filtered.map(c => (
              <CreatureCard key={c.id} creature={c} onEdit={setModal} onDelete={deleteCreature} />
            ))}
          </div>
        )}
      </div>

      {modal && <EditModal creature={modal} onSave={saveCreature} onClose={() => setModal(null)} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
