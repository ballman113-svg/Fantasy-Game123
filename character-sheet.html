    const { useState, useEffect, useRef, useCallback } = React;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const ATTRS = ["Intelligence","Strength","Agility","Vitality","Willpower","Cunning","Speed"];
const DERIVED_STATS = ["Guard","Health","Energy"];
const COMBAT_STATS = ["Attack Rating","Defense","Magic Attack","Critical Hit Chance","Critical Hit Damage","Spell Critical Chance","Spell Critical Damage","Flanking Damage","Guard Damage","Armor Penetration"];

const SKILLS = SKILLS_LEFT.concat(SKILLS_RIGHT);
const ALL_PARSEABLE = ATTRS.concat(DERIVED_STATS).concat(COMBAT_STATS).concat(RESISTANCES).concat(SKILLS);
const SORTED_KEYS = ALL_PARSEABLE.slice().sort((a,b) => b.length - a.length);
const DAMAGE_TYPES = ["Blunt","Cleaving","Piercing/Slashing","Acid","Arcane","Fire","Frost","Light","Lightning","Nature","Poison","Shadow"];
const DAMAGE_COLORS = {Blunt:"#d4b483",Cleaving:"#e87040","Piercing/Slashing":"#c0c0c0",Acid:"#aaff00",Arcane:"#bb44ff",Fire:"#ff7700",Frost:"#44aaff",Light:"#ffee44",Lightning:"#ffff55",Nature:"#44dd44",Poison:"#88cc00",Shadow:"#cc44ff"};
function getTalentDmgRange(talent, pts, playerLevel) {
  const lvl = Math.max(1, parseInt(playerLevel)||1);
  const type = talent.type;
  if (type === 'Spell Attack') {
    const baseMin = parseInt(talent.minVal)||0;
    const baseMax = parseInt(talent.maxVal)||0;
    if (!baseMin && !baseMax) return null;
    const scale = parseFloat(talent.dmgLevelScale)||0;
    const mult = scale > 0 ? (1 + scale * lvl / 100) : 1;
    const dmgType = talent.spellDmgType && talent.spellDmgType !== 'None' ? talent.spellDmgType : (talent.damageType || 'Arcane');
    return { min: Math.round(baseMin * mult), max: Math.round(baseMax * mult), baseMin, baseMax, scaled: scale > 0, color: DAMAGE_COLORS[dmgType]||'#a78bfa', label: dmgType };
  }
  if (type === 'Spell Heal') {
    const baseMin = parseInt(talent.minHeal)||0;
    const baseMax = parseInt(talent.maxHeal)||0;
    if (!baseMin && !baseMax) return null;
    const scale = parseFloat(talent.healLevelScale)||0;
    const mult = scale > 0 ? (1 + scale * lvl / 100) : 1;

  }

}

// ─── PARSERS ──────────────────────────────────────────────────────────────────
function parseBonus(text) {
  const bonuses = {};
  const escaped = SORTED_KEYS.map(k => k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|");
  const re = new RegExp("([+-]\\d+)%?\\s+("+escaped+")","gi");
  let m;
  while ((m = re.exec(text)) !== null) {
    const key = ALL_PARSEABLE.find(a => a.toLowerCase() === m[2].toLowerCase());
    if (key) bonuses[key] = (bonuses[key]||0) + parseInt(m[1]);
  }
  return bonuses;
}
function parseDamageBonus(text, forceHand) {
  const result = {main:{},off:{}};
  // Explicit hand qualifier — always respected
  const reWithHand = new RegExp("([+-]\\d+)\\s+("+DAMAGE_TYPES.join("|")+")\\s+damage\\s+(main\\s+hand|off\\s+hand)","gi");
  // No qualifier — routes to forceHand (weapon slot) or ignored (armor/accessory)
  const reNoHand   = new RegExp("([+-]\\d+)\\s+("+DAMAGE_TYPES.join("|")+")\\s+damage(?!\\s+(main|off)\\s+hand)","gi");
  let m;
  while ((m = reWithHand.exec(text)) !== null) {
    const type = DAMAGE_TYPES.find(t => t.toLowerCase() === m[2].toLowerCase());
    const hand = m[3].toLowerCase().replace(/\s+/,"") === "mainhand" ? "main" : "off";
    if (type) result[hand][type] = (result[hand][type]||0) + parseInt(m[1]);
  }
  if (forceHand) {
    while ((m = reNoHand.exec(text)) !== null) {
      const type = DAMAGE_TYPES.find(t => t.toLowerCase() === m[2].toLowerCase());
      if (type) result[forceHand][type] = (result[forceHand][type]||0) + parseInt(m[1]);
    }
  }
  return result;
}
function parseProtectionBonus(text) {
  const protections = {};
  const re = new RegExp(`Protection\\s+From\\s+(${DAMAGE_TYPES.join('|')})\\s+damage\\s+(\\d+)%`, 'gi');
  let m;
  while ((m = re.exec(text)) !== null) {
    const type = DAMAGE_TYPES.find(t => t.toLowerCase() === m[1].toLowerCase());
    if (type) protections[type] = (protections[type]||0) + parseInt(m[2]);
  }
  return protections;
}
function parseWeaknessBonus(text) {
  const weaknesses = {};
  const re = new RegExp(`Weakness\\s+to\\s+(${DAMAGE_TYPES.join('|')})\\s+damage\\s+(\\d+)%`, 'gi');
  let m;
  while ((m = re.exec(text)) !== null) {
    const type = DAMAGE_TYPES.find(t => t.toLowerCase() === m[1].toLowerCase());
    if (type) weaknesses[type] = (weaknesses[type]||0) + parseInt(m[2]);
  }
  return weaknesses;
}
function parseImmunityBonus(text) {
  const CONDITION_NAMES = ["Burning","Chilled","Frozen","Shocked","Dazed","Asleep","Poisoned","Knocked Down","Stunned","Charmed","Haste","Slowed","Blind","Invisible","Taunted","Gut Punched","Seized"];
  const damageImmunities = [];
  const conditionImmunities = [];
  const damageRe = new RegExp(`Immune\\s+to\\s+(${DAMAGE_TYPES.join('|')})\\s+damage`, 'gi');
  const conditionRe = new RegExp(`Immune\\s+to\\s+(${CONDITION_NAMES.map(c=>c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')})`, 'gi');
  let m;
  while ((m = damageRe.exec(text)) !== null) {
    const type = DAMAGE_TYPES.find(t => t.toLowerCase() === m[1].toLowerCase());
    if (type && !damageImmunities.includes(type)) damageImmunities.push(type);
  }
  while ((m = conditionRe.exec(text)) !== null) {
    const cond = CONDITION_NAMES.find(c => c.toLowerCase() === m[1].toLowerCase());
    if (cond && !conditionImmunities.includes(cond)) conditionImmunities.push(cond);
  }
  return { damageImmunities, conditionImmunities };
}
function parsePctBonus(text) {
  const bonuses = {};
  const escaped = SORTED_KEYS.map(k => k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|");
  const re = new RegExp("([+-]\\d+)%\\s+("+escaped+")","gi");
  let m;
  while ((m = re.exec(text)) !== null) {
    const key = ALL_PARSEABLE.find(a => a.toLowerCase() === m[2].toLowerCase());
    if (key) bonuses[key] = (bonuses[key]||0) + parseInt(m[1]);
  }
  return bonuses;
}
function parseProcBonus(text, forceHand) {
  const result = {main:[],off:[]};
  const reWithHand = /(\d+)%\s+chance\s+to\s+cause\s+(\w[\w\s]*)\s+(\d+)\s+rounds?\s+(main\s+hand|off\s+hand)/gi;
  const reNoHand   = /(\d+)%\s+chance\s+to\s+cause\s+(\w[\w\s]*)\s+(\d+)\s+rounds?(?!\s+(main|off)\s+hand)/gi;
  let m;
  while ((m = reWithHand.exec(text)) !== null) {
    const hand = m[4].toLowerCase().replace(/\s+/,'') === 'mainhand' ? 'main' : 'off';
    const cond = m[2].trim(); result[hand].push({ condition: cond.charAt(0).toUpperCase()+cond.slice(1), chance: parseInt(m[1])/100, rounds: parseInt(m[3]) });
  }
  if (forceHand) {
    while ((m = reNoHand.exec(text)) !== null) {
      const cond = m[2].trim(); result[forceHand].push({ condition: cond.charAt(0).toUpperCase()+cond.slice(1), chance: parseInt(m[1])/100, rounds: parseInt(m[3]) });
    }
  }
  return result;
}
function parseRemoveConditions(text) {
  // Returns {mode:'all'} or {mode:'select', conditions:[...]} or null
  if(/Remove\s+all\s+conditions/i.test(text)) return {mode:'all'};
  const m = text.match(/Remove:\s*([\w\s,()]+)/i);
  if(m) {
    const conditions = m[1].split(',').map(s=>s.trim()).filter(Boolean);
    if(conditions.length) return {mode:'select', conditions};
  }
  return null;
}
function parseGuaranteedProc(text) {
  // Matches: Inflicts [Condition] for N rounds on hit
  const result = [];
  const condNames = Object.keys({Burning:1,Chilled:1,Frozen:1,Shocked:1,Dazed:1,Asleep:1,Poisoned:1,'Knocked Down':1,Stunned:1,Charmed:1,Haste:1,Slowed:1,Blind:1,Invisible:1,'Invisible (Improved)':1,Taunted:1,'Gut Punched':1,Seized:1,Feared:1,Enraged:1,Concealed:1,Confused:1,Bleeding:1,Deafened:1,Silenced:1,Fatigued:1,Immobilized:1,Paralyzed:1,Disarmed:1,Grappled:1,Flying:1,Sundered:1});
  const escaped = condNames.map(c=>c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');
  const re = new RegExp(`Inflicts\\s+(${escaped})\\s+for\\s+(\\d+)\\s+rounds?\\s+on\\s+hit`,'gi');
  let m;
  while((m = re.exec(text)) !== null) {
    const cond = condNames.find(c=>c.toLowerCase()===m[1].toLowerCase());
    if(cond) result.push({condition:cond, rounds:parseInt(m[2])});
  }
  return result;
}
function parseHealProcBonus(text, forceHand) {
  const result = {main:[],off:[]};
  const reWithHand = /(\d+)%\s+chance\s+to\s+heal\s+(\d+)%\s+on\s+hit\s+(main\s+hand|off\s+hand)/gi;
  const reNoHand   = /(\d+)%\s+chance\s+to\s+heal\s+(\d+)%\s+on\s+hit(?!\s+(main|off)\s+hand)/gi;
  let m;
  while ((m = reWithHand.exec(text)) !== null) {
    const hand = m[3].toLowerCase().replace(/\s+/,'') === 'mainhand' ? 'main' : 'off';
    result[hand].push({ chance: parseInt(m[1])/100, healPct: parseInt(m[2])/100 });
  }
  if (forceHand) {
    while ((m = reNoHand.exec(text)) !== null) {
      result[forceHand].push({ chance: parseInt(m[1])/100, healPct: parseInt(m[2])/100 });
    }
  }
  return result;
}
function parseGuardProcBonus(text, forceHand) {
  const result = {main:[],off:[]};
  const reWithHand = /(\d+)%\s+chance\s+to\s+restore\s+(\d+)%\s+guard\s+on\s+hit\s+(main\s+hand|off\s+hand)/gi;
  const reNoHand   = /(\d+)%\s+chance\s+to\s+restore\s+(\d+)%\s+guard\s+on\s+hit(?!\s+(main|off)\s+hand)/gi;
  let m;
  while ((m = reWithHand.exec(text)) !== null) {
    const hand = m[3].toLowerCase().replace(/\s+/,'') === 'mainhand' ? 'main' : 'off';
    result[hand].push({ chance: parseInt(m[1])/100, restorePct: parseInt(m[2])/100 });
  }
  if (forceHand) {
    while ((m = reNoHand.exec(text)) !== null) {
      result[forceHand].push({ chance: parseInt(m[1])/100, restorePct: parseInt(m[2])/100 });
    }
  }
  return result;
}
function parseEnergyProcBonus(text, forceHand) {
  const result = {main:[],off:[]};
  const reWithHand = /(\d+)%\s+chance\s+to\s+restore\s+(\d+)%\s+energy\s+on\s+hit\s+(main\s+hand|off\s+hand)/gi;
  const reNoHand   = /(\d+)%\s+chance\s+to\s+restore\s+(\d+)%\s+energy\s+on\s+hit(?!\s+(main|off)\s+hand)/gi;
  let m;
  while ((m = reWithHand.exec(text)) !== null) {
    const hand = m[3].toLowerCase().replace(/\s+/,'') === 'mainhand' ? 'main' : 'off';
    result[hand].push({ chance: parseInt(m[1])/100, restorePct: parseInt(m[2])/100 });
  }
  if (forceHand) {
    while ((m = reNoHand.exec(text)) !== null) {
      result[forceHand].push({ chance: parseInt(m[1])/100, restorePct: parseInt(m[2])/100 });
    }
  }
  return result;
}
function parseMinMaxBonus(text, forceHand) {
  const result = {main:{min:0,max:0},off:{min:0,max:0}};
  const reWithHand = new RegExp("([+-]\\d+)\\s+(min|max)\\s+damage\\s+(main\\s+hand|off\\s+hand)","gi");
  const reNoHand   = new RegExp("([+-]\\d+)\\s+(min|max)\\s+damage(?!\\s+(main|off)\\s+hand)","gi");
  let m;
  while ((m = reWithHand.exec(text)) !== null) {
    const hand = m[3].toLowerCase().replace(/\s+/,"") === "mainhand" ? "main" : "off";
    result[hand][m[2].toLowerCase()] += parseInt(m[1]);
  }

    while ((m = reNoHand.exec(text)) !== null) {
      result[forceHand][m[2].toLowerCase()] += parseInt(m[1]);

// ─── SHEET STATE ──────────────────────────────────────────────────────────────
const defHand   = {type:"Melee",name:"",minDmg:"",maxDmg:"",defenseMod:"",traits:"",image:""};
const defArmor  = {type:"",armor:"",traits:"",image:""};
const defSimple = {traits:"",image:""};
const defBelt   = {quickSlots:"",traits:"",image:""};

function createSheetState() {
  return {
    bio: {Name:"",Race:"",Class:"",XPLevel:"",XP:"",Alignment:"",Age:"",Height:"",Weight:"",HairEyesSkin:""},
    baseStats:  Object.fromEntries(ATTRS.map(a => [a,""])),
    current:    {Guard:"",Health:"",Energy:""},
    mainHand: {...defHand}, offHand: {...defHand},
    head:{...defArmor}, body:{...defArmor}, legs:{...defArmor},
    hands:{...defArmor}, feet:{...defArmor}, back:{...defArmor},
    belt:{...defBelt}, amulet:{...defSimple}, leftRing:{...defSimple}, rightRing:{...defSimple},
    baseSkills: Object.fromEntries(SKILLS.map(s => [s,""])),
    inventory:  Array(20).fill(null).map(() => ({name:"",weight:""})),
    traitsText: "",
  };
}

function computeBonuses(sheet) {
  const { mainHand, offHand, head, body, legs, hands, feet, back, belt, amulet, leftRing, rightRing } = sheet;
  const allBonuses = Object.fromEntries(ALL_PARSEABLE.map(k => [k,0]));
  const allPctBonuses = {};
  // Armor pieces contribute three separate physical resistances
  [head,body,legs,hands,feet,back].forEach(p => {
    if (!p) return;
    allBonuses["Blunt Resistance"]            = (allBonuses["Blunt Resistance"]||0)            + (parseInt(p.bluntRes)||0);
    allBonuses["Cleaving Resistance"]         = (allBonuses["Cleaving Resistance"]||0)         + (parseInt(p.cleavingRes)||0);
    allBonuses["Piercing/Slashing Resistance"]= (allBonuses["Piercing/Slashing Resistance"]||0)+ (parseInt(p.piercingSlashingRes)||0);
  });
  const allDamage = {main:{},off:{}};
  const allMinMax = {main:{min:0,max:0},off:{min:0,max:0}};
  const allProcs  = {main:[],off:[]};
  const allHealProcs = {main:[],off:[]};
  const allGuardProcs = {main:[],off:[]};
  const allEnergyProcs = {main:[],off:[]};
  const allDamageImmunities = [];
  const allConditionImmunities = [];
  const allWeaknesses = {};
  const allProtections = {};
  [[mainHand,'main'],[offHand,'off'],...[head,body,legs,hands,feet,back,belt,amulet,leftRing,rightRing].map(p=>[p,null])].forEach(([p,weaponHand]) => {
    if (!p) return;
    const v = p.traits||"";
    Object.entries(parseBonus(v)).forEach(([k,val]) => { allBonuses[k] += val; });
    Object.entries(parsePctBonus(v)).forEach(([k,val]) => { allPctBonuses[k] = (allPctBonuses[k]||0) + val; });
    const d = parseDamageBonus(v, weaponHand);
    ["main","off"].forEach(h => Object.keys(d[h]).forEach(t => { allDamage[h][t]=(allDamage[h][t]||0)+d[h][t]; }));
    const mm = parseMinMaxBonus(v, weaponHand);
    ["main","off"].forEach(h => { allMinMax[h].min+=mm[h].min; allMinMax[h].max+=mm[h].max; });
    const pr = parseProcBonus(v, weaponHand);
    ["main","off"].forEach(h => { allProcs[h].push(...pr[h]); });
    const hp = parseHealProcBonus(v, weaponHand);
    ["main","off"].forEach(h => { allHealProcs[h].push(...hp[h]); });
    const gp = parseGuardProcBonus(v, weaponHand);
    ["main","off"].forEach(h => { allGuardProcs[h].push(...gp[h]); });
    const ep = parseEnergyProcBonus(v, weaponHand);
    ["main","off"].forEach(h => { allEnergyProcs[h].push(...ep[h]); });
    const imm = parseImmunityBonus(v);
    imm.damageImmunities.forEach(t => { if(!allDamageImmunities.includes(t)) allDamageImmunities.push(t); });
    imm.conditionImmunities.forEach(c => { if(!allConditionImmunities.includes(c)) allConditionImmunities.push(c); });
    const wk = parseWeaknessBonus(v);
    Object.entries(wk).forEach(([t,pct]) => { allWeaknesses[t] = (allWeaknesses[t]||0) + pct; });
    const pt = parseProtectionBonus(v);
    Object.entries(pt).forEach(([t,pct]) => { allProtections[t] = (allProtections[t]||0) + pct; });
  });
  const allDmgTypes = new Set([...Object.keys(allWeaknesses), ...Object.keys(allProtections)]);
  const damageMultipliers = Object.fromEntries([...allDmgTypes].map(t => {
    const net = (allWeaknesses[t]||0) - (allProtections[t]||0);
    return [t, parseFloat((1 + net/100).toFixed(4))];
  }).filter(([,v]) => v !== 1));
  return { allBonuses, allPctBonuses, allDamage, allMinMax, allProcs, allHealProcs, allGuardProcs, allEnergyProcs, allDamageImmunities, allConditionImmunities, damageMultipliers };
}

function deriveStats(sheet) {
  const { baseStats, mainHand, offHand } = sheet;
  const { allBonuses, allPctBonuses, allDamage, allMinMax, allProcs, allHealProcs, allGuardProcs, allEnergyProcs, allDamageImmunities, allConditionImmunities, damageMultipliers } = computeBonuses(sheet);
  const sv = attr => {
    const base = parseInt(baseStats[attr])||0;
    const flat = allBonuses[attr]||0;
    const pct  = allPctBonuses[attr]||0;
    return base + flat + Math.round(base * pct / 100);
  };
  const str=sv("Strength"),agi=sv("Agility"),cun=sv("Cunning"),vit=sv("Vitality"),int_=sv("Intelligence"),wil=sv("Willpower"),spd=sv("Speed");
  const maxHp       = vit    + allBonuses["Health"];
  const maxGuard    = str*5  + allBonuses["Guard"];
  const maxEnergy   = wil*10 + allBonuses["Energy"];
  // Physical resistances are now in allBonuses["Blunt Resistance"] etc. and flow into resistances object below
  const attack      = Math.floor((str+agi)/2) + (allBonuses["Attack Rating"]||0);
  const defense     = Math.floor((agi+cun)/2) + (allBonuses["Defense"]||0);
  const magicAttack = Math.floor((int_+wil)/2) + (allBonuses["Magic Attack"]||0);
  const critChance  = (Math.floor((cun/1000)*100) + (allBonuses["Critical Hit Chance"]||0)) / 100;
  const critDamage  = (Math.floor(((agi/200)+1.4)*100) + (allBonuses["Critical Hit Damage"]||0)) / 100;
  const spellCritChance = (Math.floor((int_/1000)*100) + (allBonuses["Spell Critical Chance"]||0)) / 100;
  const spellCritDamage = (Math.floor(((wil/200)+1.4)*100) + (allBonuses["Spell Critical Damage"]||0)) / 100;
  const flankingDamage  = (Math.floor(((agi/200)+1)*100) + (allBonuses["Flanking Damage"]||0)) / 100;
  const meleeDmgPct  = str;
  const rangedDmgPct = agi;
  const mhType = mainHand.type||"Melee";
  const pct = mhType==="Ranged" ? rangedDmgPct : meleeDmgPct;
  const minBase = (parseInt(mainHand.minDmg)||0) + allMinMax.main.min;
  const maxBase = (parseInt(mainHand.maxDmg)||0) + allMinMax.main.max;
  const minDmg = mhType==="Shield" ? Math.round(minBase*(1+meleeDmgPct/100)) : Math.round(minBase*(1+pct/100));
  const maxDmg = mhType==="Shield" ? Math.round(maxBase*(1+meleeDmgPct/100)) : Math.round(maxBase*(1+pct/100));
  const weaponDefense = (parseInt(mainHand.defenseMod)||0) + (parseInt(offHand.defenseMod)||0);
  const totalDefense = defense + weaponDefense;
  const resistances = Object.fromEntries(
    ["Blunt","Cleaving","Piercing/Slashing","Acid","Arcane","Fire","Frost","Light","Lightning","Nature","Poison","Shadow"].map(t => [t, allBonuses[t+" Resistance"]||0])
  );
  const guardDamage = allBonuses["Guard Damage"]||0;
  const armorPen    = allBonuses["Armor Penetration"]||0;
  const statBonus   = (agi + spd) / 2 / 100;
  const mhSpeed = parseFloat(mainHand.weaponSpeed) || parseFloat(mainHand._dbItem?.weaponSpeed) || 0;
  const ohSpeed = parseFloat(offHand.weaponSpeed) || parseFloat(offHand._dbItem?.weaponSpeed) || 0;
  const weaponSpeedBase = (mhSpeed > 0 && ohSpeed > 0) ? (mhSpeed + ohSpeed) / 2 : mhSpeed;
  const unarmedSpeed = Math.max(1.00, parseFloat((2.00 - statBonus).toFixed(2)));
  const attackSpeed = weaponSpeedBase > 0 ? parseFloat((unarmedSpeed + weaponSpeedBase).toFixed(2)) : unarmedSpeed;
  const ohType = offHand.type||"Melee";
  const ohPct  = ohType==="Ranged" ? rangedDmgPct : meleeDmgPct;
  const ohMinBase = (parseInt(offHand.minDmg)||0) + allMinMax.off.min;
  const ohMaxBase = (parseInt(offHand.maxDmg)||0) + allMinMax.off.max;
  const offMinDmg = ohType==="Shield" ? Math.round(ohMinBase*(1+meleeDmgPct/100)) : Math.round(ohMinBase*(1+ohPct/100));
  const offMaxDmg = ohType==="Shield" ? Math.round(ohMaxBase*(1+meleeDmgPct/100)) : Math.round(ohMaxBase*(1+ohPct/100));
  return { maxHp, maxGuard, maxEnergy, attack, defense: totalDefense, magicAttack, critChance, critDamage, spellCritChance, spellCritDamage, flankingDamage, meleeDmgPct, rangedDmgPct, spellDmgPct: wil, minDmg, maxDmg, weapon: mainHand.name||"Unarmed", weaponPhysDmgType: mainHand.physDmgType||'Blunt', offMinDmg, offMaxDmg, offWeapon: offHand.name||"", offWeaponPhysDmgType: offHand.physDmgType||'Blunt', resistances, weaponElementalDamage: allDamage.main, offWeaponElementalDamage: allDamage.off, weaponProcs: allProcs, healProcs: allHealProcs, guardProcs: allGuardProcs, energyProcs: allEnergyProcs, damageImmunities: allDamageImmunities, sheetConditionImmunities: allConditionImmunities, damageMultipliers, guardDamage, armorPen, attackSpeed };
}

// ─── TALENT DATABASE PICKER ───────────────────────────────────────────────────
function loadDbTrees() {
  try {
    const raw = localStorage.getItem('cs_talentDatabase');
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function checkDbPrereqs(talent, skillPoints) {
  return (talent.prerequisites||[]).every(p => (skillPoints[p.id]||0) >= (p.minPoints||1));
}


// ─── CLASS PICKER MODAL ───────────────────────────────────────────────────────
function ClassPickerModal({ activeClasses, onToggle, onClose }) {
  const trees = loadDbTrees();
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:400,padding:20}}
         onClick={e=>e.target===e.currentTarget&&onClose()}>

          <span style={{color:'#c9a227',fontSize:15,fontWeight:700,letterSpacing:2}}>CHOOSE CLASS</span>

// ─── TALENT NODE TOOLTIP ──────────────────────────────────────────────────────
function TalentNodeTooltip({ talent, treeColor, skillPoints, onSkillPointsChange, availablePoints, playerLevel, allTalents, onClose }) {
  const pts = skillPoints[talent.id]||0;
  const maxPts = talent.maxPoints||1;
  const prereqsMet = checkDbPrereqs(talent, skillPoints);
  const maxed = pts >= maxPts;
  const canAdd = availablePoints > 0 && !maxed && prereqsMet;
  const typeColors = {Passive:'#9ca3af',Melee:'#f87171',Ranged:'#34d399','Spell Attack':'#a78bfa','Spell Heal':'#4ade80',Reaction:'#60a5fa',Buff:'#fb923c',Enchantment:'#c084fc',Summon:'#67e8f9','Raise Summon':'#c084fc',Resurrection:'#f9a8d4','Blood Sacrifice':'#dc2626','Talent Manipulation':'#f59e0b'};
  const dmgRange = getTalentDmgRange(talent, pts, playerLevel);
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:500,padding:16}}
         onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#12100d',border:'2px solid '+treeColor,borderRadius:14,width:'100%',maxWidth:360,overflow:'hidden',boxShadow:'0 0 32px '+treeColor+'44'}}>
        <div style={{background:'#0a0805',padding:'12px 16px',borderBottom:'1px solid '+treeColor+'44',display:'flex',alignItems:'center',gap:10}}>
          {talent.image&&<img src={talent.image} alt="" style={{width:40,height:40,objectFit:'cover',borderRadius:6,border:'1px solid '+treeColor+'66'}} onError={e=>e.target.style.display='none'}/>}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,color:'#e2e8f0',fontSize:14,marginBottom:3}}>{talent.name}</div>
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              <span style={{fontSize:10,color:typeColors[talent.type]||'#9ca3af',background:'#1a1a2e',padding:'1px 6px',borderRadius:3}}>{talent.type}</span>
              {talent.requiredLevel>1&&<span style={{fontSize:10,color:'#6b7280',background:'#111827',padding:'1px 6px',borderRadius:3}}>Lv.{talent.requiredLevel}+</span>}
            </div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#6b7280',cursor:'pointer',fontSize:18,lineHeight:1,padding:4}}>&#x2715;</button>
        </div>
        <div style={{padding:'12px 16px'}}>
          {talent.description&&<div style={{fontSize:11,color:'#9ca3af',lineHeight:1.5,marginBottom:10}}>{talent.description}</div>}
          {dmgRange&&(
            <div style={{background:'#0d0b08',border:'1px solid #2a2a1a',borderRadius:6,padding:'6px 10px',marginBottom:10}}>
              {dmgRange.scaled&&(dmgRange.min!==dmgRange.baseMin||dmgRange.max!==dmgRange.baseMax)&&
                <div style={{fontSize:9,color:'#4b5563',textDecoration:'line-through'}}>{dmgRange.baseMin}&#x2013;{dmgRange.baseMax}</div>}
              <div style={{fontSize:12,fontWeight:700,color:dmgRange.color}}>{dmgRange.min}&#x2013;{dmgRange.max} <span style={{fontSize:10,fontWeight:400,color:'#6b7280'}}>{dmgRange.label}</span></div>
              {dmgRange.scaled&&<div style={{fontSize:9,color:'#4b5563',marginTop:1}}>Lv.{playerLevel} scaled</div>}
            </div>
          )}
          {(talent.baseValue||talent.perPtBonus)&&(
            <div style={{background:'#0d0b08',border:'1px solid #2a2a1a',borderRadius:6,padding:'6px 10px',marginBottom:10,fontSize:11,color:'#c9a227'}}>
              Base: {talent.baseValue||0}{talent.perPtBonus?' +'+talent.perPtBonus+' per pt':''}
              {pts>0&&talent.perPtBonus&&<span style={{color:'#e2e8f0',marginLeft:6}}>&#x2192; Current: {(parseInt(talent.baseValue)||0)+(pts-1)*(parseInt(talent.perPtBonus)||0)}</span>}
            </div>
          )}
          {talent.cooldownSeconds>0&&<div style={{fontSize:11,color:'#60a5fa',marginBottom:10}}>&#x23F1; {talent.cooldownSeconds}s cooldown</div>}
          {(talent.prerequisites||[]).length>0&&(
            <div style={{marginBottom:10}}>
              {(talent.prerequisites).map(p=>{
                const req=allTalents.find(t=>t.id===p.id);
                const met=(skillPoints[p.id]||0)>=(p.minPoints||1);
                return <div key={p.id} style={{fontSize:10,color:met?'#4ade80':'#ef4444'}}>{met?'&#x2713;':'&#x2717;'} Requires {req&&req.name||p.id}{p.minPoints>1?' ('+p.minPoints+'+ pts)':''}</div>;
              })}
            </div>
          )}
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <div style={{flex:1,height:6,background:'#1a1510',borderRadius:3,overflow:'hidden'}}>
              <div style={{height:'100%',background:treeColor,width:((pts/maxPts)*100)+'%',transition:'width 0.2s'}}/>
            </div>
            <span style={{fontSize:11,color:pts>0?treeColor:'#6b7280',fontWeight:700,minWidth:44,textAlign:'right'}}>
              {pts}/{maxPts}{maxed&&<span style={{color:'#c9a227',marginLeft:3}}>MAX</span>}
            </span>
          </div>
          <div style={{display:'flex',gap:8}}>
            {pts>0&&(
              <button onClick={()=>{const next={...skillPoints,[talent.id]:pts-1};if(next[talent.id]<=0)delete next[talent.id];onSkillPointsChange(next);onClose();}}
                style={{flex:1,background:'#7f1d1d',border:'1px solid #991b1b',color:'#fca5a5',borderRadius:8,padding:'9px',cursor:'pointer',fontSize:13,fontFamily:'Georgia, serif'}}>
                &#x2212; Remove Point
              </button>
            )}
            <button onClick={()=>{if(!canAdd)return;onSkillPointsChange({...skillPoints,[talent.id]:pts+1});onClose();}}
              disabled={!canAdd}
              style={{flex:1,background:canAdd?'#14532d':'#1a1a1a',border:'1px solid '+(canAdd?'#166534':'#2a2a2a'),
                color:canAdd?'#86efac':'#374151',borderRadius:8,padding:'9px',cursor:canAdd?'pointer':'default',fontSize:13,fontFamily:'Georgia, serif'}}>
              {!prereqsMet?'Prereq not met':maxed?'Maxed':availablePoints<=0?'No pts left':'+ Add Point'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── TALENT TREE VIEW ─────────────────────────────────────────────────────────
function TalentTreeView({ tree, skillPoints, onSkillPointsChange, availablePoints, playerLevel, onRemoveClass }) {
  const [tooltipTalent, setTooltipTalent] = React.useState(null);
  const CELL_W = 96;
  const CELL_H = 108;
  const NODE_SIZE = 68;

  const talents = tree.talents||[];
  if(talents.length===0) return null;

  const maxRow = Math.max(...talents.map(t=>t.row||0));
  const maxCol = Math.max(...talents.map(t=>t.col||0));
  const containerW = (maxCol+1)*CELL_W;
  const containerH = (maxRow+1)*CELL_H;

  const ncx = t=>(t.col||0)*CELL_W + CELL_W/2;
  const ncy = t=>(t.row||0)*CELL_H + CELL_H/2;

  const spentInTree = talents.reduce((s,t)=>s+(skillPoints[t.id]||0),0);

  return (
    <div style={{marginBottom:32}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,paddingBottom:8,borderBottom:'1px solid '+tree.color+'33'}}>
        <div style={{width:10,height:10,borderRadius:'50%',background:tree.color,flexShrink:0}}/>
        <span style={{color:tree.color,fontSize:13,fontWeight:700,letterSpacing:2,flex:1}}>{(tree.name||'').toUpperCase()}</span>
        {spentInTree>0&&<span style={{fontSize:10,color:tree.color+'aa'}}>{spentInTree} pt{spentInTree!==1?'s':''} spent</span>}
        <button onClick={onRemoveClass} style={{background:'transparent',border:'1px solid #3a2020',color:'#7a4040',borderRadius:5,padding:'2px 8px',cursor:'pointer',fontSize:10}}>Remove</button>
      </div>
      <div style={{overflowX:'auto',paddingBottom:8}}>
        <div style={{position:'relative',width:containerW,height:containerH,margin:'0 auto'}}>
          <svg style={{position:'absolute',top:0,left:0,width:containerW,height:containerH,pointerEvents:'none',zIndex:1}}>
            {talents.flatMap(talent=>
              (talent.prerequisites||[]).map(prereq=>{
                const from=talents.find(t=>t.id===prereq.id);
                if(!from)return null;
                const prereqMet=(skillPoints[from.id]||0)>=(prereq.minPoints||1);
                return (
                  <line key={from.id+'-'+talent.id}
                    x1={ncx(from)} y1={ncy(from)} x2={ncx(talent)} y2={ncy(talent)}
                    stroke={prereqMet?tree.color+'99':'#2a2a1a'}
                    strokeWidth={prereqMet?2:1.5}
                    strokeDasharray={prereqMet?'none':'5,4'}
                  />
                );
              })
            )}
          </svg>
          {talents.map(talent=>{
            const pts=skillPoints[talent.id]||0;
            const prereqsMet=checkDbPrereqs(talent,skillPoints);
            const maxed=pts>=(talent.maxPoints||1);
            return (
              <div key={talent.id} onClick={()=>setTooltipTalent(talent)}
                title={talent.name}
                style={{
                  position:'absolute',
                  left:ncx(talent)-NODE_SIZE/2,
                  top:ncy(talent)-NODE_SIZE/2,
                  width:NODE_SIZE,height:NODE_SIZE,
                  border:'2px solid '+(pts>0?tree.color:prereqsMet?tree.color+'55':'#2a2a1a'),
                  borderRadius:8,
                  overflow:'hidden',
                  cursor:'pointer',
                  background:pts>0?'#1a1510':'#0a0805',
                  opacity:prereqsMet?1:0.45,
                  boxShadow:pts>0?'0 0 10px '+tree.color+'44':'none',
                  zIndex:2,
                }}>
                {talent.image
                  ?<img src={talent.image} alt={talent.name} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>e.target.style.display='none'}/>
                  :<div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'#3a3020',fontSize:8,textAlign:'center',padding:3,lineHeight:1.2}}>{talent.name}</div>
                }
                <div style={{position:'absolute',bottom:1,right:2,fontSize:9,color:pts>0?tree.color:'#4b5563',fontWeight:700,textShadow:'0 0 4px #000',lineHeight:1}}>
                  {pts}/{talent.maxPoints||1}
                </div>
                {maxed&&<div style={{position:'absolute',inset:0,border:'2px solid '+tree.color,borderRadius:7,boxShadow:'inset 0 0 6px '+tree.color+'66',pointerEvents:'none'}}/>}
              </div>
            );
          })}
        </div>
      </div>
      {tooltipTalent&&(
        <TalentNodeTooltip
          talent={tooltipTalent}
          treeColor={tree.color}
          skillPoints={skillPoints}
          onSkillPointsChange={onSkillPointsChange}
          availablePoints={availablePoints}
          playerLevel={playerLevel}
          allTalents={talents}
          onClose={()=>setTooltipTalent(null)}
        />
      )}
    </div>
  );
}

const TALENT_TYPE_COLORS = {
  Passive:'#9ca3af', Melee:'#f87171', Ranged:'#34d399',
  'Spell Attack':'#a78bfa', 'Spell Heal':'#4ade80', Reaction:'#60a5fa',
  Buff:'#fb923c', Enchantment:'#c084fc', Summon:'#67e8f9',
};

function HardcodedTalentTooltip({ talent, treeColor, currentPts, rect, onAdd, onRemove, availablePoints }) {
  const typeColor = TALENT_TYPE_COLORS[talent.type] || '#ccc';
  const canAdd = currentPts < talent.maxPts && availablePoints > 0;
  const canRemove = currentPts > 0;

  // Position: prefer right of node; flip left if near right edge
  const style = {
    position: 'fixed',
    zIndex: 9999,
    background: '#0d0b08',
    border: '1px solid ' + treeColor + '88',
    borderRadius: 8,
    padding: '12px 14px',
    width: 240,
    boxShadow: '0 4px 24px rgba(0,0,0,0.8)',
    fontFamily: 'Georgia, serif',
    pointerEvents: 'auto',
  };

  if (rect) {
    const left = rect.right + 12;
    const top = rect.top - 10;
    style.left = left + 240 > window.innerWidth ? rect.left - 252 : left;
    style.top = Math.min(top, window.innerHeight - 320);
  }

  return (
    <div style={style}>
      <div style={{fontSize:14,fontWeight:700,color:treeColor,marginBottom:2}}>{talent.name}</div>
      <div style={{fontSize:11,color:typeColor,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>{talent.type}</div>
      <div style={{display:'flex',gap:12,marginBottom:6,flexWrap:'wrap'}}>
        {talent.levelReq > 1 && (
          <div style={{fontSize:10,color:'#888'}}>Requires Level {talent.levelReq}</div>
        )}
        {talent.cooldown && (
          <div style={{fontSize:10,color:'#60a5fa'}}>⏱ {talent.cooldown}s cooldown</div>
        )}
      </div>
      <div style={{fontSize:12,color:'#bbb',marginBottom:10,lineHeight:1.5}}>{talent.description}</div>
      <div style={{borderTop:'1px solid #2a2010',paddingTop:8,marginBottom:10}}>
        {talent.perPt.map(p => (
          <div key={p.pts} style={{display:'flex',gap:8,alignItems:'baseline',marginBottom:3}}>
            <span style={{
              fontSize:10,fontWeight:700,color:p.pts===currentPts?treeColor:p.pts<currentPts?treeColor+'88':'#555',
              minWidth:14,textAlign:'right'
            }}>{p.pts}</span>
            <span style={{
              fontSize:11,
              color:p.pts===currentPts?'#e0e0e0':p.pts<currentPts?'#888':'#444',
            }}>{p.desc}</span>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button onClick={onRemove} disabled={!canRemove}
          style={{background:'transparent',border:'1px solid '+(canRemove?'#8b3030':'#2a1a1a'),
            color:canRemove?'#c07070':'#3a2020',borderRadius:4,padding:'3px 10px',
            cursor:canRemove?'pointer':'default',fontSize:11}}>- Remove</button>
        <button onClick={onAdd} disabled={!canAdd}
          style={{background:canAdd?'#14532d':'transparent',
            border:'1px solid '+(canAdd?'#166534':'#1a2a1a'),
            color:canAdd?'#86efac':'#2a4a2a',borderRadius:4,padding:'3px 10px',
            cursor:canAdd?'pointer':'default',fontSize:11}}>+ Add</button>
      </div>
    </div>
  );
}

function HardcodedTreeView({ playerId, skillPoints, onSkillPointsChange, availablePoints, playerLevel }) {
  const [hovered, setHovered] = React.useState(null); // {talent, rect} — click to open, click outside to close
  const treeData = PLAYER_TALENT_TREES[playerId];
  if (!treeData || treeData.talents.length === 0) return (
    <div style={{textAlign:'center',padding:'40px 0',color:'#444',fontSize:13,fontStyle:'italic'}}>
      No talents defined yet.
    </div>
  );

  const { color, talents } = treeData;
  const CELL_W = 110;
  const CELL_H = 130;
  const NODE_SIZE = 72;
  const NAME_H = 18;

  const maxRow = Math.max(...talents.map(t => t.row || 0));
  const maxCol = Math.max(...talents.map(t => t.col || 0));
  const containerW = (maxCol + 1) * CELL_W;
  const containerH = (maxRow + 1) * CELL_H;

  const ncx = t => (t.col || 0) * CELL_W + CELL_W / 2;
  const ncy = t => (t.row || 0) * CELL_H + CELL_H / 2 + NAME_H / 2;

  const checkPrereqs = (talent) => {
    if (!talent.prerequisites || talent.prerequisites.length === 0) return true;
    return talent.prerequisites.every(p => (skillPoints[p.id] || 0) >= (p.minPoints || 1));
  };

  // Build row -> min level req map
  const rowLevelReqs = {};
  talents.forEach(t => {
    const r = t.row || 0;
    const lvl = t.levelReq || 1;
    if (rowLevelReqs[r] === undefined || lvl > rowLevelReqs[r]) rowLevelReqs[r] = lvl;
  });
  const LABEL_W = 60;

  return (
    <div style={{overflowX:'auto',paddingBottom:8}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'center'}}>
        {/* Row level labels */}
        <div style={{flexShrink:0,width:LABEL_W,position:'relative',height:containerH}}>
          {Object.entries(rowLevelReqs).map(([row, lvl]) => (
            <div key={row} style={{
              position:'absolute',
              top: parseInt(row) * CELL_H + CELL_H / 2 - 8,
              right: 8,
              fontSize: 10,
              color: '#c9a22799',
              textAlign: 'right',
              lineHeight: 1.3,
              whiteSpace: 'nowrap',
            }}>
              <div style={{fontSize:9,color:'#666',textTransform:'uppercase',letterSpacing:0.5}}>Lvl</div>
              <div style={{color:'#c9a227',fontWeight:700,fontSize:12}}>{lvl}</div>
            </div>
          ))}
        </div>
        <div style={{position:'relative',width:containerW,height:containerH}}>
        {/* SVG connection lines */}
        <svg style={{position:'absolute',top:0,left:0,width:containerW,height:containerH,pointerEvents:'none',zIndex:1}}>
          {talents.flatMap(talent =>
            (talent.prerequisites || []).map(prereq => {
              const from = talents.find(t => t.id === prereq.id);
              if (!from) return null;
              const met = (skillPoints[from.id] || 0) >= (prereq.minPoints || 1);
              return (
                <line key={from.id + '-' + talent.id}
                  x1={ncx(from)} y1={ncy(from)} x2={ncx(talent)} y2={ncy(talent)}
                  stroke={met ? color + '99' : '#2a2a1a'}
                  strokeWidth={met ? 2 : 1.5}
                  strokeDasharray={met ? 'none' : '5,4'}
                />
              );
            })
          )}
        </svg>

        {/* Talent nodes */}
        {talents.map(talent => {
          const pts = skillPoints[talent.id] || 0;
          const prereqsMet = checkPrereqs(talent);
          const levelOk = playerLevel >= (talent.levelReq || 1);
          const unlocked = prereqsMet && levelOk;
          const maxed = pts >= talent.maxPts;
          const cx = ncx(talent);
          const cy = ncy(talent);

          return (
            <div key={talent.id} style={{
              position: 'absolute',
              left: cx - CELL_W / 2,
              top: (talent.row || 0) * CELL_H,
              width: CELL_W,
              height: CELL_H,
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              justifyContent: 'flex-start',
              paddingTop: 4,
              zIndex: 2,
            }}>
              {/* Name above */}
              <div style={{
                fontSize: 10,
                color: pts > 0 ? color : unlocked ? '#888' : '#444',
                textAlign: 'center',
                lineHeight: 1.2,
                height: NAME_H,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                width: '100%',
                paddingHorizontal: 2,
                overflow: 'hidden',
                marginBottom: 4,
                letterSpacing: 0.3,
              }}>{talent.name}</div>

              {/* Image square */}
              <div
                onClick={e => {
                  e.stopPropagation();
                  const rect = e.currentTarget.getBoundingClientRect();
                  setHovered(prev => prev?.talent?.id === talent.id ? null : { talent, rect });
                }}
                style={{
                  width: NODE_SIZE,
                  height: NODE_SIZE,
                  border: '2px solid ' + (pts > 0 ? color : unlocked ? color + '55' : '#2a2a1a'),
                  borderRadius: 6,
                  overflow: 'hidden',
                  cursor: 'pointer',
                  background: pts > 0 ? '#1a1510' : '#0a0805',
                  opacity: unlocked ? 1 : 0.4,
                  boxShadow: maxed ? '0 0 12px ' + color + '66' : pts > 0 ? '0 0 6px ' + color + '33' : 'none',
                  flexShrink: 0,
                  position: 'relative',
                }}>
                {talent.image
                  ? <img src={talent.image} alt={talent.name}
                      style={{width:'100%',height:'100%',objectFit:'cover'}}
                      onError={e=>e.target.style.display='none'}/>
                  : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',
                      justifyContent:'center',color:'#3a3020',fontSize:9,textAlign:'center',padding:3}}>{talent.name}</div>
                }
                {maxed && <div style={{position:'absolute',inset:0,border:'2px solid '+color,borderRadius:5,
                  boxShadow:'inset 0 0 8px '+color+'66',pointerEvents:'none'}}/>}
              </div>

              {/* Pts below */}
              <div style={{
                fontSize: 11,
                color: pts > 0 ? color : '#444',
                fontFamily: 'monospace',
                marginTop: 5,
                fontWeight: 700,
              }}>{pts}/{talent.maxPts}</div>
            </div>
          );
        })}
        </div>
      </div>

      {/* Click-to-open tooltip — click outside to close */}
      {hovered && (
        <div style={{position:'fixed',inset:0,zIndex:9998}} onClick={()=>setHovered(null)}/>
      )}
      {hovered && (
        <HardcodedTalentTooltip
          talent={hovered.talent}
          treeColor={color}
          currentPts={skillPoints[hovered.talent.id] || 0}
          rect={hovered.rect}
          availablePoints={availablePoints}
          onAdd={() => {
            const pts = skillPoints[hovered.talent.id] || 0;
            if (pts < hovered.talent.maxPts && availablePoints > 0) {
              onSkillPointsChange({...skillPoints, [hovered.talent.id]: pts + 1});
            }
          }}
          onRemove={() => {
            const pts = skillPoints[hovered.talent.id] || 0;
            if (pts > 0) {
              const next = {...skillPoints, [hovered.talent.id]: pts - 1};
              if (next[hovered.talent.id] === 0) delete next[hovered.talent.id];
              onSkillPointsChange(next);
            }
          }}
        />
      )}
    </div>
  );
}

const SLOT_SIZE = 100;

function EquipSlot({ slotKey, label, data, icon, onClick, onUnequip, unequipMsg, blocked }) {
  const [popup, setPopup] = React.useState(false);
  const hasImage = data && data.image;
  const itemName = data ? (data.name || "") : "";
  const hasItem = hasImage || itemName;
  const isDBItem = data && data.id;
  const rc = isDBItem ? (RARITY_COLORS_INV[data._dbItem && data._dbItem.rarity] || '#4a4a7a') : (hasItem ? '#4a4a7a' : '#2a2a4a');
  const dbItem = isDBItem ? (data._dbItem || data) : null;

  function handleClick() {
    if (blocked) return;
    if (isDBItem) setPopup(true);
    else onClick();
  }

  return (
    <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:5}}>
      <div style={{position:'relative', width:SLOT_SIZE, height:SLOT_SIZE}}>
        <div onClick={handleClick} style={{
          width:'100%', height:'100%',
          background: blocked ? '#1a0a0a' : (hasImage ? 'transparent' : '#0a0a18'),
          border: '2px solid '+(blocked ? '#7f1d1d' : rc),

        }}>

}

function EquipmentGrid({ sheet, onUpdate, allDamage, allMinMax, sv, onUnequip, unequipMsgs }) {
  const [openSlot, setOpenSlot] = useState(null);
  const { mainHand, offHand, head, body, hands, feet, back, belt, amulet, leftRing, rightRing } = sheet;
  const set = (field, value) => onUpdate({[field]: value});

  const attrModFor = t => t==="Ranged" ? sv("Agility") : sv("Strength");

  const SLOTS = {
    back:      { label:'Back',      data:back,      icon:'🪽', isArmor:true },
    head:      { label:'Head',      data:head,      icon:'⛑',  isArmor:false },
    amulet:    { label:'Amulet',    data:amulet,    icon:'📿', isArmor:false },
    mainHand:  { label:'Main Hand', data:mainHand,  icon:'⚔',  isWeapon:true },
    body:      { label:'Body',      data:body,      icon:'🦺', isArmor:true },
    offHand:   { label:'Off Hand',  data:offHand,   icon:'🛡',  isWeapon:true },
    hands:     { label:'Hands',     data:hands,     icon:'🧤', isArmor:false },
    belt:      { label:'Waist',     data:belt,      icon:'🔗', isBelt:true },
    feet:      { label:'Feet',      data:feet,      icon:'👢', isArmor:false },
    leftRing:  { label:'Left Ring', data:leftRing,  icon:'💍', isArmor:false },
    rightRing: { label:'Right Ring',data:rightRing, icon:'💍', isArmor:false },
  };

  const rows = [
    ['back','head','amulet'],
    ['mainHand','body','offHand'],
    ['hands','belt','feet'],
    ['leftRing','rightRing'],
  ];

  const gap = 16;

  const openData = openSlot ? SLOTS[openSlot] : null;

  const twoHandedBlock = !!(sheet.mainHand && sheet.mainHand.twoHanded);

  return (
    <div>
      <div style={{display:'flex',flexDirection:'column',gap:gap,alignItems:'center'}}>
        {rows.map((row,ri) => (
          <div key={ri} style={{display:'flex',gap:gap,justifyContent:'center'}}>
            {row.map(key => {
              const slot = SLOTS[key];
              return (
                <EquipSlot
                  key={key}
                  slotKey={key}
                  label={slot.label}
                  data={slot.data}
                  icon={slot.icon}
                  onClick={() => setOpenSlot(key)}
                  onUnequip={onUnequip}
                  unequipMsg={unequipMsgs && unequipMsgs[key]}
                  blocked={key === 'offHand' && twoHandedBlock}
                />
              );
            })}
          </div>
        ))}
      </div>

      {openSlot && openData && (
        <EquipSlotModal
          slotKey={openSlot}
          label={openData.label}
          data={openData.data}
          onChange={v => set(openSlot, v)}
          isWeapon={!!openData.isWeapon}
          isArmor={!!openData.isArmor}
          isBelt={!!openData.isBelt}
          attrMod={openData.isWeapon ? attrModFor(openData.data.type) : 0}
          extraDamage={openSlot==='mainHand' ? allDamage.main : openSlot==='offHand' ? allDamage.off : {}}
          minMaxBonus={openSlot==='mainHand' ? allMinMax.main : openSlot==='offHand' ? allMinMax.off : {min:0,max:0}}
          onClose={() => setOpenSlot(null)}
        />
      )}
    </div>
  );
}

function getTargetSlotKey(item, sheet) {
  // Weapons/Charms are handled directly in handleEquip (handedness logic)
  if (item.category === 'Weapons') return '__weapon__';
  if (item.category === 'Charms') return 'offHand';
  if (item.category === 'Armor' || item.category === 'Clothing') {
    if (item.slot === 'Body')             return 'body';
    if (item.slot === 'Head')             return 'head';
    if (item.slot === 'Hands')            return 'hands';
    if (item.slot === 'Feet')             return 'feet';
    if (item.slot === 'Waist')            return 'belt';
    if (item.slot === 'Back / Shoulders') return 'back';
  }
  if (item.category === 'Jewelry') {
    if (item.subcategory === 'Amulets')  return 'amulet';
    if (item.subcategory === 'Circlets') return 'head';
    if (item.subcategory === 'Rings') {
      // Pick first empty ring slot
      const lr = sheet.leftRing;
      if (!lr || (!lr.id && !lr.name && !lr.type)) return 'leftRing';
      return 'rightRing';
    }
  }
  return null;
}

function slotIsOccupied(slotKey, data) {
  if (!data) return false;
  if (data.id) return true;
  if (slotKey === 'mainHand' || slotKey === 'offHand') return !!(data.name);
  return !!(data.type || data.name);
}

function dbItemToSlotData(item, slotKey) {
  const base = { id: item.id, _dbItem: item, traits: item.traits||'', image: item.image||'' };
  if (slotKey === 'mainHand' || slotKey === 'offHand') {
    const isTwoH = (item.handedness === 'Two-Handed');
    return { ...base, type: item.weaponType||'Melee', name: item.name,
      physDmgType: item.physDmgType||'Blunt',
      subcategory: item.subcategory||'',
      minDmg: item.minDmg||'', maxDmg: item.maxDmg||'', defenseMod: item.defenseMod||'',
      weaponSpeed: parseFloat(item.weaponSpeed)||2.00,
      twoHanded: isTwoH, hitSound: item.hitSound||'', missSound: item.missSound||'' };
  }
  if (['head','body','hands','feet','back'].includes(slotKey)) {
    return { ...base, type: item.name, bluntRes: item.bluntRes||'', cleavingRes: item.cleavingRes||'', piercingSlashingRes: item.piercingSlashingRes||'' };
  }
  if (slotKey === 'belt') {
    return { ...base, name: item.name, quickSlots: '' };
  }
  return { ...base, name: item.name };
}

function EquippedSummary({ sheet, stats, allDamage, allDamageImmunities, allConditionImmunities, talentWeaponElem, talentDmgMults }) {
  const ARMOR_SLOTS = ['head','body','hands','feet','back','belt','amulet','leftRing','rightRing'];
  const mh = sheet.mainHand;
  const oh = sheet.offHand;
  const hasMH = mh && (mh.name || mh.type);
  const hasOH = oh && (oh.name || oh.type);

  // Collect all armor traits from all armor/accessory slots
  const allArmorTraits = ARMOR_SLOTS
    .map(k => sheet[k] && sheet[k].traits)
    .filter(Boolean)
    .join(', ');

  // Total armor from stats (already computed)
  // Physical resistances now live in stats.resistances

  if (!hasMH && !hasOH && !allArmorTraits) return null;

  const dmgLine = (min, max, elemental, physType) => {
    const parts = [min+' - '+max+' '+(physType||'Blunt')];
    if (elemental) {
      Object.keys(elemental).forEach(t => {
        if (elemental[t]) parts.push(elemental[t]+' '+t);
      });
    }
    return parts.join(', ');
  };

  const sectionTitle = {fontSize:10,color:'#c9a227',letterSpacing:2,fontWeight:700,marginBottom:8};
  const traitText = {fontSize:11,color:'#a78bfa',lineHeight:1.6,marginTop:4};
  const dmgText   = {fontSize:13,color:'#fbbf24',fontWeight:700};
  const armorText = {fontSize:13,color:'#93c5fd',fontWeight:700};
  const nameText  = {fontSize:11,color:'#9ca3af',marginBottom:2};

  return (
    <div style={secStyle}>
      <h2 style={secTitle}>EQUIPPED GEAR SUMMARY</h2>

      {(hasMH || hasOH) && (
        <div style={{marginBottom:hasMH&&hasOH?16:0}}>
          <div style={sectionTitle}>WEAPONS</div>
          {hasMH && (
            <div style={{marginBottom:hasOH?12:0}}>
              <div style={nameText}>Main Hand — {mh.name||mh.type}</div>
              <div style={dmgText}>{dmgLine(stats.minDmg, stats.maxDmg, allDamage && allDamage.main, mh?.physDmgType||'Blunt')}</div>
              {mh.traits && <div style={traitText}>{mh.traits}</div>}
            </div>
          )}
          {hasOH && (
            <div>
              <div style={nameText}>Off Hand — {oh.name||oh.type}</div>
              <div style={dmgText}>{dmgLine(stats.offMinDmg, stats.offMaxDmg, allDamage && allDamage.off, oh?.physDmgType||'Blunt')}</div>
              {oh.traits && <div style={traitText}>{oh.traits}</div>}
            </div>
          )}
          <div style={{marginTop:8,fontSize:12,color:'#34d399'}}>⚡ Attack Speed: <strong>{(stats.attackSpeed||2.00).toFixed(2)}s</strong></div>
        </div>
      )}

      {(() => {
        const ALL_RESIST_KEYS = ['Blunt','Cleaving','Piercing/Slashing','Acid','Arcane','Fire','Frost','Light','Lightning','Nature','Poison','Shadow'];
        const RESIST_COLORS = {Blunt:'#d4b483',Cleaving:'#e87040','Piercing/Slashing':'#c0c0c0',Acid:'#aaff00',Arcane:'#bb44ff',Fire:'#ff7700',Frost:'#44aaff',Light:'#ffee44',Lightning:'#ffff55',Nature:'#44dd44',Poison:'#88cc00',Shadow:'#cc44ff'};
        // Sum resistances from armor slots + allBonuses (which includes trait bonuses)
        const totals = {};
        ALL_RESIST_KEYS.forEach(k => {
          const v = stats ? (stats.resistances||{})[k] : 0;
          if(v) totals[k] = v;
        });
        const hasResists = Object.keys(totals).length > 0;
        if(!hasResists && !allArmorTraits) return null;
        return (
          <div style={{borderTop:(hasMH||hasOH)?'1px solid #1a1a2e':'none',paddingTop:(hasMH||hasOH)?16:0}}>

            {/* Talent weapon elemental damage bonuses */}
            {Object.keys(talentWeaponElem).length>0 && (

                    : <span key={type} style={{fontSize:10,color:'#4ade80',background:'#052e16',borderRadius:3,padding:'1px 6px'}}>🛡 {type} ×{mult.toFixed(2)}</span>
                ))}

            )}
          </div>
        );
      })()}
    </div>
  );
}


function getMaxStack(item){
  if(!item||!item.category) return 1;
  const cat=item.category, sub=item.subcategory||'';
  if(cat==='Alchemy') return sub==='Potions'?5:sub==='Herbs'?10:1;
  if(cat==='Blacksmithing') return 10;
  if(cat==='Gems') return 5;
  if(cat==='Scrolls') return 5;
  if(cat==='Food') return 10;
  if(cat==='Junk') return 10;
  return 1;
}
function TradeModal({item, fromPlayerId, onClose}) {
  const [msg, setMsg] = React.useState('');
  const [msgColor, setMsgColor] = React.useState('#f87171');
  const [done, setDone] = React.useState(false);
  const [qty, setQty] = React.useState(1);
  const stackSize = item.qty || 1;
  const isStack = stackSize > 1;
  const others = PLAYER_DEFS.filter(p => p.id !== fromPlayerId);
  const rc = RARITY_COLORS_INV[item.rarity] || '#9ca3af';

  function tradeTo(toPlayer) {
    const amount = isStack ? qty : 1;
    const max = getMaxStack(item);
    // Add `amount` to recipient
    try {
      const raw = localStorage.getItem('cs_inventory_' + toPlayer.id);
      let inv = raw ? JSON.parse(raw) : Array(20).fill(null);
      let remaining = amount;
      while (remaining > 0) {
        const stackIdx = max > 1 ? inv.findIndex(s => s && s.id === item.id && (s.qty||1) < max) : -1;
        if (stackIdx !== -1) {
          const space = max - (inv[stackIdx].qty||1);
          const add = Math.min(remaining, space);
          inv[stackIdx] = {...inv[stackIdx], qty: (inv[stackIdx].qty||1) + add};
          remaining -= add;
        } else {
          const freeIdx = inv.findIndex(s => !s || (!s.id && !s.name));
          if (freeIdx === -1) { setMsgColor('#f87171'); setMsg(toPlayer.name + "'s inventory is full."); return; }
          const add = Math.min(remaining, max);
          inv[freeIdx] = max > 1 ? {...item, qty: add} : {...item};
          remaining -= add;
        }
      }
      localStorage.setItem('cs_inventory_' + toPlayer.id, JSON.stringify(inv));
      window.dispatchEvent(new StorageEvent('storage', {key: 'cs_inventory_' + toPlayer.id}));
      if (window._fbDb) window._fbDb.ref('/inventory/'+toPlayer.id).set(inv).catch(()=>{});
    } catch { setMsgColor('#f87171'); setMsg('Failed to add to ' + toPlayer.name + "'s inventory."); return; }

    // Remove `amount` from sender
    try {
      const raw = localStorage.getItem('cs_inventory_' + fromPlayerId);
      if (raw) {
        let inv = JSON.parse(raw);
        const idx = inv.findIndex(s => s && s.id === item.id);
        if (idx !== -1) {
          const newQty = (inv[idx].qty||1) - amount;
          inv[idx] = newQty > 0 ? {...inv[idx], qty: newQty} : {name:'', weight:''};
          localStorage.setItem('cs_inventory_' + fromPlayerId, JSON.stringify(inv));
          window.dispatchEvent(new StorageEvent('storage', {key: 'cs_inventory_' + fromPlayerId}));
          if (window._fbDb) window._fbDb.ref('/inventory/'+fromPlayerId).set(inv).catch(()=>{});
        }
      }
    } catch {}

    setDone(true);
    setMsgColor('#22c55e');
    setMsg(item.name + (amount > 1 ? ' x'+amount : '') + ' sent to ' + toPlayer.name + '.');
  }

  return (
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}}
      style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',display:'flex',alignItems:'center',
        justifyContent:'center',zIndex:700,padding:16}}>
      <div style={{background:'#16213e',borderRadius:12,border:'1px solid #2a2a4a',width:'100%',maxWidth:340,overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid #2a2a4a',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'#c9a227',fontSize:13,letterSpacing:2,fontWeight:700}}>GIVE ITEM</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#6b7280',cursor:'pointer',fontSize:18,lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:'16px 20px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,padding:'10px 12px',background:'#0f172a',borderRadius:8,border:'1px solid #2a2a4a'}}>
            <div style={{width:36,height:36,flexShrink:0,background:'#0d1117',border:'1px solid '+rc+'44',borderRadius:5,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {item.image ? <img src={item.image} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>e.target.style.display='none'}/> : <span style={{fontSize:16,opacity:0.3}}>?</span>}
            </div>
            <div>
              <div style={{fontSize:13,color:rc,fontWeight:700}}>{item.name}{isStack?' (x'+stackSize+')':''}</div>
              <div style={{fontSize:10,color:'#6b7280',fontStyle:'italic',marginTop:2,lineHeight:1.3}}>{item.description}</div>
            </div>
          </div>
          {isStack && !done && (
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:'#6b7280',marginBottom:8,letterSpacing:1}}>QUANTITY</div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <button onClick={()=>setQty(q=>Math.max(1,q-1))} style={{width:32,height:32,background:'#374151',color:'#f9fafb',border:'none',borderRadius:6,cursor:'pointer',fontSize:16,fontWeight:700}}>−</button>
                <div style={{flex:1,textAlign:'center',fontSize:18,color:'#f9fafb',fontWeight:700}}>{qty}</div>
                <button onClick={()=>setQty(q=>Math.min(stackSize,q+1))} style={{width:32,height:32,background:'#374151',color:'#f9fafb',border:'none',borderRadius:6,cursor:'pointer',fontSize:16,fontWeight:700}}>+</button>
                <button onClick={()=>setQty(stackSize)} style={{padding:'0 10px',height:32,background:'#1f2937',color:'#6b7280',border:'1px solid #374151',borderRadius:6,cursor:'pointer',fontSize:11}}>All</button>
              </div>
            </div>
          )}
          {!done && (
            <div>
              <div style={{fontSize:11,color:'#6b7280',marginBottom:10,letterSpacing:1}}>GIVE TO</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {others.map(p => (
                  <button key={p.id} onClick={()=>tradeTo(p)} style={{
                    background:'#1e3a5f',border:'1px solid #3b82f6',color:p.color,
                    borderRadius:7,padding:'10px 16px',cursor:'pointer',
                    display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13,fontWeight:600
                  }}>
                    <span>{p.name}</span>
                    <span style={{fontSize:11,color:'#6b7280'}}>{'Give '+qty+' →'}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
          {msg && (
            <div style={{marginTop:14,padding:'10px 12px',background:msgColor+'15',border:'1px solid '+msgColor+'44',borderRadius:7,fontSize:12,color:msgColor,lineHeight:1.5}}>
              {msg}
            </div>
          )}
          {done && <button onClick={onClose} style={{marginTop:14,width:'100%',background:'#14532d',color:'#86efac',border:'1px solid #166534',borderRadius:7,padding:'9px',cursor:'pointer',fontSize:13,fontWeight:600}}>Done</button>}
        </div>
      </div>
    </div>
  );
}
