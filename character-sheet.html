function CharacterSheetView({ playerId, sheet, onUpdate, skillPoints, onSkillPointsChange, bonusPoints, onBonusPointsChange, activeClasses, onActiveClassesChange }) {
  const [sheetTab, setSheetTab] = useState('character');
  const set = (field, value) => onUpdate({[field]: value});
  const {bio, baseStats, current, mainHand, offHand, head, body, hands, feet, back, belt, amulet, leftRing, rightRing, baseSkills, inventory, traitsText} = sheet;
  const {allBonuses, allPctBonuses, allDamage, allMinMax, allDamageImmunities, allConditionImmunities} = computeBonuses(sheet);

  // Apply skill tree bonuses — supports both hardcoded IDs and specialMechanic field from talent database
  if (skillPoints) {
    // Load talent trees from database to check specialMechanic
    let dbTalentMap = {};
    try {
      const dbRaw = localStorage.getItem('cs_talentDatabase');
      if(dbRaw) {
        const trees = JSON.parse(dbRaw);
        trees.forEach(tree => (tree.talents||[]).forEach(t => { dbTalentMap[t.id] = t; }));
      }
    } catch{}

    // Fortitude — hardcoded ID or specialMechanic
    const fortPts = skillPoints['fortitude']||0;
    allBonuses["Health"] = (allBonuses["Health"]||0) + (fortPts*10);
    // Also check db talents with Fortitude mechanic
    Object.entries(skillPoints).forEach(([id, pts]) => {
      if(pts <= 0) return;
      const dbT = dbTalentMap[id];
      if(dbT && dbT.specialMechanic && dbT.specialMechanic.includes('Fortitude')) {
        allBonuses["Health"] = (allBonuses["Health"]||0) + (pts*10);
      }
      if(dbT && dbT.specialMechanic && dbT.specialMechanic.includes('Iron Skin')) {
        ["Blunt Resistance","Cleaving Resistance","Piercing/Slashing Resistance"].forEach(k=>{
          const base = allBonuses[k]||0;
          allBonuses[k] = Math.round(base*(1+(pts*0.10)));
        });
      }
    });

    // Iron Skin — hardcoded ID
    if ((skillPoints["iron_skin"]||0) > 0) {
      ["Blunt Resistance","Cleaving Resistance","Piercing/Slashing Resistance"].forEach(k=>{
        const base = allBonuses[k]||0;
        allBonuses[k] = Math.round(base*(1+(skillPoints["iron_skin"]*0.10)));
      });
    }
  }

  // Talent database: stat bonuses, immunities, weaknesses, elemental damage
  const talentImmuneConds = [];
  const talentImmuneDmg   = [];
  const talentDmgMults    = {};
  const talentWeaponElem  = {};
  if (skillPoints) {
    loadDbTrees().forEach(tree => {
      (tree.talents||[]).forEach(talent => {
        const pts = (skillPoints[talent.id]||0);
        if (pts <= 0) return;
        (talent.statBonuses||[]).forEach(b => {
          if (!b.amount || !b.stat) return;
          const pct = parseFloat(b.amount) * (b.sign==='-' ? -1 : 1);
          allPctBonuses[b.stat] = (allPctBonuses[b.stat]||0) + pct;
        });
        (talent.dmgMods||talent.weaponDamageBonuses||[]).forEach(b => {
          const dmgT = b.dmgType||b.damageType;
          if (!dmgT || !b.amount) return;
          talentWeaponElem[dmgT] = (talentWeaponElem[dmgT]||0) + (parseInt(b.amount)||0);
        });
        (talent.immunities||[]).forEach(im => {
          if (im.type==='Condition' && im.value && !talentImmuneConds.includes(im.value)) talentImmuneConds.push(im.value);
          if (im.type==='Damage Type' && im.value && !talentImmuneDmg.includes(im.value)) talentImmuneDmg.push(im.value);
        });
        (talent.weaknessProtections||talent.weaknessProtection||[]).forEach(wp => {
          const dmgT = wp.dmgType||wp.damageType;
          const pctV = wp.pct||wp.percent;
          if (!dmgT || !pctV) return;
          const mult = wp.type==='Weakness' ? 1+parseFloat(pctV)/100 : 1-parseFloat(pctV)/100;
          talentDmgMults[dmgT] = parseFloat(((talentDmgMults[dmgT]||1)*mult).toFixed(4));
        });
      });
    });
    talentImmuneConds.forEach(c => { if(!allConditionImmunities.includes(c)) allConditionImmunities.push(c); });
    talentImmuneDmg.forEach(t => { if(!allDamageImmunities.includes(t)) allDamageImmunities.push(t); });
  }

  const sv = attr => {
    const base = parseInt(baseStats[attr])||0;
    const flat = allBonuses[attr]||0;
    const pct  = allPctBonuses[attr]||0;
    return base + flat + Math.round(base * pct / 100);
  };
  const derivedMax = {
    Guard:  sv("Strength")*5   + allBonuses["Guard"],
    Health: sv("Vitality")     + allBonuses["Health"],
    Energy: sv("Willpower")*10 + allBonuses["Energy"],
  };
  const combatBase = {
    "Attack Rating":      Math.floor((sv("Strength")+sv("Agility"))/2),
    "Defense":            Math.floor((sv("Agility")+sv("Cunning"))/2),
    "Magic Attack":       Math.floor((sv("Intelligence")+sv("Willpower"))/2),
    "Critical Hit Chance":  Math.floor((sv("Cunning")/1000)*100),
    "Critical Hit Damage":  Math.floor(((sv("Agility")/200)+1.4)*100),
    "Spell Critical Chance":Math.floor((sv("Intelligence")/1000)*100),
    "Spell Critical Damage":Math.floor(((sv("Willpower")/200)+1.4)*100),
    "Flanking Damage":    Math.floor(((sv("Agility")/200)+1)*100),
    "Guard Damage":       0,
    "Armor Penetration":  0,
  };
  const attrModFor = t => t==="Ranged" ? sv("Agility") : sv("Strength");
  const totalWeight = inventory.reduce((s,i) => s+(parseFloat(i ? i.weight : 0)||0)*(i ? (i.qty||1) : 1), 0);
  const si = {...iBase, width:"100%", padding:"7px 8px", fontSize:14, boxSizing:"border-box"};
  function setInvItem(i, field, val) { const next=inventory.slice(); next[i]={...next[i]||{},[field]:val}; set("inventory",next); }
  function clearInvSlot(i, amount) {
    const next=inventory.slice();
    const item=next[i];
    const n = amount || 1;
    const newQty = (item && item.qty ? item.qty : 1) - n;
    if(newQty > 0) {
      next[i]={...item, qty: newQty};
    } else {
      next[i]={name:"",weight:""};
    }
    set("inventory",next);
  }

  const [equipMsgs,   setEquipMsgs]   = React.useState({});
  const [unequipMsgs, setUnequipMsgs] = React.useState({});

  function flashMsg(setFn, key, msg) {
    setFn(prev => ({...prev, [key]: msg}));
    setTimeout(() => setFn(prev => ({...prev, [key]: null})), 2500);
  }

  const [handPicker, setHandPicker] = React.useState(null); // {invIdx, item}

  function checkAttrReq(item) {
    if (item.strReq && parseInt(item.strReq) > 0 && sv("Strength") < parseInt(item.strReq))
      return "Requires STR " + item.strReq + " (you have " + sv("Strength") + ")";
    if (item.agiReq && parseInt(item.agiReq) > 0 && sv("Agility") < parseInt(item.agiReq))
      return "Requires AGI " + item.agiReq + " (you have " + sv("Agility") + ")";
    if (item.wilReq && parseInt(item.wilReq) > 0 && sv("Willpower") < parseInt(item.wilReq))
      return "Requires WIL " + item.wilReq + " (you have " + sv("Willpower") + ")";
    return null;
  }

  const [equipError, setEquipError] = React.useState(null);
  function doEquipToSlot(invIdx, slotKey, itemOverride) {
    try {
    const item = itemOverride || inventory[invIdx];
    // Block offHand if a two-handed weapon is in mainHand
    if (slotKey === 'offHand' && sheet.mainHand && sheet.mainHand.twoHanded) {
      flashMsg(setEquipMsgs, invIdx, 'Main hand weapon is two-handed.'); return;
    }
    // Block mainHand (two-handed) if offHand is occupied
    if (slotKey === 'mainHand' && item.handedness === 'Two-Handed' && slotIsOccupied('offHand', sheet.offHand)) {
      flashMsg(setEquipMsgs, invIdx, 'Off hand must be empty for two-handed weapons.'); return;
    }
    if (slotIsOccupied(slotKey, sheet[slotKey])) {
      flashMsg(setEquipMsgs, invIdx, 'Slot is already occupied.'); return;
    }
    const slotData = dbItemToSlotData(item, slotKey);
    const nextInv = inventory.slice();
    nextInv[invIdx] = {name:"", weight:""};
    set("inventory", nextInv);
    set(slotKey, slotData);
    } catch(e) { setEquipError(e.message || String(e)); }
  }

  function handleEquip(invIdx) {
    let item = inventory[invIdx];
    if (!item || !item.id) return;

    // Merge with live database to pick up any fields added after item was stored
    if (item.id) {
      try {
        const all = localStorage.getItem('cs_itemDatabase_all');
        if (all) {
          const parsed = JSON.parse(all);
          const allItems = Array.isArray(parsed) ? parsed : (parsed.items || []);
          const liveItem = allItems.find(function(i){ return i.id === item.id; });
          if (liveItem) item = Object.assign({}, item, liveItem);
        }
      } catch(e) {}
    }

    const attrErr = checkAttrReq(item);
    if (attrErr) { flashMsg(setEquipMsgs, invIdx, attrErr); return; }
    const slotKey = getTargetSlotKey(item, sheet);
    if (!slotKey) { flashMsg(setEquipMsgs, invIdx, 'No matching equipment slot.'); return; }
    // Weapons: route by handedness
    if (slotKey === '__weapon__') {
      const h = item.handedness || 'Either';
      if (h === 'Main Hand' || h === 'Two-Handed') {
        doEquipToSlot(invIdx, 'mainHand', item);
      } else if (h === 'Off Hand') {
        doEquipToSlot(invIdx, 'offHand', item);
      } else {
        // Either — show hand picker
        setHandPicker({invIdx, item});
      }
      return;
    }
    // Everything else (armor, jewelry, charms)
    if (slotIsOccupied(slotKey, sheet[slotKey])) {
      flashMsg(setEquipMsgs, invIdx, 'Slot is already occupied.'); return;
    }
    const slotData = dbItemToSlotData(item, slotKey);
    const nextInv = inventory.slice();
    nextInv[invIdx] = {name:"", weight:""};
    set("inventory", nextInv);
    set(slotKey, slotData);
  }

  function handleUnequip(slotKey) {
    const data = sheet[slotKey];
    if (!data || !data.id) return;
    const freeIdx = inventory.findIndex(s => !s || (!s.id && !s.name));
    if (freeIdx === -1) { flashMsg(setUnequipMsgs, slotKey, 'Inventory is full.'); return; }
    // Get original DB item
    const dbItem = data._dbItem || data;
    const nextInv = inventory.slice();
    nextInv[freeIdx] = dbItem;
    set("inventory", nextInv);
    // Clear the slot to its default
    const isWeapon = slotKey === 'mainHand' || slotKey === 'offHand';
    const isArmor  = ['head','body','hands','feet','back','belt'].includes(slotKey);
    const isBelt   = slotKey === 'belt';
    set(slotKey, isWeapon ? {...defHand} : isBelt ? {...defBelt} : isArmor ? {...defArmor} : {...defSimple});
  }

  // Shards
  const shardsKey = 'cs_shards_'+playerId;
  const [shards, setShards] = React.useState(0);
  const _shardsTimer = React.useRef(null);
  function handleShardsChange(val) {
    setShards(val);
    try { localStorage.setItem(shardsKey, String(val)); } catch {}
    if (window._fbDb) {
      clearTimeout(_shardsTimer.current);
      _shardsTimer.current = setTimeout(() => {
        window._fbDb.ref('/shards/'+playerId).set(val).catch(e=>console.warn('FB shards write',e));
      }, 1000);
    }
  }

  // Sync inventory from localStorage or Firebase
  const _invSyncing = React.useRef(false);
  const _invTimer   = React.useRef(null);

  const applyInv = React.useCallback((raw) => {
    try {
      const lsInv = typeof raw === 'string' ? JSON.parse(raw) : raw;
      const merged = Array(20).fill(null).map((_, i) => lsInv[i] || {name:"",weight:""});
      _invSyncing.current = true;
      set("inventory", merged);
      setTimeout(() => { _invSyncing.current = false; }, 600);
    } catch {}
  }, [playerId]);

  React.useEffect(() => {
    // localStorage cross-tab
    const onStorage = (e) => {
      if (e.key === 'cs_inventory_'+playerId) {
        const raw = localStorage.getItem('cs_inventory_'+playerId);
        if (raw) applyInv(raw);
      }
    };
    window.addEventListener('storage', onStorage);

    // Firebase real-time listener
    let fbRef = null;
    if (window._fbDb) {
      fbRef = window._fbDb.ref('/inventory/'+playerId);
      fbRef.on('value', snap => {
        if (_invSyncing.current) return;
        const d = snap.val();
        if (d) { applyInv(d); try { localStorage.setItem('cs_inventory_'+playerId, JSON.stringify(d)); } catch {} }
      });
      // Also load shards
      window._fbDb.ref('/shards/'+playerId).once('value').then(snap => {
        const v = snap.val();
        if (v != null) setShards(parseInt(v)||0);
      });
    } else {
      // fallback localStorage load
      const raw = localStorage.getItem('cs_inventory_'+playerId);
      if (raw) applyInv(raw);
    }

    return () => {
      window.removeEventListener('storage', onStorage);
      if (fbRef) fbRef.off();
    };
  }, [playerId]);

  // Keep localStorage + Firebase in sync when inventory changes
  React.useEffect(() => {
    try { localStorage.setItem('cs_inventory_'+playerId, JSON.stringify(inventory)); } catch {}
    if (window._fbDb) {
      clearTimeout(_invTimer.current);
      _invSyncing.current = true;
      _invTimer.current = setTimeout(() => {
        window._fbDb.ref('/inventory/'+playerId).set(inventory)
          .then(() => { setTimeout(() => { _invSyncing.current = false; }, 300); })
          .catch(e => { _invSyncing.current = false; console.warn('FB inv write',e); });
      }, 400);
    }
  }, [inventory]);

  const hasSkillTree = true;
  const playerLevel = parseInt(baseStats["Cunning"]||0) > 0 ? Math.max(1, parseInt(bio.XPLevel||1)||1) : Math.max(1, parseInt(bio.XPLevel||1)||1);

  const tabStyle = (tab) => ({
    padding:'10px 20px', background:'transparent', border:'none',
    borderBottom: sheetTab===tab ? '2px solid #c9a227' : '2px solid transparent',
    color: sheetTab===tab ? '#f0c040' : '#666',
    cursor:'pointer', fontSize:13, letterSpacing:1, textTransform:'uppercase',
    fontFamily:'Georgia, serif',
  });

  function handleExportPlayer() {
    const data = {
      version: 1,
      exported: new Date().toISOString(),
      playerId,
      sheet,
      skillPoints: skillPoints || {},
      bonusPoints: bonusPoints || 0,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rmsw-' + playerId + '-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleImportPlayer(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d.sheet || !d.playerId) { alert('Invalid character backup file.'); return; }
        if (d.playerId !== playerId) {
          if (!confirm('This file is for ' + d.playerId + ' but you are importing into ' + playerId + '. Continue anyway?')) return;
        } else {
          if (!confirm('Import ' + d.playerId + '\'s sheet? This will replace their current data.')) return;
        }
        onUpdate(d.sheet);
        if (d.skillPoints && onSkillPointsChange) onSkillPointsChange(d.skillPoints);
        if (d.bonusPoints !== undefined && onBonusPointsChange) onBonusPointsChange(d.bonusPoints);
        alert('Imported ' + d.playerId + '\'s sheet successfully.');
      } catch { alert('Invalid JSON file.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  return (
    <div style={{background:"#1a1a2e", fontFamily:"monospace", color:"#eee"}}>
      {/* Tab bar */}
      <div style={{display:'flex', background:'#0d0b08', borderBottom:'1px solid #3a3020', padding:'0 24px', alignItems:'center', justifyContent:'space-between'}}>
        <div style={{display:'flex'}}>
          <button style={tabStyle('character')} onClick={() => setSheetTab('character')}>Character</button>
          {hasSkillTree && <button style={tabStyle('skill_trees')} onClick={() => setSheetTab('skill_trees')}>Talents</button>}
        </div>
        <div style={{display:'flex', gap:6, paddingRight:8}}>
          <button onClick={handleExportPlayer} style={{background:'#166534',border:'1px solid #15803d',color:'#4ade80',
            borderRadius:5,padding:'4px 10px',cursor:'pointer',fontSize:10,letterSpacing:1}}>
            ⬇ Export
          </button>
          <label style={{background:'#1e3a5f',border:'1px solid #1d4ed8',color:'#93c5fd',
            borderRadius:5,padding:'4px 10px',cursor:'pointer',fontSize:10,letterSpacing:1}}>
            ⬆ Import
            <input type="file" accept=".json" onChange={handleImportPlayer} style={{display:'none'}}/>
          </label>
        </div>
      </div>

      {/* Equip error display */}
      {equipError && <div style={{background:'#7f1d1d',color:'#fca5a5',padding:'10px 16px',fontSize:12,fontFamily:'monospace',cursor:'pointer'}} onClick={()=>setEquipError(null)}>⚠ Equip error (tap to dismiss): {equipError}</div>}

      {/* Character tab */}
      {sheetTab === 'character' && (
        <div style={{padding:"24px"}}>
          {/* BIO */}
          <div style={secStyle}>
            <h2 style={secTitle}>CHARACTER</h2>
            <div style={{display:"flex",gap:24}}>
              {[
                [["Name","Name"],["Race","Race"],["Class","Class"],["XPLevel","XP Level"],["XP","XP"]],
                [["Alignment","Alignment"],["Age","Age"],["Height","Height"],["Weight","Weight"],["HairEyesSkin","Hair / Eyes / Skin"]]
              ].map((col,ci)=>(
                <div key={ci} style={{flex:1,display:"flex",flexDirection:"column",gap:10}}>
                  {col.map(([f,label])=>(
                    <div key={f}>
                      <div style={fLabel}>{label.toUpperCase()}</div>
                      <input type="text" value={bio[f]} onChange={e=>set("bio",{...bio,[f]:e.target.value})} placeholder={label} style={si}/>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>

          {/* ATTRIBUTES */}
          <div style={secStyle}>
            <h2 style={secTitle}>ATTRIBUTES</h2>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              {ATTRS.map(attr=>(
                <div key={attr} style={{flex:"1 1 90px"}}>
                  <div style={fLabel}>{attr.toUpperCase()}</div>
                  <input type="number" value={baseStats[attr]} onChange={e=>set("baseStats",{...baseStats,[attr]:e.target.value})} placeholder="0"
                    style={{...iBase,width:"100%",padding:"8px 6px",fontSize:20,boxSizing:"border-box"}}/>
                  {!!allBonuses[attr]&&<div style={{marginTop:5}}><StatValue value={sv(attr)} bonus={allBonuses[attr]}/></div>}
                </div>
              ))}
            </div>
          </div>

          {/* DERIVED STATS */}
          <div style={secStyle}>
            <h2 style={secTitle}>DERIVED STATS</h2>
            <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
              {["Guard","Health","Energy"].map(d=>{
                const curVal = current[d]!=="" ? current[d] : derivedMax[d];
                return (
                  <div key={d} style={{flex:"1 1 140px"}}>
                    <div style={fLabel}>{d.toUpperCase()}</div>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <input type="number" value={curVal}
                        onChange={e=>onUpdate({current:{...current,[d]:e.target.value===""?"":parseInt(e.target.value)||0}})}
                        style={{width:64,fontSize:20,background:"transparent",border:"none",borderBottom:"1px solid #444",color:allBonuses[d]?"#00ff88":"#fff",fontWeight:allBonuses[d]?"bold":"normal",textAlign:"right",padding:0,outline:"none"}}/>
                      <span style={{color:"#444",fontSize:20,margin:"0 2px"}}>/</span>
                      <span style={{fontSize:20,color:allBonuses[d]?"#00ff88":"#fff",fontWeight:allBonuses[d]?"bold":"normal"}}>{derivedMax[d]}</span>
                    </div>
                    <div style={{fontSize:10,color:"#444",marginTop:4}}>
                      {d==="Health"&&"Vitality"}{d==="Guard"&&"Strength × 5"}{d==="Energy"&&"Willpower × 10"}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* COMBAT STATS + RESISTANCES */}
          <div style={secStyle}>
            <div style={{display:"flex",gap:32}}>
              <div style={{flex:2}}>
                <h2 style={secTitle}>COMBAT STATS</h2>
                <div style={{display:"flex",gap:24}}>
                  {[COMBAT_STATS.slice(0,5),COMBAT_STATS.slice(5)].map((col,ci)=>(
                    <div key={ci} style={{flex:1,display:"flex",flexDirection:"column",gap:14}}>
                      {col.map(key=>(
                        <div key={key}>
                          <div style={fLabel}>{key.toUpperCase()}</div>
                          <StatValue value={combatBase[key]+(allBonuses[key]||0)} bonus={allBonuses[key]} suffix={pctStats[key]?"%":""}/>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </div>
              <div style={{width:1,background:"#2a2a4a",alignSelf:"stretch"}}/>
              <div style={{flex:1}}>
                <h2 style={secTitle}>RESISTANCES</h2>
                <div style={{display:"flex",gap:24}}>
                  {[RESIST_LEFT,RESIST_RIGHT].map((col,ci)=>(
                    <div key={ci} style={{flex:1,display:"flex",flexDirection:"column",gap:14}}>
                      {col.map(key=>{
                        const val=allBonuses[key]||0;
                        return (
                          <div key={key}>
                            <div style={fLabel}>{key.replace(" Resistance","").toUpperCase()}</div>
                            <div style={{fontSize:15,color:val>0?'#4ade80':val<0?'#f87171':'#9ca3af',fontWeight:700}}>{val}%</div>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* EQUIPMENT */}
          <div style={secStyle}>
            <h2 style={secTitle}>EQUIPMENT</h2>
            <EquipmentGrid
              sheet={sheet}
              onUpdate={onUpdate}
              allDamage={allDamage}
              allMinMax={allMinMax}
              sv={sv}
              onUnequip={handleUnequip}
              unequipMsgs={unequipMsgs}
            />
          </div>

          {/* EQUIPPED GEAR SUMMARY */}
          <EquippedSummary sheet={sheet} stats={deriveStats(sheet)} allDamage={allDamage} allDamageImmunities={allDamageImmunities||[]} allConditionImmunities={allConditionImmunities||[]} talentWeaponElem={talentWeaponElem||{}} talentDmgMults={talentDmgMults||{}}/>

          {/* HAND PICKER */}
          {handPicker && (
            <div onClick={function(e){if(e.target===e.currentTarget)setHandPicker(null);}}
              style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:800,padding:16}}>
              <div style={{background:'#16213e',borderRadius:12,border:'1px solid #2a2a4a',width:280,overflow:'hidden'}}>
                <div style={{padding:'12px 16px',borderBottom:'1px solid #2a2a4a',background:'#0f172a'}}>
                  <div style={{fontSize:12,color:'#c9a227',fontWeight:700,letterSpacing:1}}>WHICH HAND?</div>
                  <div style={{fontSize:11,color:'#9ca3af',marginTop:2}}>{handPicker.item.name}</div>
                </div>
                <div style={{padding:16,display:'flex',flexDirection:'column',gap:8}}>
                  <button onClick={function(){var it=handPicker.item,idx=handPicker.invIdx;setHandPicker(null);doEquipToSlot(idx,'mainHand',it);}}
                    style={{background:'#1e3a5f',color:'#93c5fd',border:'1px solid #1d4ed8',borderRadius:6,padding:'10px',cursor:'pointer',fontSize:13,fontWeight:600}}>
                    Main Hand
                  </button>
                  <button onClick={function(){var it=handPicker.item,idx=handPicker.invIdx;setHandPicker(null);doEquipToSlot(idx,'offHand',it);}}
                    style={{background:'#1e3a5f',color:'#93c5fd',border:'1px solid #1d4ed8',borderRadius:6,padding:'10px',cursor:'pointer',fontSize:13,fontWeight:600}}>
                    Off Hand
                  </button>
                  <button onClick={function(){setHandPicker(null);}}
                    style={{background:'#1f2937',color:'#6b7280',border:'none',borderRadius:6,padding:'8px',cursor:'pointer',fontSize:12}}>
                    Cancel
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* INVENTORY */}
          <InventoryBlock inventory={inventory} setInvItem={setInvItem} clearInvSlot={clearInvSlot} totalWeight={totalWeight} weightAllowance={sv("Strength")*3.8} shards={shards} onShardsChange={handleShardsChange} onEquip={handleEquip} equipMsgs={equipMsgs} playerId={playerId}/>

          {/* SKILLS */}
          <div style={secStyle}>
            <h2 style={secTitle}>SKILLS</h2>
            <div style={{display:"flex",gap:24}}>
              {[SKILLS_LEFT,SKILLS_RIGHT].map((col,ci)=>(
                <div key={ci} style={{flex:1,display:"flex",flexDirection:"column",gap:12}}>
                  {col.map(skill=>{
                    const bonus=allBonuses[skill]||0;
                    const total=(parseInt(baseSkills[skill])||0)+bonus;
                    return (
                      <div key={skill} style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:110,fontSize:11,color:"#555",letterSpacing:1,flexShrink:0}}>{skill.toUpperCase()}</div>
                        <input type="number" value={baseSkills[skill]} onChange={e=>set("baseSkills",{...baseSkills,[skill]:e.target.value})} placeholder="0"
                          style={{...iBase,width:70,padding:"6px 8px",fontSize:16,textAlign:"center"}}/>
                        {!!bonus&&<span style={{fontSize:16,color:"#00ff88",fontWeight:"bold"}}>{total}<span style={{fontSize:10,color:"#00cc66",marginLeft:5}}>(+{bonus})</span></span>}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>

          {/* TRAITS & ABILITIES */}
          <div style={secStyle}>
            <h2 style={secTitle}>TRAITS AND ABILITIES</h2>
            <textarea value={traitsText||""} onChange={e=>set("traitsText",e.target.value)}
              placeholder="Enter traits and abilities..."
              style={{...iBase,width:"100%",minHeight:160,padding:"10px",fontSize:14,boxSizing:"border-box",resize:"vertical",lineHeight:1.6}}/>
          </div>
        </div>
      )}

      {/* Skill Trees tab */}
      {sheetTab === 'skill_trees' && hasSkillTree && (
        <SkillTreePanel
          playerId={playerId}
          skillPoints={skillPoints}
          onSkillPointsChange={onSkillPointsChange}
          playerLevel={playerLevel}
          bonusPoints={bonusPoints}
          onBonusPointsChange={onBonusPointsChange}
          activeClasses={activeClasses}
          onActiveClassesChange={onActiveClassesChange}
        />
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const lsGet = (key, def) => { try { const v=localStorage.getItem(key); return v!=null?JSON.parse(v):def; } catch { return def; } };
  const lsSet = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

  // Firebase is the source of truth — start with defaults, load from Firebase on mount
  const [sheets, setSheets] = useState({ adam: createSheetState(), brian: createSheetState(), craig: createSheetState() });
  const [adamSkillPoints,  setAdamSkillPoints]  = useState({});
  const [adamBonusPoints,  setAdamBonusPoints]  = useState(0);
  const [craigSkillPoints, setCraigSkillPoints] = useState({});
  const [craigBonusPoints, setCraigBonusPoints] = useState(0);
  const [brianSkillPoints, setBrianSkillPoints] = useState({});
  const [brianBonusPoints, setBrianBonusPoints] = useState(0);
  const [adamActiveClasses,  setAdamActiveClasses]  = useState([]);
  const [craigActiveClasses, setCraigActiveClasses] = useState([]);
  const [brianActiveClasses, setBrianActiveClasses] = useState([]);

  useEffect(() => {
    if (!window._fbDb) return;
    window._fbDb.ref('/characterSheet').once('value').then(snap => {
      const d = snap.val(); if (!d) return;
      if (d.sheets) setSheets(prev => ({ adam: { ...prev.adam, ...(d.sheets.adam||{}) }, brian: { ...prev.brian, ...(d.sheets.brian||{}) }, craig: { ...prev.craig, ...(d.sheets.craig||{}) } }));
      if (d.adamSkillPoints)  setAdamSkillPoints(d.adamSkillPoints);
      if (d.adamBonusPoints  != null) setAdamBonusPoints(d.adamBonusPoints);
      if (d.craigSkillPoints) setCraigSkillPoints(d.craigSkillPoints);
      if (d.craigBonusPoints != null) setCraigBonusPoints(d.craigBonusPoints);
      if (d.brianSkillPoints) setBrianSkillPoints(d.brianSkillPoints);
      if (d.brianBonusPoints != null) setBrianBonusPoints(d.brianBonusPoints);
      if (d.adamActiveClasses)  setAdamActiveClasses(d.adamActiveClasses);
      if (d.craigActiveClasses) setCraigActiveClasses(d.craigActiveClasses);
      if (d.brianActiveClasses) setBrianActiveClasses(d.brianActiveClasses);
    });
  }, []);

  const [activePlayer, setActivePlayer] = useState('adam');
  const [savedFlash, setSavedFlash] = useState(false);

  // Auto-save to localStorage — same keys used by combat simulator
  useEffect(() => { lsSet('cs_sheets', sheets); }, [sheets]);
  useEffect(() => { lsSet('cs_adamSkillPoints',  adamSkillPoints);  }, [adamSkillPoints]);
  useEffect(() => { lsSet('cs_adamBonusPoints',  adamBonusPoints);  }, [adamBonusPoints]);
  useEffect(() => { lsSet('cs_craigSkillPoints', craigSkillPoints); }, [craigSkillPoints]);
  useEffect(() => { lsSet('cs_craigBonusPoints', craigBonusPoints); }, [craigBonusPoints]);
  useEffect(() => { lsSet('cs_brianSkillPoints', brianSkillPoints); }, [brianSkillPoints]);
  useEffect(() => { lsSet('cs_brianBonusPoints', brianBonusPoints); }, [brianBonusPoints]);
  useEffect(() => { lsSet('cs_adamActiveClasses',  adamActiveClasses);  }, [adamActiveClasses]);
  useEffect(() => { lsSet('cs_craigActiveClasses', craigActiveClasses); }, [craigActiveClasses]);
  useEffect(() => { lsSet('cs_brianActiveClasses', brianActiveClasses); }, [brianActiveClasses]);

  // Firebase sync — each key gets its own path to avoid browsers overwriting each other
  const _fbSyncing = useRef(false);
  const _fbTimers  = useRef({});
  const _fbLoaded  = useRef(false);

  function fbListen(path, apply, allowNull) {
    if (!window._fbDb) { _fbLoaded.current = true; return () => {}; }
    const ref = window._fbDb.ref(path);
    ref.on('value', snap => {
      if (_fbSyncing.current) return;
      const d = snap.val();
      if (d == null && !allowNull) { _fbLoaded.current = true; return; }
      _fbSyncing.current = true;
      _fbLoaded.current = true;
      apply(d == null ? {} : d);
      setTimeout(() => { _fbSyncing.current = false; }, 800);
    });
    return () => ref.off();
  }

  function fbWrite(key, path, value) {
    if (!window._fbDb || _fbSyncing.current || !_fbLoaded.current) return;
    clearTimeout(_fbTimers.current[key]);
    _fbTimers.current[key] = setTimeout(() => {
      window._fbDb.ref(path).set(value).catch(e => console.warn('FB write', path, e));
    }, 1000);
  }

  useEffect(() => fbListen('/characterSheet/sheets', d => setSheets(prev => ({
    adam:  { ...prev.adam,  ...(d.adam  || {}) },
    brian: { ...prev.brian, ...(d.brian || {}) },
    craig: { ...prev.craig, ...(d.craig || {}) },
  }))), []);
  useEffect(() => fbListen('/characterSheet/adamSkillPoints',  d => setAdamSkillPoints(d), true),  []);
  useEffect(() => fbListen('/characterSheet/adamBonusPoints',  d => setAdamBonusPoints(d), true),  []);
  useEffect(() => fbListen('/characterSheet/craigSkillPoints', d => setCraigSkillPoints(d), true), []);
  useEffect(() => fbListen('/characterSheet/craigBonusPoints', d => setCraigBonusPoints(d), true), []);
  useEffect(() => fbListen('/characterSheet/brianSkillPoints', d => setBrianSkillPoints(d), true), []);
  useEffect(() => fbListen('/characterSheet/brianBonusPoints', d => setBrianBonusPoints(d), true), []);
  useEffect(() => fbListen('/characterSheet/adamActiveClasses',  d => setAdamActiveClasses(d), true),  []);
  useEffect(() => fbListen('/characterSheet/craigActiveClasses', d => setCraigActiveClasses(d), true), []);
  useEffect(() => fbListen('/characterSheet/brianActiveClasses', d => setBrianActiveClasses(d), true), []);

  useEffect(() => { fbWrite('sheets',            '/characterSheet/sheets',            sheets);            }, [sheets]);
  useEffect(() => { fbWrite('adamSP',            '/characterSheet/adamSkillPoints',   adamSkillPoints);   }, [adamSkillPoints]);
  useEffect(() => { fbWrite('adamBP',            '/characterSheet/adamBonusPoints',   adamBonusPoints);   }, [adamBonusPoints]);
  useEffect(() => { fbWrite('craigSP',           '/characterSheet/craigSkillPoints',  craigSkillPoints);  }, [craigSkillPoints]);
  useEffect(() => { fbWrite('craigBP',           '/characterSheet/craigBonusPoints',  craigBonusPoints);  }, [craigBonusPoints]);
  useEffect(() => { fbWrite('brianSP',           '/characterSheet/brianSkillPoints',  brianSkillPoints);  }, [brianSkillPoints]);
  useEffect(() => { fbWrite('brianBP',           '/characterSheet/brianBonusPoints',  brianBonusPoints);  }, [brianBonusPoints]);
  useEffect(() => { fbWrite('adamAC',            '/characterSheet/adamActiveClasses',  adamActiveClasses);  }, [adamActiveClasses]);
  useEffect(() => { fbWrite('craigAC',           '/characterSheet/craigActiveClasses', craigActiveClasses); }, [craigActiveClasses]);
  useEffect(() => { fbWrite('brianAC',           '/characterSheet/brianActiveClasses', brianActiveClasses); }, [brianActiveClasses]);

  // Flash "Saved" indicator on any change
  const flashTimer = useRef(null);
  useEffect(() => {
    setSavedFlash(true);
    clearTimeout(flashTimer.current);
    flashTimer.current = setTimeout(() => setSavedFlash(false), 1500);
  }, [sheets, adamSkillPoints, adamBonusPoints, craigSkillPoints, craigBonusPoints, brianSkillPoints, brianBonusPoints]);

  const updateSheet = (pid, patch) => setSheets(prev => ({...prev, [pid]: {...prev[pid], ...patch}}));

  const skillPointsFor    = id => id==='adam' ? adamSkillPoints  : id==='craig' ? craigSkillPoints  : brianSkillPoints;
  const setSkillPointsFor  = id => id==='adam' ? setAdamSkillPoints : id==='craig' ? setCraigSkillPoints : setBrianSkillPoints;
  const bonusPointsFor    = id => id==='adam' ? adamBonusPoints  : id==='craig' ? craigBonusPoints  : brianBonusPoints;
  const setBonusPointsFor  = id => id==='adam' ? setAdamBonusPoints : id==='craig' ? setCraigBonusPoints : setBrianBonusPoints;
  const activeClassesFor    = id => id==='adam' ? adamActiveClasses  : id==='craig' ? craigActiveClasses  : brianActiveClasses;
  const setActiveClassesFor = id => id==='adam' ? setAdamActiveClasses : id==='craig' ? setCraigActiveClasses : setBrianActiveClasses;

  const playerColor = PLAYER_DEFS.find(p => p.id === activePlayer)?.color || '#f9fafb';

  function handleExport() {
    const data = {
      version: 1,
      exported: new Date().toISOString(),
      sheets,
      adamSkillPoints, adamBonusPoints,
      craigSkillPoints, craigBonusPoints,
      brianSkillPoints, brianBonusPoints,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rmsw-sheets-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d.sheets) { alert('Invalid character sheet backup file.'); return; }
        if (!confirm('Import character sheets? This will REPLACE all current sheet data.')) return;
        setSheets(d.sheets);
        if (d.adamSkillPoints)  setAdamSkillPoints(d.adamSkillPoints);
        if (d.adamBonusPoints !== undefined) setAdamBonusPoints(d.adamBonusPoints);
        if (d.brianSkillPoints) setBrianSkillPoints(d.brianSkillPoints);
        if (d.brianBonusPoints !== undefined) setBrianBonusPoints(d.brianBonusPoints);
        if (d.craigSkillPoints) setCraigSkillPoints(d.craigSkillPoints);
        if (d.craigBonusPoints !== undefined) setCraigBonusPoints(d.craigBonusPoints);
        alert('Character sheets imported successfully.');
      } catch { alert('Invalid JSON file.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  return (
    <div style={{minHeight:'100vh', background:'#111827'}}>
      {/* Header */}
      <div style={{background:'#0f172a', borderBottom:'1px solid #1e293b', padding:'0 24px', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <div style={{display:'flex', gap:0}}>
          {PLAYER_DEFS.map((p, i) => {
            const isActive = activePlayer === p.id;
            return (
              <button key={p.id} onClick={() => setActivePlayer(p.id)} style={{
                padding:'14px 28px',
                background: isActive ? '#1a1a2e' : 'transparent',
                border:'none',
                borderBottom: isActive ? `3px solid ${p.color}` : '3px solid transparent',
                color: isActive ? p.color : '#4b5563',
                cursor:'pointer', fontSize:15, fontWeight: isActive ? 'bold' : 'normal',
                letterSpacing:2, textTransform:'uppercase', fontFamily:'monospace',
                transition:'color 0.15s',
              }}>
                {p.name}
              </button>
            );
          })}
        </div>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <div style={{fontSize:11, color: savedFlash ? '#4ade80' : '#1f2937', transition:'color 0.3s', letterSpacing:1}}>
            ✓ SAVED
          </div>
          <button onClick={handleExport} style={{background:'#166534',border:'1px solid #15803d',color:'#4ade80',
            borderRadius:5,padding:'5px 10px',cursor:'pointer',fontSize:11}}>
            ⬇ Export
          </button>
          <label style={{background:'#1e3a5f',border:'1px solid #1d4ed8',color:'#93c5fd',
            borderRadius:5,padding:'5px 10px',cursor:'pointer',fontSize:11}}>
            ⬆ Import
            <input type="file" accept=".json" onChange={handleImport} style={{display:'none'}}/>
          </label>
          <div style={{fontSize:11, color:'#374151', letterSpacing:1}}>CHARACTER SHEET</div>
        </div>
      </div>

      {/* Active player sheet */}
      {PLAYER_DEFS.map(p => activePlayer === p.id && (
        <CharacterSheetView
          key={p.id}
          playerId={p.id}
          sheet={sheets[p.id]}
          onUpdate={patch => updateSheet(p.id, patch)}
          skillPoints={skillPointsFor(p.id)}
          onSkillPointsChange={setSkillPointsFor(p.id)}
          bonusPoints={bonusPointsFor(p.id)}
          onBonusPointsChange={setBonusPointsFor(p.id)}
          activeClasses={activeClassesFor(p.id)}
          onActiveClassesChange={setActiveClassesFor(p.id)}
        />
      ))}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error: null}; }
  static getDerivedStateFromError(e) { return {error: e.message || String(e)}; }
  render() {
    if (this.state.error) {
      return React.createElement('div', {
        style: {background:'#7f1d1d',color:'#fca5a5',padding:20,fontFamily:'monospace',fontSize:13,whiteSpace:'pre-wrap'}
      }, 'RENDER ERROR (screenshot this):\n' + this.state.error);
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
  </script>
</body>
</html>
