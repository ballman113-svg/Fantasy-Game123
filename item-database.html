function loadDB(){
  try{
    var saved=localStorage.getItem(LS_KEY);
    var custom=saved?JSON.parse(saved):[];
    // Merge: default items always present, custom items on top
    // Custom items with same id as a default override the default
    var customIds=new Set(custom.map(function(i){return i.id;}));
    var defaults=DEFAULT_ITEMS.filter(function(i){return !customIds.has(i.id);});
    return defaults.concat(custom);
  }catch{return DEFAULT_ITEMS.slice();}
}
function saveToDB(items){
  // Save non-default items, plus any default items that have been modified
  try{
    var custom=items.filter(function(i){
      var def=DEFAULT_ITEMS.find(function(d){return d.id===i.id;});
      if(!def) return true; // not a default — always save
      return JSON.stringify(i)!==JSON.stringify(def); // default but modified — save
    });
    localStorage.setItem(LS_KEY,JSON.stringify(custom));
  }catch{}
  // Write full merged list to cs_itemDatabase_all so other tools never need their own DEFAULT_ITEMS copy
  try{
    localStorage.setItem('cs_itemDatabase_all',JSON.stringify({version:DB_VERSION,items:items}));
  }catch{}
}

function getInventory(player){
  try{var v=localStorage.getItem('cs_inventory_'+player.toLowerCase());return v?JSON.parse(v):Array(20).fill(null);}
  catch{return Array(20).fill(null);}
}
function saveInventory(player,inv){
  try{localStorage.setItem('cs_inventory_'+player.toLowerCase(),JSON.stringify(inv));}catch{}
}
function getMaxStack(item){
  if(!item||!item.category) return 1;
  var cat=item.category, sub=item.subcategory||'';
  if(cat==='Alchemy') return sub==='Potions'?5:sub==='Herbs'?10:1;
  if(cat==='Blacksmithing') return 10;
  if(cat==='Gems') return 5;
  if(cat==='Scrolls') return 5;
  if(cat==='Food') return 10;
  if(cat==='Junk') return 10;
  return 1;
}
function addToInventory(inv,item){
  var max=getMaxStack(item);
  if(max>1){
    var stackIdx=inv.findIndex(function(s){return s&&s.id===item.id&&(s.qty||1)<max;});
    if(stackIdx!==-1){
      var next=inv.slice();
      next[stackIdx]=Object.assign({},next[stackIdx],{qty:(next[stackIdx].qty||1)+1});
      return {inv:next,slot:stackIdx};
    }
  }
  var freeIdx=inv.findIndex(function(s){return !s||s===null||(s.name===''&&!s.id);});
  if(freeIdx===-1) return null;
  var next2=inv.slice();
  next2[freeIdx]=max>1?Object.assign({},item,{qty:1}):Object.assign({},item);
  return {inv:next2,slot:freeIdx};
}

function GiveModal({item,onClose}){
  const [msg,setMsg]=useState('');
  const [msgColor,setMsgColor]=useState('#f87171');
  const [done,setDone]=useState(false);
  const [qty,setQty]=useState(1);
  const max=getMaxStack(item);
  const isStackable=max>1;
  const rc=RARITY_COLORS[item.rarity]||TEXT_SUB;

  function giveToPlayer(player){
    var amount=isStackable?qty:1;
    var inv=getInventory(player);
    var remaining=amount;
    var lastSlot=-1;
    while(remaining>0){
      var result=addToInventory(inv,item);
      if(!result){
        setMsgColor('#f87171');
        setMsg(player+'\'s inventory is full.');
        return;
      }
      inv=result.inv;
      lastSlot=result.slot;
      remaining--;
    }
    saveInventory(player,inv);
    setDone(true);
    setMsgColor('#22c55e');
    setMsg(item.name+(amount>1?' x'+amount:'')+' added to '+player+'\'s inventory.');
  }

  return (
    <div onClick={function(e){if(e.target===e.currentTarget)onClose();}}

function ItemCard({item,onEdit,onDelete,onGive}){
  const [hov,setHov]=useState(false);
  const rc=RARITY_COLORS[item.rarity]||TEXT_SUB;
  const isWeapon=item.category==='Weapons';
  const isArmor=item.category==='Armor'||item.category==='Engineering';
  function srow(label,val,color){
    if(!val&&val!==0) return null;
    return (
      <div style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:'1px solid #1a1a2e',maxWidth:380}}>
        <span style={{fontSize:11,color:'#6b7280',flexShrink:0,marginRight:12}}>{label}</span>
        <span style={{fontSize:11,color:color||'#f9fafb',fontWeight:600,textAlign:'right'}}>{val}</span>
      </div>
    );
  }
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:BG_CARD,border:'1px solid '+(hov?'#4a4a7a':BORDER),borderRadius:10,
        overflow:'hidden',transition:'border-color 0.15s'}}>
      <div style={{padding:'10px 12px',borderBottom:'1px solid #1a1a2e',background:'#0f172a',
        display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:44,height:44,flexShrink:0,background:'#0d1117',border:'2px solid '+rc+'55',
          borderRadius:6,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center'}}>
          {item.image
            ? <img src={item.image} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={function(e){e.target.style.display='none';}}/>
            : <span style={{fontSize:22,opacity:0.2}}>{TOP_ICONS[item.category]||'?'}</span>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,color:rc,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name||'Unnamed'}</div>
          <span style={{fontSize:9,color:rc,background:rc+'22',border:'1px solid '+rc+'44',borderRadius:3,padding:'1px 5px',letterSpacing:1,fontWeight:700}}>{item.rarity}</span>
        </div>
        {hov&&(
          <div style={{display:'flex',gap:5,flexShrink:0}}>
            <button onClick={function(){onGive(item);}} style={{background:'#14532d',color:'#86efac',border:'none',borderRadius:5,padding:'4px 10px',cursor:'pointer',fontSize:11}}>Give</button>
            <button onClick={function(){onEdit(item);}} style={{background:'#374151',color:'#f9fafb',border:'none',borderRadius:5,padding:'4px 10px',cursor:'pointer',fontSize:11}}>Edit</button>
            <button onClick={function(){onDelete(item.id);}} style={{background:'#7f1d1d',color:'#f9fafb',border:'none',borderRadius:5,padding:'4px 10px',cursor:'pointer',fontSize:11}}>Del</button>
          </div>
        )}
      </div>
      <div style={{padding:'8px 12px'}}>
        {srow('Category', item.category+(item.subcategory?' · '+item.subcategory:''))}
        {item.slot?srow('Slot',item.slot):null}
        {item.handedness&&item.handedness!=='Either'?srow('Hand',item.handedness):null}
        {isWeapon&&item.minDmg?srow('Damage',item.minDmg+' – '+item.maxDmg+' '+(item.physDmgType||'Blunt'),'#fbbf24'):null}
        {isWeapon?srow('Weapon Speed',(parseFloat(item.weaponSpeed)||2.00).toFixed(2)+'s','#34d399'):null}
        {isArmor&&item.bluntRes?srow('Blunt Resist',item.bluntRes+'%','#d4b483'):null}
        {isArmor&&item.cleavingRes?srow('Cleaving Resist',item.cleavingRes+'%','#e87040'):null}
        {isArmor&&item.piercingSlashingRes?srow('Pierc/Slash Resist',item.piercingSlashingRes+'%','#c0c0c0'):null}
        {item.defenseMod&&parseInt(item.defenseMod)!==0?srow('Defense Bonus','+'+item.defenseMod):null}
        {item.strReq&&parseInt(item.strReq)>0?srow('Requires STR',item.strReq,'#f87171'):null}
        {item.agiReq&&parseInt(item.agiReq)>0?srow('Requires AGI',item.agiReq,'#34d399'):null}
        {item.wilReq&&parseInt(item.wilReq)>0?srow('Requires WIL',item.wilReq,'#a78bfa'):null}
        {item.weight?srow('Weight',item.weight):null}
        {item.value?srow('Value',item.value+' shards',GOLD):null}
        {item.effect?srow('Effect',item.effect,'#a78bfa'):null}
        {item.gemBonus?srow('Gem Bonus',item.gemBonus,'#34d399'):null}
        {item.foodEffect?srow('Food Effect',item.foodEffect,'#86efac'):null}
        {item.materialArmPct?srow('Armor Slot',item.materialArmPct,'#60a5fa'):null}
        {item.materialDmgPct?srow('Damage Slot',item.materialDmgPct,'#fbbf24'):null}
        {item.materialDefSlot&&item.materialDefSlot!=='None'?srow('Defense Slot',item.materialDefSlot,'#34d399'):null}
        {item.materialUtilSlot&&item.materialUtilSlot!=='None'?srow('Utility Slot',item.materialUtilSlot,'#a78bfa'):null}
        {item.materialOffSlot&&item.materialOffSlot!==''&&item.materialOffSlot!=='None'?srow('Offensive Slot',item.materialOffSlot,'#f87171'):null}
        {item.traits&&(
          <div style={{marginTop:6,padding:'6px 8px',background:'#0f172a',borderRadius:5,border:'1px solid #2a2a4a'}}>
            <div style={{fontSize:9,color:'#6b7280',letterSpacing:1.5,marginBottom:3}}>TRAITS</div>
            <div style={{fontSize:11,color:'#a78bfa',lineHeight:1.5}}>{item.traits}</div>
          </div>
        )}
        {(item.talentBoosts||[]).filter(function(b){return b.talentName;}).length>0&&(
          <div style={{marginTop:6,padding:'6px 8px',background:'#0f172a',borderRadius:5,border:'1px solid #1e3a5f'}}>
            <div style={{fontSize:9,color:'#6b7280',letterSpacing:1.5,marginBottom:4}}>TALENT BOOSTS</div>
            {(item.talentBoosts||[]).filter(function(b){return b.talentName;}).map(function(b,i){
              var f=b.fields||{};
              var parts=[];
              if(f.minVal||f.maxVal) parts.push('+'+(f.minVal||0)+'/'+(f.maxVal||0)+' dmg');
              if(f.pctMinVal||f.pctMaxVal) parts.push('+'+(f.pctMinVal||0)+'/'+(f.pctMaxVal||0)+'% dmg');
              if(f.minHeal||f.maxHeal) parts.push('+'+(f.minHeal||0)+'/'+(f.maxHeal||0)+' heal');
              if(f.pctMinHeal||f.pctMaxHeal) parts.push('+'+(f.pctMinHeal||0)+'/'+(f.pctMaxHeal||0)+'% heal');
              if(f.healOnHitPct) parts.push('+'+f.healOnHitPct+'% heal/hit');
              if(f.guardOnHitPct) parts.push('+'+f.guardOnHitPct+'% guard/hit');
              if(f.condBoostMin||f.condBoostMax) parts.push('+cond '+(f.condBoostMin||0)+'/'+(f.condBoostMax||0));
              if(f.damageMult) parts.push('×mult +'+f.damageMult);
              if(f.dmgLevelScale) parts.push('+'+f.dmgLevelScale+' dmg scale/lv');
              if(f.healLevelScale) parts.push('+'+f.healLevelScale+' heal scale/lv');
              // legacy fields
              if(b.flatMinDmg||b.flatMaxDmg) parts.push('+'+(b.flatMinDmg||0)+'/'+(b.flatMaxDmg||0)+' dmg (legacy)');
              if(b.flatMinHeal||b.flatMaxHeal) parts.push('+'+(b.flatMinHeal||0)+'/'+(b.flatMaxHeal||0)+' heal (legacy)');
              return(<div key={i} style={{fontSize:11,lineHeight:1.5}}><span style={{color:'#93c5fd',fontWeight:700}}>{b.talentName}</span><span style={{color:'#34d399'}}>{parts.length?' — '+parts.join(', '):' — (no fields set)'}</span></div>);
            })}
          </div>
        )}
        {item.description&&<div style={{marginTop:6,fontSize:11,color:TEXT_MUTE,fontStyle:'italic',lineHeight:1.4}}>{item.description.split('|').map(function(part,i){return <div key={i}>{part.trim()}</div>;})}</div>}
      </div>
    </div>
  );
}

function ItemModal({initItem,onSave,onClose}){
  const [item,setItem]=useState(Object.assign({},initItem));
  const [showGive,setShowGive]=useState(false);
  const set=function(f,v){setItem(function(p){return Object.assign({},p,{[f]:v});});};
  // Load full talent objects from talent database
  const talentDb=React.useMemo(function(){
    try{
      var raw=localStorage.getItem('cs_talentDatabase');
      if(!raw) return [];
      var trees=JSON.parse(raw);
      var all=[];
      trees.forEach(function(tree){(tree.talents||[]).forEach(function(t){if(t.name) all.push(t);});});
      all.sort(function(a,b){return a.name.localeCompare(b.name);});
      return all;
    }catch{return [];}
  },[]);
  function getTalentObj(name){ return talentDb.find(function(t){return t.name===name;})||null; }
  // Detect which field groups are relevant for a talent
  function detectFields(t){
    if(!t) return {};
    var f={};
    var type=t.type||'';
    // Damage/melee/ranged types always have a damageMult (defaults to 1.0 in combat even if blank in DB)
    var hasDamageMult=['Melee','Ranged','Spell Attack','Blood Sacrifice'].includes(type)||parseFloat(t.damageMult);
    if(parseFloat(t.minVal)||parseFloat(t.maxVal)) f.dmgRange=true;
    if(parseFloat(t.minHeal)||parseFloat(t.maxHeal)) f.healRange=true;
    if(parseFloat(t.condBoostMin)||parseFloat(t.condBoostMax)) f.condBoost=true;
    if(hasDamageMult) f.damageMult=true;
    if(parseFloat(t.dmgLevelScale)) f.dmgLevelScale=true;
    if(parseFloat(t.healLevelScale)) f.healLevelScale=true;
    (t.procs||[]).forEach(function(p){
      if(p.type==='Heal % on hit') f.healOnHitPct=true;
      if(p.type==='Restore % Guard on hit') f.guardOnHitPct=true;
    });
    return f;
  }
  const rc=RARITY_COLORS[item.rarity]||TEXT_SUB;
  const cat=item.category;

  function getSubOptions(){
    if(cat==='Weapons') return WEAPON_SUBS;
    if(cat==='Jewelry') return JEWELRY_SUBS;
    if(cat==='Alchemy') return ALCHEMY_SUBS;
    if(cat==='Blacksmithing') return BS_SUBS;
    if(cat==='Engineering') return ENG_SUBS;
    return [];
  }
  const subOptions=getSubOptions();
  const showSubDrop=subOptions.length>0;
  const showArmorMat=cat==='Armor'||cat==='Clothing';
  const showEngArmorSlot=cat==='Engineering'&&item.subcategory==='Armor';

  return (
    <React.Fragment>
    <div onClick={function(e){if(e.target===e.currentTarget)onClose();}}
      style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:500,padding:16}}>
      <div style={{background:'#16213e',borderRadius:12,border:'1px solid #2a2a4a',width:'100%',maxWidth:520,maxHeight:'90vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid #2a2a4a',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:GOLD,fontSize:13,letterSpacing:2,fontWeight:700}}>{initItem.name?'EDIT ITEM':'NEW ITEM'}</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:TEXT_MUTE,cursor:'pointer',fontSize:18,lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:'16px 20px',overflowY:'auto',display:'flex',flexDirection:'column',gap:14}}>

          <div>
            <label style={fLabel}>CATEGORY</label>
            <select value={cat} onChange={function(e){
              var c=e.target.value;
              var sub='',slot='';
              if(c==='Weapons') sub=WEAPON_SUBS[0];
              else if(c==='Armor'){sub=ARMOR_MATS[0];slot=ARMOR_SLOTS[0];}
              else if(c==='Clothing'){sub=ARMOR_MATS[0];slot=ARMOR_SLOTS[0];}
              else if(c==='Jewelry') sub=JEWELRY_SUBS[0];
              else if(c==='Alchemy') sub=ALCHEMY_SUBS[0];
              else if(c==='Blacksmithing') sub=BS_SUBS[0];
              else if(c==='Engineering'){sub=ENG_SUBS[0];slot=ENG_ARMOR_SLOTS[0];}
              setItem(function(p){return Object.assign({},p,{category:c,subcategory:sub,slot:slot});});
            }} style={iBase}>
              {TOP_TABS.map(function(t){return <option key={t}>{t}</option>;})}
            </select>
          </div>

          {showSubDrop&&(
            <div>
              <label style={fLabel}>SUBCATEGORY</label>
              <select value={item.subcategory} onChange={function(e){set('subcategory',e.target.value);}} style={iBase}>
                {subOptions.map(function(s){return <option key={s}>{s}</option>;})}
              </select>
            </div>
          )}

          {showArmorMat&&(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div>
                <label style={fLabel}>MATERIAL</label>
                <select value={item.subcategory} onChange={function(e){
                  var m=e.target.value;

                }} style={iBase}>

              </div>
            </div>
          )}
          {showEngArmorSlot&&(

              <select value={item.slot||ENG_ARMOR_SLOTS[0]} onChange={function(e){set('slot',e.target.value);}} style={iBase}>

                    if(i!==idx) return b;
                    var newFields=Object.assign({},b.fields||{});
                    if(v===''||v===null) delete newFields[k]; else newFields[k]=v;
                    return Object.assign({},b,{fields:newFields});
                  });
                  set('talentBoosts',next);
                }

                  var next=(item.talentBoosts||[]).map(function(b,i){return i===idx?Object.assign({},b,{talentName:v,fields:{}}):b;});

                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6}}>

                        </div>

                    {avail.condBoost&&(
                      <React.Fragment>

                        </div>
                      </React.Fragment>
                    )}
                    {(avail.dmgLevelScale||avail.healLevelScale)&&(
                      <React.Fragment>
                        <div style={{fontSize:10,color:'#6b7280',letterSpacing:1}}>LEVEL SCALING</div>

                          {avail.dmgLevelScale&&numInput('+DMG SCALE/LV','dmgLevelScale','0.1')}

                        </div>
                      </React.Fragment>
                    )}
                  </div>
                );
              })}
            </div>
          )}
          {(cat==='Weapons'||cat==='Armor'||cat==='Clothing'||cat==='Jewelry'||cat==='Charms'||(cat==='Engineering'&&item.subcategory==='Armor'))&&(
            <div>
              <label style={fLabel}>TRAITS / MODIFIERS</label>

              <div style={{fontSize:10,color:TEXT_MUTE,marginTop:3}}>Feeds into character sheet stat calculations</div>
            </div>
          )}

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div>
              <label style={fLabel}>WEIGHT</label>
              <input type="number" value={item.weight} onChange={function(e){set('weight',e.target.value);}} placeholder="0.0" style={iBase}/>
            </div>
            <div>
              <label style={fLabel}>VALUE (GOLD)</label>
              <input type="number" value={item.value} onChange={function(e){set('value',e.target.value);}} placeholder="0" style={iBase}/>
            </div>
          </div>

          <div>
            <label style={fLabel}>DESCRIPTION</label>
            <textarea value={item.description} onChange={function(e){set('description',e.target.value);}}
              placeholder="Flavor text..." rows={2} style={Object.assign({},iBase,{resize:'vertical',lineHeight:1.6})}/>
          </div>
        </div>
        <div style={{padding:'12px 20px',borderTop:'1px solid #2a2a4a',display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button onClick={onClose} style={{background:'#374151',color:'#f9fafb',border:'none',borderRadius:5,padding:'7px 14px',cursor:'pointer',fontSize:13}}>Cancel</button>
          <button onClick={function(){setShowGive(true);}} style={{background:'#14532d',color:'#86efac',border:'none',borderRadius:5,padding:'7px 14px',cursor:'pointer',fontSize:13,fontWeight:600}}>Give to Player</button>
          <button onClick={function(){
            if(!item.name.trim()) return;
            onSave(item);
          }} style={{background:'#1d4ed8',color:'#fff',border:'none',borderRadius:5,padding:'7px 14px',cursor:'pointer',fontSize:13,fontWeight:600}}>Save Item</button>
        </div>
      </div>
    </div>
    {showGive&&<GiveModal item={item} onClose={function(){setShowGive(false);}}/>}
    </React.Fragment>
  );
}

function SubTabBar({tabs,active,onChange,counts,green}){
  return (
    <div style={{background:green?'#0a0f0a':'#111827',borderBottom:'1px solid '+(green?'#1a2a1a':BORDER),padding:'8px 24px',display:'flex',gap:5,flexWrap:'wrap'}}>
      {tabs.map(function(s){
        var on=s===active;
        var cnt=counts[s]||0;
        return (
          <button key={s} onClick={function(){onChange(s);}} style={{
            background:on?(green?'#1a2a1a':'#1e3a5f'):'transparent',
            border:'1px solid '+(on?(green?'#4ade8066':'#3b82f6'):( green?'#1a2a1a':BORDER)),
            color:on?(green?'#86efac':'#93c5fd'):TEXT_MUTE,
            borderRadius:6,padding:'6px 12px',cursor:'pointer',
            fontSize:green?11:12,fontWeight:on?700:400,display:'flex',alignItems:'center',gap:5,
          }}>
            {s}
            {cnt>0&&<span style={{background:on?(green?'#4ade8033':'#3b82f6'):'#374151',color:on?(green?'#86efac':'#fff'):'#9ca3af',borderRadius:10,padding:'1px 5px',fontSize:10}}>{cnt}</span>}
          </button>
        );
      })}
    </div>
  );
}

function App(){
  const [items,setItems]        = useState(function(){return loadDB();});
  const [topTab,setTopTab]      = useState('Weapons');
  const [subTab,setSubTab]      = useState(WEAPON_SUBS[0]);
  const [armorMat,setArmorMat]  = useState(ARMOR_MATS[0]);
  const [armorSlot,setArmorSlot]= useState(ARMOR_SLOTS[0]);
  const [clothingMat,setClothingMat]  = useState(ARMOR_MATS[0]);
  const [clothingSlot,setClothingSlot]= useState(ARMOR_SLOTS[0]);
  const [modal,setModal]        = useState(null);
  const [giveModal,setGiveModal]= useState(null);
  const [search,setSearch]      = useState('');
  const [saved,setSaved]        = useState(false);
  const firstRun                = useRef(true);

  useEffect(function(){
    if(firstRun.current){
      firstRun.current=false;
      try{localStorage.setItem('cs_itemDatabase_all',JSON.stringify({version:DB_VERSION,items:items}));}catch{}
      return;
    }
    saveToDB(items);
    setSaved(true);
    var t=setTimeout(function(){setSaved(false);},1500);
    return function(){clearTimeout(t);};
  },[items]);

  function changeTopTab(t){
    setTopTab(t); setSearch('');
    if(t==='Weapons') setSubTab(WEAPON_SUBS[0]);
    else if(t==='Armor'){setArmorMat(ARMOR_MATS[0]);setArmorSlot(ARMOR_SLOTS[0]);}
    else if(t==='Clothing'){setClothingMat(ARMOR_MATS[0]);setClothingSlot(ARMOR_SLOTS[0]);}
    else if(t==='Jewelry') setSubTab(JEWELRY_SUBS[0]);
    else if(t==='Alchemy') setSubTab(ALCHEMY_SUBS[0]);
    else if(t==='Blacksmithing') setSubTab(BS_SUBS[0]);
    else if(t==='Engineering'){setSubTab(ENG_SUBS[0]);}
    else setSubTab('');
  }

  var visible=items.filter(function(item){
    if(item.category!==topTab) return false;
    if(topTab==='Weapons'||topTab==='Jewelry'||topTab==='Alchemy'||topTab==='Blacksmithing'||topTab==='Engineering'){  // Charms/Books have no subtabs
      if(item.subcategory!==subTab) return false;
    }
    if(topTab==='Armor'){
      if(item.subcategory!==armorMat||item.slot!==armorSlot) return false;
    }
    if(topTab==='Clothing'){
      if(item.subcategory!==clothingMat||item.slot!==clothingSlot) return false;
    }
    if(topTab==='Engineering'&&subTab==='Armor'){
      if(item.slot&&item.slot!==armorSlot) return false;
    }
    if(search){
      var q=search.toLowerCase();
      return item.name.toLowerCase().includes(q)||(item.traits||'').toLowerCase().includes(q)||(item.description||'').toLowerCase().includes(q);
    }
    return true;
  }).sort(function(a,b){return a.name.localeCompare(b.name);});

  function countFor(cat,sub,slot){
    return items.filter(function(i){
      if(i.category!==cat) return false;
      if(sub&&i.subcategory!==sub) return false;
      if(slot&&i.slot!==slot) return false;
      return true;
    }).length;
  }

  var wCounts={};
  WEAPON_SUBS.forEach(function(s){wCounts[s]=countFor('Weapons',s,'');});
  var amCounts={};
  ARMOR_MATS.forEach(function(m){amCounts[m]=countFor('Armor',m,'');});
  var asCounts={};
  ARMOR_SLOTS.forEach(function(s){asCounts[s]=countFor('Armor',armorMat,s);});
  var clCounts={};
  ARMOR_MATS.forEach(function(m){clCounts[m]=countFor('Clothing',m,'');});
  var clsCounts={};
  ARMOR_SLOTS.forEach(function(s){clsCounts[s]=countFor('Clothing',clothingMat,s);});

  var jCounts={};
  JEWELRY_SUBS.forEach(function(s){jCounts[s]=countFor('Jewelry',s,'');});
  var alCounts={};
  ALCHEMY_SUBS.forEach(function(s){alCounts[s]=countFor('Alchemy',s,'');});
  var bsCounts={};
  BS_SUBS.forEach(function(s){bsCounts[s]=countFor('Blacksmithing',s,'');});
  var engCounts={};
  ENG_SUBS.forEach(function(s){engCounts[s]=countFor('Engineering',s,'');});

  function openNew(){
    var sub='',slot='';
    if(topTab==='Weapons') sub=subTab;
    else if(topTab==='Armor'){sub=armorMat;slot=armorSlot;}
    else if(topTab==='Clothing'){sub=clothingMat;slot=clothingSlot;}
    else if(topTab==='Jewelry'||topTab==='Alchemy'||topTab==='Blacksmithing'||topTab==='Engineering') sub=subTab;
    if(topTab==='Engineering'&&subTab==='Armor') slot=armorSlot;
    setModal(emptyItem(topTab,sub,slot));
  }

  function saveItem(item){
    setItems(function(prev){
      var idx=prev.findIndex(function(i){return i.id===item.id;});
      if(idx>=0){var n=prev.slice();n[idx]=item;return n;}
      return prev.concat([item]);
    });
    setModal(null);
  }

  function delItem(id){
    setItems(function(prev){return prev.filter(function(i){return i.id!==id;});});
  }

  function handleExport() {
    const data = { version: DB_VERSION, exported: new Date().toISOString(), items };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rmsw-items-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const parsed = JSON.parse(ev.target.result);
        const imported = Array.isArray(parsed) ? parsed : (parsed.items || []);
        if (!imported.length) { alert('No items found in file.'); return; }
        if (!confirm('Import ' + imported.length + ' items? This will REPLACE your current database.')) return;
        setItems(imported);
        alert('Imported ' + imported.length + ' items successfully.');
      } catch { alert('Invalid JSON file.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  return (
    <div style={{minHeight:'100vh',background:'#111827'}}>

      <div style={{background:'#0d1117',borderBottom:'1px solid #2a2a4a',padding:'13px 24px',
        display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <span style={{fontSize:11,color:GOLD,letterSpacing:3,fontWeight:700}}>ITEM DATABASE</span>
          <span style={{fontSize:10,color:saved?'#22c55e':TEXT_MUTE,transition:'color 0.3s'}}>
            {saved?'✓ SAVED':items.length+' items'}
          </span>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input type="text" value={search} onChange={function(e){setSearch(e.target.value);}}
            placeholder="Search items..." style={Object.assign({},iBase,{width:180,padding:'6px 10px'})}/>
          <button onClick={handleExport} style={{background:'#166534',color:'#4ade80',border:'1px solid #15803d',
            borderRadius:5,padding:'7px 12px',cursor:'pointer',fontSize:11}}>
            ⬇ Export
          </button>
          <label style={{background:'#1e3a5f',color:'#93c5fd',border:'1px solid #1d4ed8',
            borderRadius:5,padding:'7px 12px',cursor:'pointer',fontSize:11}}>
            ⬆ Import
            <input type="file" accept=".json" onChange={handleImport} style={{display:'none'}}/>
          </label>
          <button onClick={openNew} style={{background:'#1d4ed8',color:'#fff',border:'none',
            borderRadius:5,padding:'7px 16px',cursor:'pointer',fontSize:12,fontWeight:600}}>
            + New Item
          </button>
        </div>
      </div>

      <div style={{background:'#0d1117',borderBottom:'1px solid #2a2a4a',padding:'0 24px',display:'flex',overflowX:'auto',gap:0}}>
        {TOP_TABS.map(function(t){
          var on=t===topTab;
          var cnt=countFor(t,'','');
          return (
            <button key={t} onClick={function(){changeTopTab(t);}} style={{
              background:on?BG_CARD:'transparent',border:'none',
              borderBottom:'2px solid '+(on?GOLD:'transparent'),
              color:on?GOLD:TEXT_SUB,padding:'12px 16px',cursor:'pointer',
              fontSize:13,fontWeight:on?700:400,whiteSpace:'nowrap',
              display:'flex',alignItems:'center',gap:6,flexShrink:0,
            }}>
              {TOP_ICONS[t]} {t}
              {cnt>0&&<span style={{background:on?GOLD+'33':'#374151',color:on?GOLD:'#9ca3af',borderRadius:10,padding:'1px 5px',fontSize:10,fontWeight:700}}>{cnt}</span>}
            </button>
          );
        })}
      </div>

      {topTab==='Weapons'&&<SubTabBar tabs={WEAPON_SUBS} active={subTab} onChange={function(s){setSubTab(s);setSearch('');}} counts={wCounts} green={false}/>}
      {topTab==='Armor'&&<SubTabBar tabs={ARMOR_MATS} active={armorMat} onChange={function(m){setArmorMat(m);setArmorSlot(ARMOR_SLOTS[0]);setSearch('');}} counts={amCounts} green={false}/>}
      {topTab==='Armor'&&<SubTabBar tabs={ARMOR_SLOTS} active={armorSlot} onChange={function(s){setArmorSlot(s);setSearch('');}} counts={asCounts} green={true}/>}
      {topTab==='Clothing'&&<SubTabBar tabs={ARMOR_MATS} active={clothingMat} onChange={function(m){setClothingMat(m);setClothingSlot(ARMOR_SLOTS[0]);setSearch('');}} counts={clCounts} green={false}/>}
      {topTab==='Clothing'&&<SubTabBar tabs={ARMOR_SLOTS} active={clothingSlot} onChange={function(s){setClothingSlot(s);setSearch('');}} counts={clsCounts} green={true}/>}
      {topTab==='Jewelry'&&<SubTabBar tabs={JEWELRY_SUBS} active={subTab} onChange={function(s){setSubTab(s);setSearch('');}} counts={jCounts} green={false}/>}
      {topTab==='Alchemy'&&<SubTabBar tabs={ALCHEMY_SUBS} active={subTab} onChange={function(s){setSubTab(s);setSearch('');}} counts={alCounts} green={false}/>}
      {topTab==='Blacksmithing'&&<SubTabBar tabs={BS_SUBS} active={subTab} onChange={function(s){setSubTab(s);setSearch('');}} counts={bsCounts} green={false}/>}
      {topTab==='Engineering'&&<SubTabBar tabs={ENG_SUBS} active={subTab} onChange={function(s){setSubTab(s);setSearch('');}} counts={engCounts} green={false}/>}
      {topTab==='Engineering'&&subTab==='Armor'&&<SubTabBar tabs={ENG_ARMOR_SLOTS} active={armorSlot} onChange={function(s){setArmorSlot(s);setSearch('');}} counts={{}} green={true}/>}

      <div style={{padding:24,maxWidth:900,margin:'0 auto'}}>
        {search&&(
          <div style={{marginBottom:12,fontSize:12,color:TEXT_MUTE}}>
            Results for "{search}" — {visible.length} found
            <button onClick={function(){setSearch('');}} style={{marginLeft:8,background:'none',border:'none',color:'#3b82f6',cursor:'pointer',fontSize:12}}>Clear</button>
          </div>
        )}
        {visible.length===0
          ? <div style={{padding:'60px 20px',textAlign:'center',color:TEXT_MUTE,fontSize:13}}>
              <div style={{fontSize:36,marginBottom:12,opacity:0.25}}>{TOP_ICONS[topTab]}</div>
              No items here yet. Click <strong style={{color:TEXT_SUB}}>+ New Item</strong> to add one.
            </div>
          : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:8}}>
              {visible.map(function(item){return <ItemCard key={item.id} item={item} onEdit={setModal} onDelete={delItem} onGive={setGiveModal}/>;}) }
            </div>
        }
      </div>

      {modal&&<ItemModal initItem={modal} onSave={saveItem} onClose={function(){setModal(null);}}/>}
      {giveModal&&<GiveModal item={giveModal} onClose={function(){setGiveModal(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
